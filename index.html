                          </div>
                        ))}
                        <div className="pt-1 flex gap-2">
                          <button onClick={async()=>{const r=await fetch(`${API}/consultations/${rx.consultationId}/prescription/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='ordonnance.pdf';a.click();URL.revokeObjectURL(url);}} className="text-xs text-blue-600 hover:underline font-medium">Télécharger PDF</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Right */}
        <div className="lg:col-span-2 space-y-5">
          {/* New consultation */}
          <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
            <h3 className="font-semibold text-slate-900 mb-4 flex items-center gap-2"><Ic.Steth className="w-4 h-4 text-blue-600"/>Démarrer une consultation</h3>
            {!showForm?(
              <button onClick={()=>setShowForm(true)}
                className="w-full border-2 border-dashed border-blue-200 rounded-2xl py-5 text-blue-600 font-semibold hover:border-blue-400 hover:bg-blue-50/50 text-sm flex items-center justify-center gap-2 transition-colors">
                <Ic.Plus className="w-4 h-4"/>Ouvrir une consultation
              </button>
            ):(
              <div className="space-y-3">
                <Input value={motif} onChange={e=>setMotif(e.target.value)} placeholder="Motif de consultation (ex: céphalées, suivi diabète, renouvellement ordonnance…)"/>
                <div className="flex gap-2">
                  <Btn variant="secondary" onClick={()=>setShowForm(false)} size="sm">Annuler</Btn>
                  <Btn variant="primary" onClick={start} loading={starting} icon={Ic.Mic} disabled={!motif.trim()}>Ouvrir la consultation</Btn>
                </div>
              </div>
            )}
          </div>

          {/* Documents Hub */}
          <DocumentsHub patient={patient} user={user}/>

          {/* Imagerie médicale */}
          <ImagingSection patientId={patientId}/>

          {/* History */}
          <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden" id="history-card">
            <div className="px-6 py-4 border-b border-slate-100">
              <h3 className="font-semibold text-slate-900">Historique des consultations</h3>
              <p className="text-xs text-slate-400 mt-0.5">Tous les médecins de l'établissement</p>
            </div>
            {!patient.consultations?.length?(
              <div className="px-6 py-10 text-center">
                <Ic.Clock className="w-8 h-8 text-slate-200 mx-auto mb-2"/>
                <p className="text-sm text-slate-400">Aucune consultation enregistrée</p>
              </div>
            ):(
              <div className="divide-y divide-slate-50">
                {patient.consultations.map(c=>{
                  const {l,c:col}=statusInfo(c.statut);
                  const hasNote=c.statut==='validee'||c.statut==='note_generee';
                  const isMe=c.userId===userId;
                  return(
                    <div key={c.id} onClick={()=>hasNote&&setNoteModal(c)}
                      className={`px-6 py-4 flex items-start gap-4 ${hasNote?'cursor-pointer hover:bg-blue-50/40':'hover:bg-slate-50/50'}`}>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-semibold text-slate-900">{c.motif}</p>
                        <p className="text-xs text-slate-400 mt-0.5 flex items-center gap-1"><Ic.Clock className="w-3 h-3"/>{fmtDateLong(c.date)}</p>
                        {c.docteurNom&&(
                          <p className={`text-xs mt-1 font-medium ${isMe?'text-blue-500':'text-violet-500'}`}>
                            Dr. {c.docteurPrenom} {c.docteurNom}{c.docteurSpec?` — ${c.docteurSpec}`:''}{isMe?' (vous)':''}
                          </p>
                        )}
                      </div>
                      <div className="flex items-center gap-2 flex-shrink-0 mt-0.5">
                        <Badge color={col} size="xs">{l}</Badge>
                        {hasNote&&<Ic.Chevron className="w-4 h-4 text-slate-300"/>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {/* Dossier complet */}
          <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm flex items-center justify-between">
            <div>
              <p className="text-sm font-semibold text-slate-800">Dossier médical complet</p>
              <p className="text-xs text-slate-400 mt-0.5">Identité, antécédents, ordonnances, consultations — tout en un PDF</p>
            </div>
            <Btn variant="secondary" icon={Ic.Download} onClick={downloadDossier} loading={dossDlLoading} size="sm">Télécharger</Btn>
          </div>

          {/* Discussions */}
          {userId&&<DiscussionPanel patientId={patientId} userId={userId}/>}
        </div>
      </div>
    </Page>
    {noteModal&&<NoteModal consultationId={noteModal.id} motif={noteModal.motif} onClose={()=>setNoteModal(null)}/>}
  </>);
}

  'Salbutamol (Ventoline) 100µg spray','Budésonide/formotérol inhalé','Béclométasone spray','Tiotropium 18µg','Montelukast 10mg','Théophylline 200mg','Prednisone 5mg','Prednisolone 20mg','Methylprednisolone 16mg','Dexaméthasone 4mg',
  'Sertraline 50mg','Sertraline 100mg','Escitalopram 10mg','Fluoxétine 20mg','Amitriptyline 25mg','Clonazépam 0.5mg','Diazépam 5mg','Alprazolam 0.25mg','Zopiclone 7.5mg','Zolpidem 10mg','Mélatonine 2mg','Hydroxyzine 25mg',
  'Amlodipine 5mg','Nitroglycérine spray sublinguale','Clopidogrel 75mg','Aspirine 75mg','Aspirine 100mg','Rivaroxaban 20mg','Apixaban 5mg','Warfarine 5mg','Dabigatran 110mg','Digoxine 0.25mg','Amiodarone 200mg',
  'Ibuprofen 400mg pédiatrique','Dexaméthasone 0.1% collyre','Azitromycine 250mg','Artemether/Luméfantrine (Coartem)','Quinine 300mg','Albendazole 400mg','Mébendazole 100mg','Métronidazole 250mg sirop',

  'Cetirizine 10mg','Loratadine 10mg','Desloratadine 5mg','Fexofénadine 120mg','Chlorphénamine 4mg',
  'Dexaméthasone 4mg injection','Tramadol 100mg LP','Paracétamol injectable 1g','Ceftriaxone 2g','Amoxicilline IV 1g','Métronidazole IV 500mg',
  'Contraceptif oral combiné (Microgynon)','Progestérone 200mg','Utrogestan 200mg','Mifépristone','Oxytocine (Syntocinon)','Misoprostol 200µg',
].sort();

function DrugSearch({value,onChange}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState(value||'');
  const suggestions=q.length>1?DRUGS.filter(d=>d.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  const pick=d=>{setQ(d);onChange(d);setOpen(false);};
  React.useEffect(()=>{setQ(value||'');},[value]);
  return(
    <div className="relative col-span-2">
      <input value={q}
        onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),200)}
        placeholder="Médicament / DCI (ex: Amoxicilline 500mg)"
        className="w-full border border-slate-200 bg-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      {open&&suggestions.length>0&&(
        <div className="absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl z-30 overflow-hidden">
          {suggestions.map(d=>(
            <button key={d} onMouseDown={()=>pick(d)}
              className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 hover:text-blue-700 text-slate-700">{d}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PRESCRIPTION PANEL
══════════════════════════════════════════════════════════════ */
function PrescriptionPanel({consultationId}){
  const empty={medicament:'',posologie:'',duree:'',quantite:''};
  const [lignes,setLignes]=useState([]);
  const [validee,setValidee]=useState(false);
  const [saving,setSaving]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(false);
  const [renewModal,setRenewModal]=useState(false);

  useEffect(()=>{api.get(`/consultations/${consultationId}/prescription`).then(d=>{if(d.lignes){setLignes(d.lignes);setValidee(!!d.validee);}});},[consultationId]);

  const save=async(v=false)=>{setSaving(true);await api.put(`/consultations/${consultationId}/prescription`,{lignes,validee:v});if(v)setValidee(true);setSaving(false);};
  const addLigne=()=>setLignes(l=>[...l,{...empty}]);
  const upd=(i,k,v)=>setLignes(l=>l.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const del=i=>setLignes(l=>l.filter((_,idx)=>idx!==i));
  const dlPdf=async()=>{await save(validee);setPdfLoading(true);const r=await fetch(`${API}/consultations/${consultationId}/prescription/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='ordonnance.pdf';a.click();setPdfLoading(false);};

  return(
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        {validee&&<Badge color="green">Ordonnance validée</Badge>}
        <div className="flex gap-2 ml-auto flex-wrap">
          {!validee&&<Btn variant="secondary" onClick={()=>save(false)} loading={saving} size="sm">Sauvegarder</Btn>}
          {validee&&lignes.length>0&&<Btn variant="secondary" icon={Ic.Refresh} size="sm" onClick={()=>{setValidee(false);}}>Renouveler</Btn>}
          <Btn variant="secondary" icon={Ic.Download} onClick={dlPdf} loading={pdfLoading} size="sm">Ordonnance PDF</Btn>
          {!validee&&lignes.length>0&&<Btn variant="success" icon={Ic.Check} onClick={()=>save(true)} size="sm">Valider</Btn>}
        </div>
      </div>

      {!validee&&(
        <div className="space-y-3 mb-4">
          {lignes.map((l,i)=>(
            <div key={i} className="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
              <div className="flex items-center justify-between">
                <span className="text-xs font-bold text-slate-400">{i+1}.</span>
                <button onClick={()=>del(i)} className="w-6 h-6 rounded-lg hover:bg-rose-100 flex items-center justify-center text-slate-400 hover:text-rose-500"><Ic.Trash className="w-3.5 h-3.5"/></button>
              </div>
              <div className="grid grid-cols-2 gap-2.5">
                <DrugSearch value={l.medicament} onChange={v=>upd(i,'medicament',v)}/>
                <input value={l.posologie} onChange={e=>upd(i,'posologie',e.target.value)} placeholder="Posologie"
                  className="col-span-2 border border-slate-200 bg-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <input value={l.duree} onChange={e=>upd(i,'duree',e.target.value)} placeholder="Durée"
                  className="border border-slate-200 bg-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <input value={l.quantite} onChange={e=>upd(i,'quantite',e.target.value)} placeholder="Quantité"
                  className="border border-slate-200 bg-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>
            </div>
          ))}
          <button onClick={addLigne}
            className="w-full border-2 border-dashed border-slate-200 hover:border-blue-300 hover:bg-blue-50/50 rounded-xl py-3 text-sm text-slate-400 hover:text-blue-600 font-medium transition-colors flex items-center justify-center gap-2">
            <Ic.Plus className="w-4 h-4"/>Ajouter un médicament
          </button>
        </div>
      )}

      {validee&&lignes.length>0&&(
        <div className="space-y-3">
          {lignes.map((l,i)=>(
            <div key={i} className="flex gap-3 py-3 border-b border-slate-100 last:border-0">
              <div className="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-bold flex-shrink-0">{i+1}</div>
              <div>
                <p className="text-sm font-semibold text-slate-900">{l.medicament}</p>
                {l.posologie&&<p className="text-xs text-slate-600 mt-0.5">{l.posologie}</p>}
                {(l.duree||l.quantite)&&<p className="text-xs text-slate-400 mt-0.5">{[l.duree,l.quantite].filter(Boolean).join(' · ')}</p>}
              </div>
            </div>
          ))}
        </div>
      )}
      {validee&&lignes.length===0&&<p className="text-sm text-slate-400 italic">Aucun médicament prescrit</p>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════

function ConsultationScreen({consultationId,patientId,onBack}){
  const [patient,setPatient]=useState(null);
  const [consultation,setConsultation]=useState(null);
  const [recording,setRecording]=useState(false);
  const [transcription,setTranscription]=useState('');
  const [interim,setInterim]=useState('');
  const [processing,setProcessing]=useState(false);
  const [note,setNote]=useState(null);
  const [noteEdit,setNoteEdit]=useState(null);
  const [validated,setValidated]=useState(false);
  const [ttsLoad,setTtsLoad]=useState(false);
  const [pdfLoad,setPdfLoad]=useState(false);
  const [consent,setConsent]=useState(false);
  const [audioTime,setAudioTime]=useState(0);
  const [tab,setTab]=useState('note');
  const [emailModal,setEmailModal]=useState(false);
  const [emailTo,setEmailTo]=useState('');
  const [emailSending,setEmailSending]=useState(false);
  const [docModal,setDocModal]=useState(false);
  const [realtimeOk]=useState(typeof window!=='undefined'&&('SpeechRecognition' in window||'webkitSpeechRecognition' in window));
  const [heureDebut,setHeureDebut]=useState(null);

  const mrRef=useRef(),chunksRef=useRef([]),streamRef=useRef(),timerRef=useRef(),recRef=useRef(),txRef=useRef(''),recordingRef=useRef(false);

  useEffect(()=>{
    api.get(`/patients/${patientId}`).then(setPatient);
    api.get(`/consultations/${consultationId}`).then(c=>{setConsultation(c);setTranscription(c.transcription||'');txRef.current=c.transcription||'';if(c.note){setNote(c.note);setNoteEdit({...c.note});}if(c.statut==='validee')setValidated(true);});
    return ()=>{recRef.current?.stop();mrRef.current?.stop();streamRef.current?.getTracks().forEach(t=>t.stop());clearInterval(timerRef.current);};
  },[]);

  useEffect(()=>{
    if(recording){timerRef.current=setInterval(()=>setAudioTime(t=>t+1),1000);}
    else{clearInterval(timerRef.current);setAudioTime(0);}
    return()=>clearInterval(timerRef.current);
  },[recording]);

  const startRec=async()=>{
    if(!consent){alert('Activez le consentement d\'enregistrement.');return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      if(realtimeOk){
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        const r=new SR();r.lang='fr-FR';r.continuous=true;r.interimResults=true;
        r.onresult=e=>{let im='',fb='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fb+=e.results[i][0].transcript+' ';else im+=e.results[i][0].transcript;}if(fb){const u=(txRef.current?txRef.current+' ':'')+fb.trim();txRef.current=u;setTranscription(u);api.post(`/consultations/${consultationId}/update-transcription`,{transcription:u});}setInterim(im);};
        r.onerror=e=>{if(e.error!=='aborted'&&recordingRef.current)setTimeout(()=>r.start(),300);};
        r.onend=()=>{if(recordingRef.current)r.start();};
        r.start();recRef.current=r;
      }else{
        // Firefox / Safari fallback : Whisper chunked every 30s
        const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
        const mr=new MediaRecorder(stream,{mimeType});mrRef.current=mr;chunksRef.current=[];
        const transcribeChunk=async()=>{
          if(!chunksRef.current.length)return;
          const blob=new Blob([...chunksRef.current],{type:'audio/webm'});
          const fd=new FormData();fd.append('audio',blob,'rec.webm');
          const res=await api.upload(`/consultations/${consultationId}/transcribe`,fd);
          if(res.transcription){txRef.current=res.transcription;setTranscription(res.transcription);api.post(`/consultations/${consultationId}/update-transcription`,{transcription:res.transcription});}
        };
        mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
        // Transcribe every 30s while recording
        const chunkTimer=setInterval(async()=>{if(recordingRef.current)await transcribeChunk();},30000);
        mr.onstop=async()=>{clearInterval(chunkTimer);setProcessing(true);await transcribeChunk();setProcessing(false);};
        mr.start(1000); // collect data every second
      }
      recordingRef.current=true;
      setRecording(true);
      const now=new Date().toISOString();setHeureDebut(now);
      api.post(`/consultations/${consultationId}/timing`,{heureDebut:now});
    }catch(err){alert('Microphone refusé : '+err.message);}
  };

  const stopRec=()=>{
    recordingRef.current=false;
    setInterim('');
    recRef.current?.stop();
    mrRef.current?.stop();
    streamRef.current?.getTracks().forEach(t=>t.stop());
    setRecording(false);
    const fin=new Date().toISOString();
    const duree=heureDebut?Math.round((new Date(fin)-new Date(heureDebut))/60000):null;
    api.post(`/consultations/${consultationId}/timing`,{heureDebut,heureFin:fin,dureeMinutes:duree});
    // Auto-generate note if there's transcription
    setTimeout(()=>{if(txRef.current?.trim().length>20)genNoteRef.current?.();},500);
  };
  const updTx=t=>{setTranscription(t);txRef.current=t;api.post(`/consultations/${consultationId}/update-transcription`,{transcription:t});};
  const genNoteRef=useRef();
  const genNote=async()=>{setProcessing(true);const r=await api.post(`/consultations/${consultationId}/generate-note`,{});if(r.note){setNote(r.note);setNoteEdit({...r.note});}setProcessing(false);};
  genNoteRef.current=genNote;
  const valNote=async()=>{await api.post(`/consultations/${consultationId}/validate-note`,{note:noteEdit});setNote(noteEdit);setValidated(true);};
  const speak=async txt=>{setTtsLoad(true);try{const r=await fetch(`${API}/tts`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},body:JSON.stringify({text:txt,voice:'nova'})});if(!r.ok){alert('TTS non disponible');return;}new Audio(URL.createObjectURL(await r.blob())).play();}catch{alert('Erreur synthèse vocale');}finally{setTtsLoad(false);}};
  const dlPdf=async()=>{setPdfLoad(true);const r=await fetch(`${API}/consultations/${consultationId}/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='consultation.pdf';a.click();setPdfLoad(false);};
  const deleteConsult=async()=>{if(!confirm('Supprimer cette consultation ?'))return;await api.delete(`/consultations/${consultationId}`);onBack();};
  const sendEmail=async()=>{setEmailSending(true);const r=await api.post(`/consultations/${consultationId}/send-email`,{to:emailTo});setEmailSending(false);if(r.ok){setEmailModal(false);}else alert(r.error||'Erreur envoi email');};
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const NF=({label,field,ta=true,alert=false})=>(
    <div>
      <label className={`block text-xs font-bold uppercase tracking-widest mb-1.5 ${alert?'text-rose-600':'text-slate-500'}`}>{label}</label>
      {ta?<textarea value={noteEdit?.[field]||''} onChange={e=>setNoteEdit(n=>({...n,[field]:e.target.value}))} rows={3} disabled={validated}
          className={`w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 resize-none disabled:opacity-70 ${alert?'border-rose-200 bg-rose-50/50 focus:ring-rose-400':'border-slate-200 focus:ring-blue-500'}`}/>
        :<input value={noteEdit?.[field]||''} onChange={e=>setNoteEdit(n=>({...n,[field]:e.target.value}))} disabled={validated}
          className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-70"/>}
    </div>
  );

  return(
    <Page title="Consultation"
      breadcrumb={<><span className="cursor-pointer hover:text-slate-600" onClick={onBack}>Dossier patient</span> / Consultation en cours</>}>

      {docModal&&<DocModal consultationId={consultationId} patient={patient} onClose={()=>setDocModal(false)}/>}

      {/* Email modal */}
      {emailModal&&(
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 fade-in">
            <h3 className="font-bold text-slate-900 mb-4">Envoyer le compte rendu par email</h3>
            <Input label="Adresse email du destinataire" type="email" value={emailTo} onChange={e=>setEmailTo(e.target.value)} placeholder="patient@email.fr ou confrere@hopital.fr"/>
            <div className="flex gap-3 mt-4">
              <Btn variant="secondary" onClick={()=>setEmailModal(false)}>Annuler</Btn>
              <Btn variant="primary" icon={Ic.Mail} onClick={sendEmail} loading={emailSending} disabled={!emailTo}>Envoyer</Btn>
            </div>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
        {/* Left column */}
        <div className="lg:col-span-2 space-y-4">

          {/* Patient card */}
          {patient&&(
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <div className="flex items-center gap-3 mb-4">
                <div className={`w-12 h-12 rounded-2xl ${avatarColor(patient.sexe)} flex items-center justify-center text-white font-bold`}>
                  {initials(patient.prenom,patient.nom)}
                </div>
                <div>
                  <p className="font-bold text-slate-900">{patient.prenom} {patient.nom}</p>
                  <p className="text-xs text-slate-400">{ageStr(patient.dateNaissance)}</p>
                </div>
              </div>
              {consultation?.motif&&<div className="bg-blue-50 border border-blue-100 rounded-xl px-3 py-2 mb-3"><p className="text-xs text-blue-700 font-semibold">Motif : {consultation.motif}</p>{consultation?.dureeMinutes&&<span className="text-xs text-slate-400">Durée : {consultation.dureeMinutes} min</span>}</div>}
              {patient.allergies&&<div className="flex items-start gap-2 text-xs text-rose-700 bg-rose-50 rounded-xl px-3 py-2"><Ic.Warn className="w-3.5 h-3.5 flex-shrink-0 mt-0.5"/><span><strong>Allergies : </strong>{patient.allergies}</span></div>}
              {patient.traitements&&<p className="text-xs text-slate-500 mt-2"><strong>Traitements : </strong>{patient.traitements}</p>}
            </div>
          )}

          {/* Consent */}
          <label className={`flex items-start gap-3 p-4 rounded-2xl border cursor-pointer ${consent?'bg-emerald-50 border-emerald-200':'bg-amber-50 border-amber-200'}`}>
            <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} className="mt-0.5 accent-emerald-600 w-4 h-4"/>
            <div>
              <p className={`text-sm font-semibold ${consent?'text-emerald-800':'text-amber-800'}`}>{consent?'✓ Consentement enregistré':'Consentement d\'enregistrement'}</p>
              <p className="text-xs text-slate-500 mt-0.5">Le patient a été informé et consent à l'enregistrement audio.</p>
            </div>
          </label>

          {/* Recorder */}
          <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm text-center">
            <div className="flex justify-center mb-4">
              <div className="relative">
                {recording?(
                  <button onClick={stopRec} className="w-24 h-24 rounded-full bg-rose-500 hover:bg-rose-600 text-white flex items-center justify-center pulse-ring shadow-xl shadow-rose-200">
                    <Ic.Stop className="w-8 h-8"/>
                  </button>
                ):(
                  <button onClick={startRec} disabled={processing}
                    className={`w-24 h-24 rounded-full text-white flex items-center justify-center shadow-xl ${processing?'bg-slate-300':'bg-blue-600 hover:bg-blue-700 shadow-blue-200'}`}
                    style={!processing?{background:'linear-gradient(135deg,#3B82F6,#6366F1)'}:{}}>
                    {processing?<Ic.Spin className="w-8 h-8 text-slate-600"/>:<Ic.Mic className="w-8 h-8"/>}
                  </button>
                )}
              </div>
            </div>
            {recording&&(
              <div className="flex flex-col items-center justify-center gap-1 text-rose-600">
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"/>
                  <span className="font-mono text-sm font-bold">REC {fmt(audioTime)}</span>
                </div>
                {heureDebut&&<span className="text-xs text-rose-400">Début : {new Date(heureDebut).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>}
              </div>
            )}
            {processing&&<p className="text-sm text-slate-400 mt-2">Traitement en cours…</p>}
            {!recording&&!processing&&(
              <div>
                <p className="text-sm font-medium text-slate-700">{consent?'Prêt à enregistrer':'Activez le consentement'}</p>
                {realtimeOk&&consent&&<p className="text-xs text-emerald-600 mt-1">● Transcription temps réel activée</p>}
                {!realtimeOk&&consent&&<p className="text-xs text-amber-600 mt-1">● Transcription via Whisper — mise à jour toutes les 30s</p>}
              </div>
            )}
          </div>
        </div>

        {/* Right column */}
        <div className="lg:col-span-3 space-y-4">

          {/* Transcription */}
          <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-semibold text-slate-900">Transcription</h3>
              {transcription&&!note&&(
                <Btn variant="success" icon={processing?null:Ic.Steth} onClick={genNote} loading={processing} size="sm">Générer la note</Btn>
              )}
            </div>
            <div className="min-h-36 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm font-mono leading-relaxed">
              {transcription&&<span className="text-slate-800 whitespace-pre-wrap">{transcription}</span>}
              {interim&&<span className="interim"> {interim}</span>}
              {!transcription&&!interim&&<span className="text-slate-400 italic text-sm">{recording?(realtimeOk?'🎙 Parlez, la transcription s\'affiche ici en temps réel…':'🎙 Enregistrement en cours — la transcription sera générée toutes les 30s…'):'La transcription apparaîtra ici après l\'enregistrement.'}</span>}
            </div>
            {transcription&&(
              <div className="mt-2">
                <p className="text-xs text-slate-400 mb-1">Corriger si nécessaire :</p>
                <textarea value={transcription} onChange={e=>updTx(e.target.value)} rows={3}
                  className="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-600 focus:outline-none focus:ring-1 focus:ring-blue-400 resize-none bg-white"/>
              </div>
            )}
            {transcription&&note&&!validated&&<button onClick={genNote} disabled={processing} className="mt-1 text-xs text-blue-600 hover:underline">Regénérer la note</button>}
          </div>

          {/* Note + Prescription tabs */}
          {note&&(
            <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden fade-in">
              <div className="flex border-b border-slate-100">
                {[['note','📋 Note clinique'],['prescription','💊 Ordonnance']].map(([k,l])=>(
                  <button key={k} onClick={()=>setTab(k)}
                    className={`flex-1 py-3.5 text-sm font-semibold transition-colors ${tab===k?'text-blue-600 border-b-2 border-blue-600 bg-blue-50/40':'text-slate-400 hover:text-slate-700 hover:bg-slate-50/50'}`}>
                    {l}
                  </button>
                ))}
              </div>

              {tab==='note'&&(
                <div className="p-5">
                  {/* Header actions */}
                  <div className="flex items-center justify-between mb-4">
                    <div>{validated?<Badge color="green">Note validée ✓</Badge>:<Badge color="amber">En attente de validation</Badge>}</div>
                    <div className="flex gap-2">
                      {!validated?(
                        <>
                          <Btn variant="secondary" icon={ttsLoad?null:Ic.Volume} onClick={()=>speak(noteEdit?.conseils_patient)} loading={ttsLoad} size="sm">Consignes</Btn>
                          <Btn variant="success" icon={Ic.Check} onClick={valNote} size="sm">Valider la note</Btn>
                        </>
                      ):(
                        <>
                          <Btn variant="secondary" icon={ttsLoad?null:Ic.Volume} onClick={()=>speak(noteEdit?.conseils_patient)} loading={ttsLoad} size="sm">Consignes</Btn>
                          <Btn variant="secondary" icon={Ic.FileText} onClick={()=>setDocModal(true)} size="sm">Documents</Btn>
                          <Btn variant="secondary" icon={Ic.Mail} onClick={()=>setEmailModal(true)} size="sm">Email</Btn>
                          <Btn variant="primary" icon={pdfLoad?null:Ic.Download} onClick={dlPdf} loading={pdfLoad} size="sm">PDF</Btn>
                          <Btn variant="danger" icon={Ic.Trash} onClick={deleteConsult} size="sm">Supprimer</Btn>
                        </>
                      )}
                    </div>
                  </div>

                  {!validated&&(
                    <div className="mb-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 flex items-start gap-2.5">
                      <Ic.Warn className="w-4 h-4 text-amber-600 flex-shrink-0 mt-0.5"/>
                      <p className="text-xs text-amber-800 font-medium">Proposition générée par IA — vérifiez et corrigez avant de valider.</p>
                    </div>
                  )}

                  {noteEdit?.cim10?.code&&(
                    <div className="flex items-center gap-2 mb-4">
                      <span className="inline-flex items-center gap-2 bg-violet-50 border border-violet-200 rounded-xl px-4 py-2">
                        <span className="text-xs font-bold text-violet-700 bg-violet-100 px-2 py-0.5 rounded-lg font-mono">{noteEdit.cim10.code}</span>
                        <span className="text-sm text-violet-700 font-medium">{noteEdit.cim10.libelle}</span>
                      </span>
                      <span className="text-xs text-slate-400">Code CIM-10</span>
                    </div>
                  )}

                  <div className="space-y-4">
                    <NF label="Motif" field="motif" ta={false}/>
                    <NF label="Histoire de la maladie" field="histoire"/>
                    <NF label="Examen clinique" field="examen"/>
                    <NF label="Hypothèses diagnostiques" field="hypotheses"/>
                    <NF label="Conduite à tenir" field="conduite"/>
                    <NF label="Prescriptions / Examens" field="prescriptions"/>
                    <NF label="Conseils au patient" field="conseils_patient"/>
                    <NF label="⚠ Signes d'alarme" field="drapeaux_rouges" alert/>
                    {noteEdit?.conseils_patient&&(
                      <div className="mt-4 bg-blue-50 border border-blue-200 rounded-2xl p-4">
                        <p className="text-xs font-bold text-blue-700 uppercase tracking-widest mb-2">Recommandations MedPilot</p>
                        <p className="text-sm text-blue-900 leading-relaxed">{noteEdit.conseils_patient}</p>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {tab==='prescription'&&<div className="p-5"><PrescriptionPanel consultationId={consultationId}/></div>}
            </div>
          )}
        </div>
      </div>
    </Page>
  );
}

// ── SVG helpers ──────────────────────────────────────────────
function AgePyramideChart({groups}){
  const W=560,H=280,barH=24,gap=6,midX=W/2,labelW=70;
  const maxVal=Math.max(...groups.flatMap(g=>[g.h,g.f]),1);
  const scale=v=>(midX-labelW-16)*v/maxVal;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      <text x={midX/2} y={14} textAnchor="middle" fontSize={11} fill="#3B82F6" fontWeight="500">Hommes</text>
      <text x={midX+(midX-labelW)/2+labelW} y={14} textAnchor="middle" fontSize={11} fill="#ec4899" fontWeight="bold">Femmes</text>
      {groups.map((g,i)=>{
        const y=20+i*(barH+gap);
        const hw=scale(g.h), fw=scale(g.f);
        return(
          <g key={g.label}>
            <rect x={midX-labelW-hw} y={y} width={hw} height={barH} rx={3} fill="#3B82F6" opacity={0.8}/>
            <rect x={midX+labelW} y={y} width={fw} height={barH} rx={3} fill="#ec4899" opacity={0.8}/>
            <text x={midX} y={y+barH/2+4} textAnchor="middle" fontSize={10} fill="#64748b">{g.label}</text>
            <text x={midX-labelW-hw-4} y={y+barH/2+4} textAnchor="end" fontSize={9} fill="#3B82F6">{g.h}</text>
            <text x={midX+labelW+fw+4} y={y+barH/2+4} textAnchor="start" fontSize={9} fill="#ec4899">{g.f}</text>
          </g>
        );
      })}
      <line x1={midX} y1={16} x2={midX} y2={H-8} stroke="#e2e8f0" strokeWidth={1}/>
    </svg>
  );
}

function FamillesPieChart({familles}){
  const W=340,R=110,cx=W/2,cy=130;
  const total=familles.reduce((s,f)=>s+f.n,0)||1;
  const COLORS=['#3B82F6','#10B981','#6366F1','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#F59E0B','#84cc16','#a78bfa'];
  let angle=-Math.PI/2;
  const slices=familles.map((f,i)=>{
    const sweep=2*Math.PI*f.n/total;
    const a1=angle,a2=angle+sweep;
    angle=a2;
    return{...f,a1,a2,color:COLORS[i%COLORS.length]};
  });
  const arc=(r,a1,a2)=>{
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=a2-a1>Math.PI?1:0;
    return`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`;
  };
  return(
    <svg width="100%" viewBox={`0 0 ${W} 260`} style={{fontFamily:'inherit'}}>
      {slices.map((s,i)=><path key={i} d={arc(R,s.a1,s.a2)} fill={s.color} stroke="white" strokeWidth={1.5}/>)}
      <circle cx={cx} cy={cy} r={55} fill="white"/>
      <text x={cx} y={cy-6} textAnchor="middle" fontSize={11} fill="#64748b">Total</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize={18} fontWeight="bold" fill="#0f172a">{total}</text>
      {slices.map((s,i)=>{
        const midA=(s.a1+s.a2)/2;
        const lx=cx+(R+22)*Math.cos(midA), ly=cy+(R+22)*Math.sin(midA);
        if((s.a2-s.a1)*180/Math.PI<12) return null;
        return<text key={i} x={lx} y={ly} textAnchor="middle" fontSize={8.5} fill={s.color} fontWeight="bold">{Math.round(s.n/total*100)}%</text>;
      })}
    </svg>
  );
}

function TopDiagChart({diags}){
  const max=Math.max(...diags.map(d=>d.n),1);
  return(
    <div className="space-y-1.5">
      {diags.map((d,i)=>(
        <div key={d.code} className="flex items-center gap-2">
          <span className="text-xs text-slate-400 w-4 text-right">{i+1}</span>
          <span className="text-xs font-mono text-blue-600 w-10 flex-shrink-0">{d.code}</span>
          <div className="flex-1 bg-slate-100 rounded-full h-4 relative overflow-hidden">
            <div className="h-full rounded-full" style={{width:`${d.n/max*100}%`,background:'linear-gradient(90deg,#3B82F6,#6366F1)'}}/>
            <span className="absolute inset-0 flex items-center pl-2 text-xs text-slate-700 font-medium truncate">{d.libelle}</span>
          </div>
          <span className="text-xs font-semibold text-slate-600 w-7 text-right">{d.n}</span>

      ))}

}

function SaisonnaliteChart({data}){
  const W=560,H=180,pad={t:20,r:20,b:30,l:30};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const months=data.map(d=>d.month);
  const maxV=Math.max(...data.flatMap(d=>[d.resp,d.card,d.inf]),1);
  const px=(i)=>pad.l+i*(iW/(data.length-1));
  const py=(v)=>pad.t+iH-(v/maxV*iH);
  const line=(key,color)=>{
    const pts=data.map((d,i)=>`${px(i)},${py(d[key])}`).join(' ');
    const area=`M${px(0)},${py(0)} `+data.map((d,i)=>`L${px(i)},${py(d[key])}`).join(' ')+` L${px(data.length-1)},${pad.t+iH} L${px(0)},${pad.t+iH} Z`;
    return(<g>
      <path d={area} fill={color} opacity={0.1}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round"/>
      {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d[key])} r={3} fill={color}/>)}
    </g>);
  };
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+iH*(1-f);
        return<g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#f1f5f9" strokeWidth={1}/><text x={pad.l-4} y={y+4} textAnchor="end" fontSize={8} fill="#94a3b8">{Math.round(maxV*f)}</text></g>;
      })}
      {months.map((m,i)=><text key={m} x={px(i)} y={H-6} textAnchor="middle" fontSize={8} fill="#94a3b8">{m}</text>)}
      {line('resp','#3b82f6')}
      {line('card','#ef4444')}
      {line('inf','#10b981')}
      <g transform={`translate(${W-120},${pad.t})`}>
        {[['#3B82F6','Respiratoire'],['#ef4444','Cardiaque'],['#10b981','Infectieux']].map(([c,l],i)=>(
          <g key={l} transform={`translate(0,${i*16})`}>
            <rect width={10} height={6} y={0} rx={2} fill={c}/>
            <text x={14} y={7} fontSize={8} fill="#64748b">{l}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

function ForecastChart({monthly,forecast,demoMonthly,demoForecast,useDemo}){
  const hist=useDemo?demoMonthly:monthly;
  const proj=useDemo?demoForecast:forecast;
  if(!hist||hist.length===0) return<div className="text-slate-400 text-sm text-center py-8">Aucune donnée disponible</div>;
  const all=[...hist,...(proj||[])];
  const W=560,H=180,pad={t:20,r:20,b:30,l:30};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const maxV=Math.max(...all.map(d=>d.n),1);
  const px=i=>pad.l+i*(iW/(all.length-1));
  const py=v=>pad.t+iH-(v/maxV*iH);
  const histPts=hist.map((d,i)=>`${px(i)},${py(d.n)}`).join(' ');
  const projOffset=hist.length-1;
  const projPts=proj?.map((d,i)=>`${px(projOffset+i)},${py(d.n)}`).join(' ')||'';
  const joinPt=`${px(projOffset)},${py(hist[hist.length-1].n)}`;
  const fullProjPts=proj?`${joinPt} ${projPts}`:'';
  const areaPath=`M${px(0)},${pad.t+iH} `+hist.map((d,i)=>`L${px(i)},${py(d.n)}`).join(' ')+` L${px(hist.length-1)},${pad.t+iH} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      <defs>
        <linearGradient id="fgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3B82F6" stopOpacity="0.2"/>
          <stop offset="100%" stopColor="#3B82F6" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+iH*(1-f);
        return<g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#f1f5f9" strokeWidth={1}/><text x={pad.l-4} y={y+4} textAnchor="end" fontSize={8} fill="#94a3b8">{Math.round(maxV*f)}</text></g>;
      })}
      {all.map((d,i)=>{
        if(i%3!==0&&i!==all.length-1) return null;
        return<text key={d.month} x={px(i)} y={H-6} textAnchor="middle" fontSize={8} fill="#94a3b8">{d.month.slice(2)}</text>;
      })}
      <path d={areaPath} fill="url(#fgrd)"/>
      <polyline points={histPts} fill="none" stroke="#3B82F6" strokeWidth={2.5} strokeLinejoin="round"/>
      {proj&&<polyline points={fullProjPts} fill="none" stroke="#f59e0b" strokeWidth={2} strokeDasharray="6,3" strokeLinejoin="round"/>}
      {hist.map((d,i)=><circle key={i} cx={px(i)} cy={py(d.n)} r={3} fill="#3b82f6"/>)}
      {proj?.map((d,i)=><circle key={i} cx={px(projOffset+i)} cy={py(d.n)} r={3} fill="#f59e0b" stroke="white" strokeWidth={1.5}/>)}
      <g transform={`translate(${W-160},${pad.t})`}>
        <rect width={10} height={4} y={1} rx={2} fill="#3b82f6"/><text x={14} y={7} fontSize={8} fill="#64748b">Historique</text>
        <rect width={10} height={4} y={17} rx={2} fill="#f59e0b"/><text x={14} y={23} fontSize={8} fill="#64748b">Prévision (régression linéaire)</text>
      </g>
    </svg>
  );
}

      ['Taux de validation (%)',data.validationRate],
      ['Avec ordonnance',data.withPrescription],
      ['Taux ordonnances (%)',data.prescriptionRate],
      ['Durée moyenne (min)',data.avgDuration||'N/A'],
      ['Total patients',data.totalPatients],
      ['% Femmes',data.pctFemmes],
      ['% Hommes',data.pctHommes],
      ['Âge moyen (ans)',data.avgAge||'N/A'],
      [],
      ['Top motifs','Occurrences'],
      ...( data.topMotifs||[]).map(m=>[m.motif,m.n]),
      [],
      ['Assurances','Patients'],
      ...(data.byInsurance||[]).map(a=>[a.typeAssurance,a.n]),
    ];
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`analytics-${from}-${to}.csv`;a.click();
  };

  const StatCard=({label,value,sub,color='blue'})=>{
    const colors={blue:'from-blue-500 to-blue-700',teal:'from-teal-500 to-teal-700',violet:'from-violet-500 to-violet-700',emerald:'from-emerald-500 to-emerald-700',rose:'from-rose-500 to-rose-700',amber:'from-amber-500 to-amber-700'};
    return(
      <div className={`bg-gradient-to-br ${colors[color]||colors.blue} rounded-2xl p-5 text-white shadow-lg`}>
        <p className="text-white/70 text-xs font-medium mb-1">{label}</p>
        <p className="text-3xl font-bold">{value??'—'}</p>
        {sub&&<p className="text-white/60 text-xs mt-1">{sub}</p>}
      </div>
    );
  };

  // Simple inline bar chart
  const BarChartSVG=({data:d,color='#3b82f6'})=>{
    if(!d||!d.length)return<p className="text-slate-400 text-sm text-center py-4">Aucune donnée</p>;
    const max=Math.max(...d.map(x=>x.n),1);
    const W=460,H=80,barW=Math.max(Math.floor(W/d.length)-2,4);
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} className="overflow-visible">
        {d.map((x,i)=>{
          const bh=Math.max((x.n/max)*(H-10),2);
          const bx=i*(W/d.length);
          return<g key={i}>
            <rect x={bx+1} y={H-bh} width={barW} height={bh} fill={color} rx="2" opacity="0.85"/>
            {d.length<=14&&<text x={bx+barW/2} y={H+14} fontSize="9" textAnchor="middle" fill="#94a3b8">{x.d?.slice(5)||x.h+'h'}</text>}
          </g>;
        })}
      </svg>
    );
  };

  return(
    <Page title="Analytiques" subtitle="Insights sur votre activité médicale">
      {/* Controls */}
      <div className="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm mb-6 flex flex-wrap items-center gap-3">
        <div className="flex items-center gap-2">
          <input type="date" value={from} max={to} onChange={e=>setFrom(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          <span className="text-slate-400 text-sm">→</span>
          <input type="date" value={to} min={from} max={today} onChange={e=>setTo(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          <Btn variant="primary" onClick={apply} size="sm">Appliquer</Btn>
        </div>
        <div className="flex gap-2">
          {[['7j',7],['30j',30],['3 mois',90],['Année',365]].map(([l,d])=>(
            <button key={l} onClick={()=>preset(d)} className="px-3 py-1.5 text-xs font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg">{l}</button>
          ))}
        </div>
        <div className="ml-auto">
          <Btn variant="secondary" onClick={downloadCSV} icon={Ic.Download} size="sm">Télécharger CSV</Btn>
        </div>
      </div>

      {loading&&<div className="flex justify-center py-16"><Ic.Spin className="w-8 h-8 text-blue-500"/></div>}

      {data&&!loading&&(
        <div className="space-y-6">
          {/* KPI cards */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Consultations" value={data.totalConsults} sub={`${data.period.from} → ${data.period.to}`} color="blue"/>
            <StatCard label="Taux de validation" value={`${data.validationRate}%`} sub={`${data.validated} notes validées`} color="emerald"/>
            <StatCard label="Taux d'ordonnances" value={`${data.prescriptionRate}%`} sub={`${data.withPrescription} prescriptions`} color="violet"/>
            <StatCard label="Durée moyenne" value={data.avgDuration?`${data.avgDuration} min`:'—'} sub="par consultation" color="teal"/>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Total patients" value={data.totalPatients} color="blue"/>
            <StatCard label="Femmes" value={`${data.pctFemmes}%`} sub={`${data.femmes} patientes`} color="rose"/>
            <StatCard label="Hommes" value={`${data.pctHommes}%`} sub={`${data.hommes} patients`} color="teal"/>
            <StatCard label="Âge moyen" value={data.avgAge?`${data.avgAge} ans`:'—'} sub="des patients" color="amber"/>
          </div>

          {/* Charts row */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Daily activity */}
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Activité quotidienne</h3>
              <BarChartSVG data={data.daily} color="#3b82f6"/>
            </div>

            {/* Top motifs */}
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Top motifs de consultation</h3>
              {data.topMotifs?.length===0&&<p className="text-slate-400 text-sm">Aucun motif enregistré</p>}
              <div className="space-y-3">
                {data.topMotifs?.map((m,i)=>{
                  const pct=data.totalConsults>0?Math.round(m.n/data.totalConsults*100):0;
                  return(
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm text-slate-700 truncate max-w-xs">{m.motif}</span>
                        <span className="text-xs font-bold text-slate-500 ml-2">{m.n} ({pct}%)</span>
                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Insurance & hours */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Répartition par assurance</h3>
              {data.byInsurance?.length===0&&<p className="text-slate-400 text-sm">Aucune donnée</p>}
              <div className="space-y-3">
                {data.byInsurance?.map((a,i)=>{
                  const pct=data.totalPatients>0?Math.round(a.n/data.totalPatients*100):0;
                  const colors=['bg-blue-500','bg-teal-500','bg-violet-500','bg-amber-500','bg-rose-500'];
                  return(
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm text-slate-700">{a.typeAssurance||'Non renseignée'}</span>
                        <span className="text-xs font-bold text-slate-500">{a.n} patients ({pct}%)</span>
                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full ${colors[i%colors.length]} rounded-full`} style={{width:`${pct}%`}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Consultations par heure</h3>
              <BarChartSVG data={data.byHour?.map(x=>({...x,d:x.h+'h'}))} color="#8b5cf6"/>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════════════ */
function ProfilePage({user,onUpdate}){
  const [form,setForm]=useState({nom:user?.nom||'',prenom:user?.prenom||'',rpps:user?.rpps||'',specialite:user?.specialite||'',telephone:user?.telephone||'',adresse:user?.adresse||'',photo:user?.photo||''});
  const [pwForm,setPwForm]=useState({current:'',next:'',confirm:''});
  const [saving,setSaving]=useState(false);
  const [pwSaving,setPwSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const [pwMsg,setPwMsg]=useState('');

  useEffect(()=>{api.get('/auth/me').then(u=>{if(u?.id)setForm({nom:u.nom||'',prenom:u.prenom||'',rpps:u.rpps||'',specialite:u.specialite||'',telephone:u.telephone||'',adresse:u.adresse||'',photo:u.photo||''});});},[]);

  const saveProfile=async()=>{setSaving(true);const u=await api.put('/auth/profile',form);setSaving(false);if(u.id){setMsg('Profil mis à jour ✓');onUpdate(u);setTimeout(()=>setMsg(''),3000);}};
  const savePw=async()=>{if(pwForm.next!==pwForm.confirm){setPwMsg('Les mots de passe ne correspondent pas');return;}setPwSaving(true);const r=await api.put('/auth/password',{current:pwForm.current,next:pwForm.next});setPwSaving(false);if(r.ok){setPwMsg('Mot de passe mis à jour ✓');setPwForm({current:'',next:'',confirm:''});setTimeout(()=>setPwMsg(''),3000);}else setPwMsg(r.error||'Erreur');};
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const setPw=k=>e=>setPwForm(f=>({...f,[k]:e.target.value}));

  return(
    <Page title="Mon profil" subtitle="Gérez vos informations et votre accès">
      <div className="max-w-2xl space-y-6">
        {/* Avatar header */}
        <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 flex items-center gap-5 text-white">
          {form.photo
            ? <img src={encodeURI(form.photo)} alt="" className="w-20 h-20 rounded-3xl object-cover flex-shrink-0 shadow-lg"/>
            : <div className="w-20 h-20 rounded-3xl bg-white/20 flex items-center justify-center text-3xl font-bold flex-shrink-0">{initials(form.prenom,form.nom)}</div>
          }
          <div>
            <h2 className="text-xl font-bold">{form.prenom} {form.nom}</h2>
            <p className="text-blue-200 text-sm">{form.specialite||'Médecin'}</p>
            {form.rpps&&<p className="text-blue-200/70 text-xs mt-1">N° RPPS : {form.rpps}</p>}
          </div>
        </div>

        {/* Profile form */}
        <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
          <h3 className="font-semibold text-slate-900 mb-5">Informations professionnelles</h3>
          {msg&&<div className="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-2.5 rounded-xl">{msg}</div>}
          <div className="grid grid-cols-2 gap-4">
            <Input label="Prénom" value={form.prenom} onChange={set('prenom')}/>
            <Input label="Nom" value={form.nom} onChange={set('nom')}/>
            <Input label="N° RPPS" value={form.rpps} onChange={set('rpps')}/>
            <Input label="Spécialité" value={form.specialite} onChange={set('specialite')}/>
            <Input label="Téléphone" value={form.telephone} onChange={set('telephone')}/>
            <Input label="Adresse du cabinet" value={form.adresse} onChange={set('adresse')}/>
          </div>
          <div className="mt-4 flex justify-end">
            <Btn variant="primary" onClick={saveProfile} loading={saving} icon={Ic.Check}>Enregistrer</Btn>
          </div>
        </div>

        {/* Password */}
        <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
          <h3 className="font-semibold text-slate-900 mb-5 flex items-center gap-2"><Ic.Key className="w-4 h-4 text-slate-400"/>Sécurité</h3>
          {pwMsg&&<div className={`mb-4 text-sm px-4 py-2.5 rounded-xl border ${pwMsg.includes('✓')?'bg-emerald-50 border-emerald-200 text-emerald-700':'bg-rose-50 border-rose-200 text-rose-700'}`}>{pwMsg}</div>}
          <div className="space-y-4">
            <Input label="Mot de passe actuel" type="password" value={pwForm.current} onChange={setPw('current')}/>
            <Input label="Nouveau mot de passe" type="password" value={pwForm.next} onChange={setPw('next')}/>
            <Input label="Confirmer le nouveau mot de passe" type="password" value={pwForm.confirm} onChange={setPw('confirm')}/>
          </div>
          <div className="mt-4 flex justify-end">
            <Btn variant="primary" onClick={savePw} loading={pwSaving} icon={Ic.Key}>Changer le mot de passe</Btn>
          </div>
        </div>
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   AUDIT LOG
══════════════════════════════════════════════════════════════ */
function AuditLog(){
  const [logs,setLogs]=useState([]);
  const [total,setTotal]=useState(0);
  const [page,setPage]=useState(0);
  useEffect(()=>{api.get(`/audit?page=${page}`).then(d=>{setLogs(d.logs||[]);setTotal(d.total||0);});},[page]);
  const actionColor=a=>a.includes('LOGIN')?'blue':a.includes('VALIDATE')?'green':a.includes('CREATE')?'violet':a.includes('DELETE')?'red':'slate';
  return(
    <Page title="Journal d'audit" subtitle={`${total} événements enregistrés`}>
      <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wide">
            <th className="text-left px-6 py-3.5">Date</th>
            <th className="text-left px-4 py-3.5">Utilisateur</th>
            <th className="text-left px-4 py-3.5">Action</th>
            <th className="text-left px-4 py-3.5">Entité</th>
            <th className="text-left px-4 py-3.5">Détails</th>
          </tr></thead>
          <tbody className="divide-y divide-slate-50">
            {logs.map(l=>(
              <tr key={l.id} className="hover:bg-slate-50/50">
                <td className="px-6 py-3 text-slate-400 text-xs whitespace-nowrap">{l.createdAt?.replace('T',' ').slice(0,19)}</td>
                <td className="px-4 py-3 text-slate-600 text-xs">{l.userEmail||'—'}</td>
                <td className="px-4 py-3"><Badge color={actionColor(l.action||'')} size="xs">{l.action}</Badge></td>
                <td className="px-4 py-3 text-slate-500 text-xs">{l.entityType||'—'}</td>
                <td className="px-4 py-3 text-slate-400 text-xs truncate max-w-xs">{l.details||'—'}</td>
              </tr>
            ))}
            {!logs.length&&<tr><td colSpan={5} className="px-6 py-10 text-center text-slate-400 text-sm">Aucun événement</td></tr>}
          </tbody>
        </table>
        {total>50&&(
          <div className="px-6 py-3 border-t border-slate-100 flex items-center justify-between text-sm text-slate-500">
            <span>Page {page+1} / {Math.ceil(total/50)}</span>
            <div className="flex gap-2">
              {page>0&&<Btn variant="secondary" size="sm" onClick={()=>setPage(p=>p-1)}>← Précédent</Btn>}
              {(page+1)*50<total&&<Btn variant="secondary" size="sm" onClick={()=>setPage(p=>p+1)}>Suivant →</Btn>}
            </div>
          </div>
        )}
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   AGENDA
══════════════════════════════════════════════════════════════ */
function AgendaPage(){
  const [current, setCurrent] = useState(new Date());
  const [appointments, setAppointments] = useState([]);
  const [patients, setPatients] = useState([]);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0,10));
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({patientId:'',date:'',heure:'09:00',motif:'',notes:''});
  const [patSearch, setPatSearch] = useState('');
  const [saving, setSaving] = useState(false);

  const year = current.getFullYear();
  const month = current.getMonth();

  const fromDate = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month+1, 0).getDate();
  const toDate = `${year}-${String(month+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

  useEffect(()=>{
    api.get(`/agenda?from=${fromDate}&to=${toDate}`).then(setAppointments);
    api.get('/patients').then(r=>setPatients(r.patients||r||[]));
  },[fromDate, toDate]);

  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  const firstDayOfMonth = new Date(year, month, 1).getDay();
  const startOffset = (firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1);
  const totalCells = Math.ceil((lastDay + startOffset) / 7) * 7;
  const cells = Array.from({length: totalCells}, (_, i) => {
    const d = i - startOffset + 1;
    if (d < 1 || d > lastDay) return null;
    return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  });

  const apptsByDate = {};
  appointments.forEach(a => { (apptsByDate[a.date]||(apptsByDate[a.date]=[])).push(a); });

  const dayAppts = (apptsByDate[selectedDate]||[]).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));

  const openCreate = () => {
    setForm({patientId:'',date:selectedDate,heure:'09:00',motif:'',notes:''});
    setPatSearch('');
    setModal({mode:'create'});
  };
  const openEdit = appt => {
    const pat = patients.find(p=>p.id===appt.patientId);
    setForm({patientId:appt.patientId,date:appt.date,heure:appt.heure||'09:00',motif:appt.motif||'',notes:appt.notes||''});
    setPatSearch(pat?`${pat.prenom} ${pat.nom}`:'');
    setModal({mode:'edit', appt});
  };

  const saveAppt = async () => {
    if(!form.patientId||!form.date){return;}
    setSaving(true);
    if(modal.mode==='create'){
      const r=await api.post('/agenda',form);
      setAppointments(a=>[...a,r]);
    } else {
      const r=await api.put('/agenda/'+modal.appt.id,{...form,statut:modal.appt.statut||'planifie'});
      setAppointments(a=>a.map(x=>x.id===modal.appt.id?r:x));
    }
    setSaving(false);
    setModal(null);
  };

  const deleteAppt = async id => {
    if(!confirm('Supprimer ce rendez-vous ?'))return;
    await api.delete('/agenda/'+id);
    setAppointments(a=>a.filter(x=>x.id!==id));
  };

  const statusColor = s => s==='confirme'?'bg-emerald-500':s==='annule'?'bg-rose-400':'bg-blue-500';
  const statusLabel = s => s==='confirme'?'Confirmé':s==='annule'?'Annulé':'Planifié';
  const statusBadge = s => s==='confirme'?'green':s==='annule'?'red':'blue';

  const filteredPats = patSearch.length>=2 ? patients.filter(p=>`${p.prenom} ${p.nom}`.toLowerCase().includes(patSearch.toLowerCase())).slice(0,6) : [];

  return(
    <Page title="Agenda" subtitle={`${monthNames[month]} ${year}`}
      actions={<Btn icon={Ic.Plus} onClick={openCreate}>Nouveau RDV</Btn>}>
      <div className="flex gap-6">
        {/* Calendar */}
        <div className="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          {/* Month nav */}
          <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
            <button onClick={()=>setCurrent(new Date(year, month-1, 1))} className="p-2 rounded-lg hover:bg-slate-100 text-slate-500">
              <Ic.Back className="w-4 h-4"/>
            </button>
            <h3 className="font-semibold text-slate-800">{monthNames[month]} {year}</h3>
            <button onClick={()=>setCurrent(new Date(year, month+1, 1))} className="p-2 rounded-lg hover:bg-slate-100 text-slate-500">
              <Ic.Chevron className="w-4 h-4"/>
            </button>
          </div>
          {/* Day headers */}
          <div className="grid grid-cols-7 border-b border-slate-100">
            {dayNames.map(d=><div key={d} className="py-2 text-center text-xs font-semibold text-slate-400 uppercase tracking-wide">{d}</div>)}
          </div>
          {/* Day cells */}
          <div className="grid grid-cols-7">
            {cells.map((date, i)=>{
              if(!date) return <div key={i} className="h-20 border-b border-r border-slate-50"/>;
              const dayNum = parseInt(date.slice(8));
              const isToday = date === new Date().toISOString().slice(0,10);
              const isSelected = date === selectedDate;
              const appts = apptsByDate[date]||[];
              return(
                <div key={date} onClick={()=>setSelectedDate(date)}
                  className={`h-20 p-1.5 border-b border-r border-slate-50 cursor-pointer hover:bg-blue-50/50
                    ${isSelected?'bg-blue-50 ring-1 ring-inset ring-blue-200':''}`}>
                  <span className={`inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-semibold mb-1
                    ${isToday?'bg-blue-600 text-white':isSelected?'text-blue-700':'text-slate-600'}`}>
                    {dayNum}
                  </span>
                  <div className="space-y-0.5">
                    {appts.slice(0,3).map(a=>(
                      <div key={a.id} className={`text-[10px] px-1 py-0.5 rounded truncate text-white font-medium ${statusColor(a.statut)}`}>
                        {a.heure} {a.prenom}
                      </div>
                    ))}
                    {appts.length>3&&<div className="text-[10px] text-slate-400 pl-1">+{appts.length-3}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Day panel */}
        <div className="w-72 flex-shrink-0">
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-semibold text-slate-800 text-sm">
                {new Date(selectedDate+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
              </h3>
              <button onClick={openCreate} className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-white hover:bg-blue-700">
                <Ic.Plus className="w-3.5 h-3.5"/>
              </button>
            </div>
            {dayAppts.length===0
              ? <div className="text-center py-8 text-slate-400 text-sm">
                  <Ic.Calendar className="w-8 h-8 mx-auto mb-2 opacity-30"/>
                  <p>Aucun RDV ce jour</p>
                </div>

                  {dayAppts.map(a=>(
                    <div key={a.id} className="bg-slate-50 rounded-xl p-3 hover:bg-blue-50 cursor-pointer group" onClick={()=>openEdit(a)}>
                      <div className="flex items-start justify-between gap-2">

                        </div>
                      </div>

              <div className="flex justify-between text-sm"><span className="text-slate-600">Annulés</span><span className="font-semibold text-rose-500">{appointments.filter(a=>a.statut==='annule').length}</span></div>
            </div>
          </div>
        </div>
      </div>

      {/* Modal */}
      {modal&&(
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={()=>setModal(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
            <h3 className="text-lg font-bold text-slate-900 mb-5">{modal.mode==='create'?'Nouveau rendez-vous':'Modifier le rendez-vous'}</h3>
            <div className="space-y-4">
              {/* Patient search */}
              <div className="relative">
                <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Patient *</label>
                <input value={patSearch} onChange={e=>{setPatSearch(e.target.value);if(!e.target.value)setForm(f=>({...f,patientId:''}));}}
                  placeholder="Rechercher un patient..." className="w-full border border-slate-200 bg-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-400"/>
                {filteredPats.length>0&&(
                  <div className="absolute z-10 left-0 right-0 bg-white border border-slate-200 rounded-xl mt-1 shadow-lg overflow-hidden">
                    {filteredPats.map(p=>(
                      <button key={p.id} className="w-full px-4 py-2.5 text-sm text-left hover:bg-blue-50 flex items-center gap-2"
                        onClick={()=>{setForm(f=>({...f,patientId:p.id}));setPatSearch(`${p.prenom} ${p.nom}`);}}>
                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0 ${avatarColor(p.sexe)}`}>{initials(p.prenom,p.nom)}</div>
                        <span>{p.prenom} {p.nom}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Date *</label>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Heure</label>
                  <input type="time" value={form.heure} onChange={e=>setForm(f=>({...f,heure:e.target.value}))}
                    className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
              </div>
              <Input label="Motif" value={form.motif} onChange={e=>setForm(f=>({...f,motif:e.target.value}))} placeholder="Ex: Consultation de suivi"/>
              <Input label="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} textarea rows={2} placeholder="Informations complémentaires..."/>
              {modal.mode==='edit'&&(
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Statut</label>
                  <select value={modal.appt.statut||'planifie'} onChange={e=>setModal(m=>({...m,appt:{...m.appt,statut:e.target.value}}))}
                    className="w-full border border-slate-200 bg-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="planifie">Planifié</option>
                    <option value="confirme">Confirmé</option>
                    <option value="annule">Annulé</option>
                  </select>
                </div>
              )}
            </div>
            <div className="flex gap-3 mt-6">
              <Btn variant="secondary" onClick={()=>setModal(null)} size="md">Annuler</Btn>
              <Btn onClick={saveAppt} loading={saving} disabled={!form.patientId||!form.date} size="md">{modal.mode==='create'?'Créer':'Enregistrer'}</Btn>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   DOC MODAL (Arrêt, Certificat, Adressage)

function DocModal({consultationId,patient,onClose}){
  const[type,setType]=useState('arret');
  const[loading,setLoading]=useState(false);
  const[duree,setDuree]=useState(3);
  const[dateDebut,setDateDebut]=useState(new Date().toISOString().slice(0,10));
  const[sortie,setSortie]=useState('autorisee');
  const[objet,setObjet]=useState('');
  const[observations,setObservations]=useState('');
  const[specialiste,setSpecialiste]=useState('');
  const[specialiteAdre,setSpecialiteAdre]=useState('');
  const[motif,setMotif]=useState('');

  const routes={arret:'arret-maladie',certificat:'certificat',adressage:'adressage'};
  const bodies={arret:{duree,dateDebut,sortie},certificat:{objet,observations},adressage:{specialiste,specialite:specialiteAdre,motif}};

  const generate=async()=>{
    setLoading(true);
    const r=await fetch(`${API}/consultations/${consultationId}/${routes[type]}/pdf`,{
      method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},
      body:JSON.stringify(bodies[type])
    });
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`${routes[type]}-${patient?.nom||'patient'}.pdf`;a.click();
    URL.revokeObjectURL(url);setLoading(false);
  };

  const inp='w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500';
  const lbl='block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide';
  const tabs=[{id:'arret',label:'Arrêt maladie'},{id:'certificat',label:'Certificat'},{id:'adressage',label:'Adressage'}];

  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 fade-in">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 className="font-bold text-slate-900">Documents médicaux</h3>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100">✕</button>
        </div>
        <div className="px-6 py-5">
          <div className="flex gap-1 bg-slate-100 rounded-xl p-1 mb-5">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setType(t.id)}
                className={`flex-1 py-2 rounded-lg text-xs font-semibold ${type===t.id?'bg-white text-slate-900 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
                {t.label}
              </button>
            ))}
          </div>
          <div className="bg-slate-50 rounded-xl px-4 py-3 mb-5">
            <p className="text-sm font-medium text-slate-900">{patient?.prenom} {patient?.nom}</p>
            <p className="text-xs text-slate-500 mt-0.5">{ageStr(patient?.dateNaissance)} · {patient?.typeAssurance||'Assurance non renseignée'}</p>
          </div>

          {type==='arret'&&<div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div><label className={lbl}>Date de début</label>
                <input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)} className={inp}/></div>
              <div><label className={lbl}>Durée (jours)</label>
                <input type="number" min="1" value={duree} onChange={e=>setDuree(e.target.value)} className={inp}/></div>
            </div>
            <div><label className={lbl}>Sorties</label>
              <select value={sortie} onChange={e=>setSortie(e.target.value)} className={inp}>
                <option value="autorisee">Autorisées</option>
                <option value="interdite">Interdites</option>
                <option value="autorisee_horaires">Autorisées aux heures habituelles</option>
              </select></div>
          </div>}

          {type==='certificat'&&<div className="space-y-3">
            <div><label className={lbl}>Objet du certificat</label>
              <input type="text" value={objet} onChange={e=>setObjet(e.target.value)}
                placeholder="Ex : aptitude sportive, inaptitude temporaire..." className={inp}/></div>
            <div><label className={lbl}>Observations (optionnel)</label>
              <textarea value={observations} onChange={e=>setObservations(e.target.value)}
                rows={3} placeholder="Informations complémentaires..." className={inp+' resize-none'}/></div>
          </div>}

          {type==='adressage'&&<div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div><label className={lbl}>Spécialiste</label>
                <input type="text" value={specialiste} onChange={e=>setSpecialiste(e.target.value)}
                  placeholder="Dr. Nom" className={inp}/></div>
              <div><label className={lbl}>Spécialité</label>
                <input type="text" value={specialiteAdre} onChange={e=>setSpecialiteAdre(e.target.value)}
                  placeholder="Cardiologie, ORL..." className={inp}/></div>
            </div>
            <div><label className={lbl}>Motif d'adressage</label>
              <textarea value={motif} onChange={e=>setMotif(e.target.value)}
                rows={3} placeholder="Raison de la demande de consultation..." className={inp+' resize-none'}/></div>
          </div>}
        </div>
        <div className="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
          <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
          <Btn variant="primary" icon={Ic.Download} onClick={generate} loading={loading}>Générer PDF</Btn>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   HONORAIRES

function FactureModal({consult,tarifs,onClose,onSave}){
  const firstActe=tarifs[0]?.typeActe||'Consultation simple';
  const[typeActe,setTypeActe]=useState(firstActe);
  const[montant,setMontant]=useState(()=>{const t=tarifs.find(t=>t.typeActe===firstActe);return t?.montant||5000;});
  const[statut,setStatut]=useState('en_attente');
  const[caisse,setCaisse]=useState(consult?.typeAssurance||'');
  const[dateFact,setDateFact]=useState(new Date().toISOString().slice(0,10));
  const[datePay,setDatePay]=useState(new Date().toISOString().slice(0,10));
  const[notes,setNotes]=useState('');
  const[saving,setSaving]=useState(false);
  useEffect(()=>{const t=tarifs.find(t=>t.typeActe===typeActe);if(t)setMontant(t.montant);},[typeActe]);
  const handleSave=async()=>{
    setSaving(true);
    await api.post('/honoraires',{consultationId:consult.id,montant:Number(montant),statut,caisse:caisse||null,typeActe,dateFacturation:dateFact,datePaiement:statut==='paye'?datePay:null,notes:notes||null});
    await onSave();onClose();
  };
  const sel='w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500';
  const inp='w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500';
  const lbl='block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide';
  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 fade-in">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 className="font-bold text-slate-900">Facturer la consultation</h3>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100">✕</button>
        </div>
        <div className="px-6 py-5 space-y-4">
          <div className="bg-slate-50 rounded-xl px-4 py-3">
            <p className="text-sm font-medium text-slate-900">{consult?.prenom} {consult?.nom}</p>
            <p className="text-xs text-slate-500 mt-0.5">{consult?.motif} · {fmtDate(consult?.date)}</p>
          </div>
          <div><label className={lbl}>Type d'acte</label>
            <select value={typeActe} onChange={e=>setTypeActe(e.target.value)} className={sel}>
              {tarifs.map(t=><option key={t.typeActe} value={t.typeActe}>{t.typeActe} — {new Intl.NumberFormat('fr-FR').format(t.montant)} FCFA</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className={lbl}>Montant (FCFA)</label>
              <input type="number" value={montant} onChange={e=>setMontant(e.target.value)} className={inp}/></div>
            <div><label className={lbl}>Caisse</label>
              <select value={caisse} onChange={e=>setCaisse(e.target.value)} className={sel}>
                <option value="">Non spécifié</option>
                {['CNAMGS','CNSS','Saham','NSIA','Particulier'].map(c=><option key={c}>{c}</option>)}
              </select></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className={lbl}>Statut</label>
              <select value={statut} onChange={e=>setStatut(e.target.value)} className={sel}>
                <option value="en_attente">En attente</option>
                <option value="paye">Payé</option>
              </select></div>
            <div><label className={lbl}>Date facturation</label>
              <input type="date" value={dateFact} onChange={e=>setDateFact(e.target.value)} className={inp}/></div>
          </div>
          {statut==='paye'&&<div><label className={lbl}>Date de paiement</label>
            <input type="date" value={datePay} onChange={e=>setDatePay(e.target.value)} className={inp}/></div>}
          <div><label className={lbl}>Notes</label>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"/></div>
        </div>
        <div className="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
          <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
          <Btn variant="primary" onClick={handleSave} loading={saving}>Enregistrer</Btn>
        </div>
      </div>
    </div>
  );
}

function HonorairesPage(){

    setLoading(true);

    setData(dash);setTarifs(tar);setTarifsDraft(tar);setLoading(false);

    const r=await fetch(`${API}/honoraires/export`,{headers:{Authorization:`Bearer ${getToken()}`}});

    const a=document.createElement('a');a.href=url;a.download='honoraires.csv';a.click();URL.revokeObjectURL(url);
  };
  const saveTarifs=async()=>{setSaving(true);await api.put('/tarifs',{tarifs:tarifsDraft});setTarifs(tarifsDraft);setEditTarifs(false);setSaving(false);};

  const{revenus,projection,nonFactures,rejets,enAttente,vieillissement,parCaisse,kpis}=data||{};
