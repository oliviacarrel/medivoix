          {label:'Ce mois',val:revenus?.mois,emoji:'📊',sub:new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})},

          <div key={label} className="stat-card card-hover">

          <div className="grid grid-cols-3 gap-4">
            {[
              {label:'0 – 30 jours',d:vieillissement?.j0_30,c:'emerald'},
              {label:'30 – 60 jours',d:vieillissement?.j30_60,c:'amber'},
              {label:'60+ jours',d:vieillissement?.j60plus,c:'red'},
            ].map(({label,d,c})=>(
              <div key={label} className={`bg-${c}-50 rounded-xl p-4 border border-${c}-100`}>
                <p className={`text-xs font-semibold text-${c}-600 uppercase tracking-wide mb-2`}>{label}</p>
                <p className={`text-lg font-bold text-${c}-700`}>{fmtFCFA(d?.total)}</p>
                <p className={`text-sm text-${c}-600 mt-0.5`}>{d?.count||0} facture{(d?.count||0)>1?'s':''}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Ventilation par caisse */}
        {parCaisse?.length>0&&(
          <div className="bg-white rounded-2xl border border-slate-100 p-6">
            <h3 className="font-semibold text-slate-900 mb-4">Revenus par caisse — ce mois</h3>
            <div className="space-y-3">
              {parCaisse.map(c=>{
                const maxVal=Math.max(...parCaisse.map(x=>x.total));
                const pct=maxVal>0?(c.total/maxVal)*100:0;
                return(<div key={c.caisse} className="flex items-center gap-4">
                  <div className="w-24 text-sm text-slate-600 font-medium flex-shrink-0">{c.caisse||'Autre'}</div>
                  <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}/>
                  </div>
                  <div className="text-sm font-semibold text-slate-900 w-36 text-right flex-shrink-0">{fmtFCFA(c.total)}</div>
                  <div className="text-xs text-slate-400 w-16 text-right flex-shrink-0">{c.count} acte{c.count>1?'s':''}</div>
                </div>);
              })}
            </div>
          </div>
        )}

        {/* Avance sur honoraires */}
        <div className="rounded-2xl p-6 text-white" style={{background:'linear-gradient(135deg,#1E40AF,#3B82F6)'}}>
          <div className="flex items-start gap-4">
            <div className="flex-1">
              <p className="text-blue-300 text-xs font-semibold uppercase tracking-wide mb-1">💳 Avance sur honoraires</p>
              <h3 className="text-xl font-bold mb-2">Besoin de liquidités rapidement ?</h3>
              <p className="text-blue-100 text-sm leading-relaxed mb-4">
                Obtenez jusqu'à <strong>70% de vos créances en attente</strong> en avance, remboursé automatiquement à l'encaissement.
                Idéal pour gérer votre trésorerie face aux délais de paiement des caisses.
              </p>
              <div className="flex gap-6 mb-4">
                <div><p className="text-blue-300 text-xs">Créances éligibles</p><p className="font-bold text-lg">{fmtFCFA(enAttente?.total)}</p></div>
                <div><p className="text-blue-300 text-xs">Avance possible (70%)</p><p className="font-bold text-lg">{fmtFCFA((enAttente?.total||0)*0.7)}</p></div>
              </div>
              <button className="bg-white text-blue-700 font-semibold px-5 py-2 rounded-xl text-sm hover:bg-blue-50">Simuler mon avance →</button>
            </div>
            <div className="text-7xl opacity-10 flex-shrink-0 select-none">💳</div>
          </div>
        </div>
      </div>}

      {/* Tab: Facturation */}
      {tab==='facturation'&&<div className="space-y-6">
        {nonFactures?.items?.length>0&&(
          <div className="bg-white rounded-2xl border border-slate-100">
            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h3 className="font-semibold text-slate-900">Actes non facturés</h3>
              <Badge color="amber">{nonFactures.count}</Badge>
            </div>
            <div className="divide-y divide-slate-50">
              {nonFactures.items.map(c=>(
                <div key={c.id} className="px-6 py-4 flex items-center gap-4">
                  <div className="flex-1 min-w-0">
                    <p className="font-medium text-slate-900 text-sm">{c.prenom} {c.nom}</p>
                    <p className="text-xs text-slate-500 mt-0.5 truncate">{c.motif} · {fmtDate(c.date)}</p>
                    {c.typeAssurance&&<span className="mt-1 inline-block"><Badge color="blue" size="xs">{c.typeAssurance}</Badge></span>}
                  </div>
                  <Btn variant="primary" size="sm" onClick={()=>setFactureModal(c)}>Facturer</Btn>
                </div>
              ))}
            </div>
          </div>
        )}

        {enAttente?.items?.length>0&&(
          <div className="bg-white rounded-2xl border border-slate-100">
            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h3 className="font-semibold text-slate-900">En attente de paiement</h3>
              <div className="flex items-center gap-3"><span className="text-sm font-semibold text-amber-600">{fmtFCFA(enAttente.total)}</span><Badge color="amber">{enAttente.count}</Badge></div>
            </div>
            <div className="divide-y divide-slate-50">
              {enAttente.items.map(h=>{
                const days=Math.floor((Date.now()-new Date(h.dateFacturation||h.createdAt))/86400000);
                return(<div key={h.id} className="px-6 py-4 flex items-center gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <p className="font-medium text-slate-900 text-sm">{h.prenom} {h.nom}</p>
                      {days>30&&<Badge color={days>60?'red':'amber'} size="xs">{days}j</Badge>}
                    </div>
                    <p className="text-xs text-slate-500 mt-0.5">{h.motif} · {h.caisse||'Caisse non spécifiée'} · {h.typeActe}</p>
                  </div>
                  <p className="font-semibold text-slate-900 text-sm flex-shrink-0">{fmtFCFA(h.montant)}</p>
                  <div className="flex gap-2 flex-shrink-0">
                    <Btn variant="success" size="sm" onClick={()=>updateStatut(h.id,'paye',{datePaiement:new Date().toISOString().slice(0,10)})}>✓ Payé</Btn>
                    <Btn variant="danger" size="sm" onClick={()=>updateStatut(h.id,'rejete')}>Rejeté</Btn>
                  </div>
                </div>);
              })}
            </div>
          </div>
        )}

        {rejets?.items?.length>0&&(
          <div className="bg-white rounded-2xl border border-red-100">
            <div className="px-6 py-4 border-b border-red-100 flex items-center justify-between">
              <h3 className="font-semibold text-slate-900">Rejets caisse</h3>
              <div className="flex items-center gap-3"><span className="text-sm font-semibold text-red-600">{fmtFCFA(rejets.total)}</span><Badge color="red">{rejets.count}</Badge></div>
            </div>
            <div className="divide-y divide-slate-50">
              {rejets.items.map(h=>(
                <div key={h.id} className="px-6 py-4 flex items-center gap-4">
                  <div className="flex-1 min-w-0">
                    <p className="font-medium text-slate-900 text-sm">{h.prenom} {h.nom}</p>
                    <p className="text-xs text-slate-500 mt-0.5">{h.motif} · {fmtDate(h.consultDate)} · {h.caisse} · {h.typeActe}</p>
                  </div>
                  <p className="font-semibold text-slate-900 text-sm flex-shrink-0">{fmtFCFA(h.montant)}</p>
                  <Btn variant="secondary" size="sm" onClick={()=>updateStatut(h.id,'en_attente')}>↩ Relancer</Btn>
                </div>
              ))}
            </div>
          </div>
        )}

        {nonFactures?.count===0&&rejets?.count===0&&enAttente?.count===0&&(
          <div className="text-center py-20 text-slate-400">
            <p className="text-5xl mb-3">✅</p>
            <p className="font-semibold text-slate-600">Tout est à jour !</p>
            <p className="text-sm mt-1">Aucun acte en suspens.</p>
          </div>
        )}
      </div>}

      {/* Tab: Tarifs */}
      {tab==='tarifs'&&(
        <div className="bg-white rounded-2xl border border-slate-100">
          <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <div>
              <h3 className="font-semibold text-slate-900">Grille tarifaire</h3>
              <p className="text-xs text-slate-400 mt-0.5">Tarifs utilisés par défaut lors de la facturation</p>
            </div>
            {!editTarifs
              ? <Btn variant="secondary" size="sm" onClick={()=>{setEditTarifs(true);setTarifsDraft([...tarifs]);}}>Modifier</Btn>
              : <div className="flex gap-2">
                  <Btn variant="secondary" size="sm" onClick={()=>setEditTarifs(false)}>Annuler</Btn>
                  <Btn variant="primary" size="sm" onClick={saveTarifs} loading={saving}>Enregistrer</Btn>
                </div>
            }
          </div>
          <div className="divide-y divide-slate-50">
            {(editTarifs?tarifsDraft:tarifs).map((t,i)=>(
              <div key={i} className="px-6 py-4 flex items-center gap-4">
                <div className="flex-1">
                  {editTarifs
                    ?<input value={t.typeActe} onChange={e=>{const d=[...tarifsDraft];d[i]={...d[i],typeActe:e.target.value};setTarifsDraft(d);}}
                        className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                    :<p className="font-medium text-slate-900 text-sm">{t.typeActe}</p>
                  }
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {editTarifs
                    ?<><input type="number" value={t.montant} onChange={e=>{const d=[...tarifsDraft];d[i]={...d[i],montant:Number(e.target.value)};setTarifsDraft(d);}}
                          className="w-28 border border-slate-200 rounded-xl px-3 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        <span className="text-sm text-slate-500">FCFA</span></>
                    :<p className="font-semibold text-slate-900">{new Intl.NumberFormat('fr-FR').format(t.montant)} FCFA</p>
                  }
                </div>
              </div>
            ))}
          </div>
          {editTarifs&&(
            <div className="px-6 py-3 border-t border-slate-100">
              <button onClick={()=>setTarifsDraft([...tarifsDraft,{typeActe:"Nouveau type d'acte",montant:0}])}
                className="text-sm text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1">
                <Ic.Plus className="w-4 h-4 inline-block mr-1"/>Ajouter un type d'acte
              </button>
            </div>
          )}
        </div>
      )}
    </Page>
  </>);
}

/* ══════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [params,setParams]=useState({});
  const [aiEnabled,setAiEnabled]=useState(true);

  useEffect(()=>{
    if(getToken())api.get('/auth/me').then(u=>{if(u?.id)setUser(u);else setToken(null);}).catch(()=>setToken(null)).finally(()=>setChecking(false));
    else setChecking(false);
  },[]);

  useEffect(()=>{
    if(user)api.get('/dashboard').then(d=>{if(d?.aiEnabled!==undefined)setAiEnabled(d.aiEnabled);});
  },[user]);

  const nav=p=>{
    const parts=p.split('/');
    if(parts[0]==='patient'&&parts[1]){setParams({patientId:parts[1]});setPage('patient');}
    else if(parts[0]==='edit-patient'&&parts[1]){setParams({patientId:parts[1]});setPage('edit-patient');}
    else if(parts[0]==='consultation'&&parts[1]){setParams(pr=>({...pr,consultationId:parts[1],patientId:parts[2]||pr.patientId}));setPage('consultation');}
    else{setParams({});setPage(p);}
  };

  const logout=()=>{setToken(null);setUser(null);};

  if(checking)return<div className="min-h-screen flex items-center justify-center" style={{background:'#F0F4F8'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'16px'}}><div style={{width:'44px',height:'44px',background:'linear-gradient(135deg,#3B82F6,#6366F1)',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(59,130,246,0.35)'}}><Ic.Steth className="w-5 h-5 text-white"/></div><Ic.Spin className="w-6 h-6" style={{color:'#3B82F6'}}/></div></div>;
  if(!user)return<LoginPage onLogin={u=>{setUser(u);setPage('dashboard');}}/>;

  const renderPage=()=>{
    if(page==='patients')return<PatientList onSelect={id=>nav('patient/'+id)} onNew={()=>{setParams({});setPage('new-patient');}}/>;
    if(page==='new-patient')return<PatientForm onSave={()=>nav('patients')} onBack={()=>nav('patients')}/>;
    if(page==='patient')return<PatientFile patientId={params.patientId} userId={user?.id} user={user} onConsultation={(cId,pId)=>{setParams(p=>({...p,consultationId:cId,patientId:pId}));setPage('consultation');}} onEdit={()=>nav('edit-patient/'+params.patientId)} onBack={()=>nav('patients')}/>;
    if(page==='edit-patient')return<PatientForm patientId={params.patientId} onSave={()=>nav('patient/'+params.patientId)} onBack={()=>nav('patient/'+params.patientId)}/>;
    if(page==='consultation')return<ConsultationScreen consultationId={params.consultationId} patientId={params.patientId} onBack={()=>nav('patient/'+params.patientId)}/>;
    if(page==='analytics')return<AnalyticsPage/>;
    if(page==='intelligence')return<IntelligencePage onViewPatient={id=>{setParams(p=>({...p,patientId:id}));nav('patient/'+id);}}/>;
    if(page==='agenda')return<AgendaPage/>;
    if(page==='profile')return<ProfilePage user={user} onUpdate={u=>setUser(u)}/>;
    if(page==='audit')return<AuditLog/>;
    if(page==='honoraires')return<HonorairesPage/>;
    return<Dashboard onNav={nav} user={user}/>;
  };

  return(
    <div className="flex min-h-screen" style={{background:'var(--white)'}}>
      <Sidebar page={page} onNav={nav} user={user} onLogout={logout}/>
      <div className="flex-1 min-w-0 overflow-x-hidden" style={{marginLeft:'240px'}}>
        {/* Demo banner — only shown when AI is not configured */}
        {!aiEnabled&&(
        <div className="bg-amber-50 border-b border-amber-100 px-8 py-2 flex items-center gap-2 text-xs text-amber-700">
          <Ic.Warn className="w-3.5 h-3.5 flex-shrink-0"/>
          <span>Transcription IA désactivée — ajoutez <code className="font-mono bg-amber-100 px-1 rounded">OPENAI_API_KEY</code> dans <code className="font-mono bg-amber-100 px-1 rounded">.env</code> pour l'activer · les données restent chiffrées</span>
        </div>
        )}
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
