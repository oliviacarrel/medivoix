                      <div style={{fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',color:riskFilter===c.key?'rgba(250,250,248,0.7)':'var(--muted)',marginTop:'6px'}}>{c.label}</div>
                    </button>
                  ))}
                </div>
                {/* Methodology note */}
                <div style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'12px 16px',marginBottom:'20px',fontSize:'11px',color:'var(--navy)'}}>
                  <strong>Méthodologie du score de risque :</strong> HTA (+3) · Diabète (+3) · Cardiopathie (+4) · Oncologie (+4) · MRC (+3) · Dyslipidémie (+2) · Polymédication (+2) · Âge ≥65 (+2) · Allergies (+1) · Suivi &gt;180j (+2). Critique ≥8 · Élevé ≥5 · Modéré ≥3 · Faible.
                </div>
                {/* Patient list */}
                <div className="space-y-3">
                  {filtered.length===0&&<div className="text-slate-400 text-sm text-center py-8">Aucun patient dans cette catégorie.</div>}
                  {filtered.map(p=><RiskPatientCard key={p.id} p={p} onView={id=>onViewPatient&&onViewPatient(id)}/>)}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ── Module C — Prévision d'activité ── */}
      {tab==='forecast'&&(
        <div>
          {loading.forecast&&<div style={{fontSize:'12px',color:'var(--muted)',textAlign:'right',marginBottom:'8px'}}>Actualisation…</div>}
          {forecast&&(()=>{
            const hist=useDemo?forecast.demo.monthly:forecast.monthly;
            const proj=useDemo?forecast.demo.forecast:forecast.forecast;
            const avgHist=hist.length>0?Math.round(hist.reduce((s,d)=>s+d.n,0)/hist.length):0;
            const lastN=hist[hist.length-1]?.n||0;
            const prevN=hist[hist.length-2]?.n||lastN;
            const pctChange=prevN?Math.round((lastN-prevN)/prevN*100):0;
            return(
              <div>
                {/* KPIs */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px',marginBottom:'24px'}}>
                  <div className="stat-block card-hover">
                    <span className="stat-n">{avgHist}</span>
                    <span className="stat-l">Moy. mensuelle</span>
                    <span style={{fontSize:'10px',color:'rgba(250,250,248,0.3)',marginTop:'2px'}}>consultations/mois</span>
                  </div>
                  <div className="stat-block card-hover">
                    <span className="stat-n" style={{color:pctChange>=0?'var(--gold)':'#e87070'}}>{pctChange>=0?'+':''}{pctChange}%</span>
                    <span className="stat-l">Évolution M vs M-1</span>
                    <span style={{fontSize:'10px',color:'rgba(250,250,248,0.3)',marginTop:'2px'}}>variation mensuelle</span>
                  </div>
                  <div className="stat-block card-hover">
                    <span className="stat-n" style={{color:'var(--gold)'}}>{proj?.[0]?.n||'—'}</span>
                    <span className="stat-l">Prévision M+1</span>
                    <span style={{fontSize:'10px',color:'rgba(250,250,248,0.3)',marginTop:'2px'}}>consultations prévues</span>
                  </div>
                </div>
                {/* Chart */}
                <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-5">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-sm font-semibold text-slate-700">Historique & prévision (régression linéaire)</h2>
                    {!forecast.hasRealData&&(
                      <label className="flex items-center gap-2 text-xs text-slate-500 cursor-pointer">
                        <input type="checkbox" checked={useDemo} onChange={e=>setUseDemo(e.target.checked)} className="rounded"/>
                        Afficher données démo
                      </label>
                    )}
                  </div>
                  <ForecastChart monthly={forecast.monthly} forecast={forecast.forecast} demoMonthly={forecast.demo.monthly} demoForecast={forecast.demo.forecast} useDemo={useDemo||!forecast.hasRealData}/>
                  {!forecast.hasRealData&&<div style={{marginTop:'12px',background:'var(--gold-pale)',border:'1px solid rgba(184,147,90,0.3)',borderLeft:'3px solid var(--gold)',padding:'8px 14px',fontSize:'11px',color:'var(--navy)'}}>Données de démonstration — la prévision sera recalculée automatiquement avec vos consultations.</div>}
                </div>
                {/* 3-month forecast table */}
                {proj&&(
                  <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                    <h2 className="text-sm font-semibold text-slate-700 mb-4">Prévision sur 3 mois (régression linéaire)</h2>
                    <table className="w-full text-sm">
                      <thead><tr className="text-xs text-slate-400 border-b border-slate-100">
                        <th className="text-left py-2 font-medium">Mois</th>
                        <th className="text-right py-2 font-medium">Consultations prévues</th>
                        <th className="text-right py-2 font-medium">vs moy. historique</th>
                      </tr></thead>
                      <tbody>{proj.map(m=>{
                        const delta=avgHist>0?Math.round((m.n-avgHist)/avgHist*100):0;
                        return<tr key={m.month} className="border-b border-slate-50">
                          <td className="py-3 font-medium text-slate-700">{new Date(m.month+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</td>
                          <td className="py-3 text-right font-bold text-slate-800">{m.n}</td>
                          <td className={`py-3 text-right font-semibold ${delta>=0?'text-emerald-600':'text-red-600'}`}>{delta>=0?'+':''}{delta}%</td>
                        </tr>;
                      })}</tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════════════════════ */
function AnalyticsPage(){
  const today=new Date().toISOString().slice(0,10);
  const d30=new Date(Date.now()-29*86400000).toISOString().slice(0,10);
  const [from,setFrom]=useState(d30);
  const [to,setTo]=useState(today);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);

  const load=async(f,t)=>{setLoading(true);const d=await api.get(`/analytics?from=${f}&to=${t}`);setData(d);setLoading(false);};
  useEffect(()=>{load(from,to);},[]);
  const apply=()=>load(from,to);

  const preset=(days)=>{const f=new Date(Date.now()-days*86400000).toISOString().slice(0,10);setFrom(f);setTo(today);load(f,today);};

  const downloadCSV=()=>{
    if(!data)return;
    const rows=[
      ['Métrique','Valeur'],
      ['Période',`${data.period.from} → ${data.period.to}`],
      ['Total consultations',data.totalConsults],
      ['Notes validées',data.validated],
      ['Taux de validation (%)',data.validationRate],
      ['Avec ordonnance',data.withPrescription],
      ['Taux ordonnances (%)',data.prescriptionRate],
      ['Durée moyenne (min)',data.avgDuration||'N/A'],
      ['Total patients',data.totalPatients],
      ['% Femmes',data.pctFemmes],
      ['% Hommes',data.pctHommes],
      ['Âge moyen (ans)',data.avgAge||'N/A'],
      [],
      ['Top motifs','Occurrences'],
      ...( data.topMotifs||[]).map(m=>[m.motif,m.n]),
      [],
      ['Assurances','Patients'],
      ...(data.byInsurance||[]).map(a=>[a.typeAssurance,a.n]),
    ];
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`analytics-${from}-${to}.csv`;a.click();
  };

  const STAT_PALETTES={
    blue:    {bg:'#e8eef8',  num:'#2a4a8a',           sub:'rgba(42,74,138,0.35)',   border:'#7a9ad0'},
    emerald: {bg:'#e8f5ee',  num:'#1a6b3a',           sub:'rgba(26,107,58,0.35)',   border:'#5aaa7a'},
    violet:  {bg:'#f0eaf8',  num:'#6a3a9a',           sub:'rgba(106,58,154,0.35)',  border:'#aa82cc'},
    rose:    {bg:'#f7e2ea',  num:'#8a3a55',           sub:'rgba(138,58,85,0.35)',   border:'#d48a9a'},
    sky:     {bg:'#deeaf7',  num:'#2a5a8a',           sub:'rgba(42,90,138,0.35)',   border:'#7aa8d0'},
    amber:   {bg:'#fdf6ee',  num:'#8a5220',           sub:'rgba(138,82,32,0.35)',   border:'#c89050'},
    teal:    {bg:'#eef7f3',  num:'#1d5c42',           sub:'rgba(29,92,66,0.35)',    border:'#4a9a6a'},
    indigo:  {bg:'#edeaf8',  num:'#3a2a7a',           sub:'rgba(58,42,122,0.35)',   border:'#9080cc'},
  };
  const StatCard=({label,value,sub,color='blue'})=>{
    const p=STAT_PALETTES[color]||STAT_PALETTES.blue;
    const isNavy=false;
    return(
      <div className="card-hover" style={{background:p.bg,padding:'22px 20px',position:'relative',border:`1px solid ${p.border}22`,overflow:'hidden'}}>
        <div style={{position:'absolute',bottom:0,left:0,width:'36px',height:'2px',background:p.border}}/>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'42px',fontWeight:300,color:p.num,display:'block',lineHeight:1,letterSpacing:'-0.02em',marginBottom:'10px'}}>{value??'—'}</span>
        <span style={{fontSize:'11px',fontWeight:500,color:p.num,letterSpacing:'0.06em',display:'block',marginBottom:'2px'}}>{label}</span>
        {sub&&<span style={{display:'block',fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:p.sub}}>{sub}</span>}
      </div>
    );
  };

  // Simple inline bar chart
  const BarChartSVG=({data:d,color='#3b82f6'})=>{
    if(!d||!d.length)return<p className="text-slate-400 text-sm text-center py-4">Aucune donnée</p>;
    const max=Math.max(...d.map(x=>x.n),1);
    const W=460,H=80,barW=Math.max(Math.floor(W/d.length)-2,4);
    return(
      <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} className="overflow-visible">
        {d.map((x,i)=>{
          const bh=Math.max((x.n/max)*(H-10),2);
          const bx=i*(W/d.length);
          return<g key={i}>
            <rect x={bx+1} y={H-bh} width={barW} height={bh} fill={color} rx="2" opacity="0.85"/>
            {d.length<=14&&<text x={bx+barW/2} y={H+14} fontSize="9" textAnchor="middle" fill="#94a3b8">{x.d?.slice(5)||x.h+'h'}</text>}
          </g>;
        })}
      </svg>
    );
  };

  return(
    <Page title="Analytiques" subtitle="Insights sur votre activité médicale">
      {/* Controls */}
      <div style={{background:'var(--cream)',border:'1px solid var(--border)',padding:'16px 20px',marginBottom:'28px',display:'flex',flexWrap:'wrap',alignItems:'center',gap:'12px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <input type="date" value={from} max={to} onChange={e=>setFrom(e.target.value)} style={{border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'12px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}/>
          <span style={{fontSize:'12px',color:'var(--muted)'}}>→</span>
          <input type="date" value={to} min={from} max={today} onChange={e=>setTo(e.target.value)} style={{border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'12px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}/>
          <Btn variant="primary" onClick={apply} size="sm">Appliquer</Btn>
        </div>
        <div style={{display:'flex',gap:'6px'}}>
          {[['7j',7],['30j',30],['3 mois',90],['Année',365]].map(([l,d])=>(
            <button key={l} onClick={()=>preset(d)} style={{padding:'6px 12px',fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',fontWeight:400,color:'var(--muted)',background:'var(--white)',border:'1px solid var(--border)',cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        <div style={{marginLeft:'auto'}}>
          <Btn variant="secondary" onClick={downloadCSV} icon={Ic.Download} size="sm">Télécharger CSV</Btn>
        </div>
      </div>

      {loading&&<div style={{display:'flex',justifyContent:'center',padding:'64px'}}><Ic.Spin style={{width:'28px',height:'28px',color:'var(--muted)'}}/></div>}

      {data&&!loading&&(
        <div className="space-y-6">
          {/* KPI cards */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Consultations" value={data.totalConsults} sub={`${data.period.from} → ${data.period.to}`} color="blue"/>
            <StatCard label="Taux de validation" value={`${data.validationRate}%`} sub={`${data.validated} notes validées`} color="emerald"/>
            <StatCard label="Taux d'ordonnances" value={`${data.prescriptionRate}%`} sub={`${data.withPrescription} prescriptions`} color="violet"/>
            <StatCard label="Durée moyenne" value={data.avgDuration?`${data.avgDuration} min`:'—'} sub="par consultation" color="amber"/>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Total patients" value={data.totalPatients} color="sky"/>
            <StatCard label="Femmes" value={`${data.pctFemmes}%`} sub={`${data.femmes} patientes`} color="rose"/>
            <StatCard label="Hommes" value={`${data.pctHommes}%`} sub={`${data.hommes} patients`} color="teal"/>
            <StatCard label="Âge moyen" value={data.avgAge?`${data.avgAge} ans`:'—'} sub="des patients" color="indigo"/>
          </div>

          {/* Charts row */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Daily activity */}
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Activité quotidienne</h3>
              <BarChartSVG data={data.daily} color="#00725f"/>
            </div>

            {/* Top motifs */}
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Top motifs de consultation</h3>
              {data.topMotifs?.length===0&&<p className="text-slate-400 text-sm">Aucun motif enregistré</p>}
              <div className="space-y-3">
                {data.topMotifs?.map((m,i)=>{
                  const pct=data.totalConsults>0?Math.round(m.n/data.totalConsults*100):0;
                  return(
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm text-slate-700 truncate max-w-xs">{m.motif}</span>
                        <span className="text-xs font-bold text-slate-500 ml-2">{m.n} ({pct}%)</span>
                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div style={{height:'100%',background:'var(--navy)',width:`${pct}%`}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Insurance & hours */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Répartition par assurance</h3>
              {data.byInsurance?.length===0&&<p className="text-slate-400 text-sm">Aucune donnée</p>}
              <div className="space-y-3">
                {data.byInsurance?.map((a,i)=>{
                  const pct=data.totalPatients>0?Math.round(a.n/data.totalPatients*100):0;
                  const colors=['bg-blue-500','bg-teal-500','bg-violet-500','bg-amber-500','bg-rose-500'];
                  return(
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm text-slate-700">{a.typeAssurance||'Non renseignée'}</span>
                        <span className="text-xs font-bold text-slate-500">{a.n} patients ({pct}%)</span>
                      </div>
                      <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full ${colors[i%colors.length]} rounded-full`} style={{width:`${pct}%`}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
              <h3 className="font-semibold text-slate-900 mb-4">Consultations par heure</h3>
              <BarChartSVG data={data.byHour?.map(x=>({...x,d:x.h+'h'}))} color="#B8935A"/>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════════════ */
function ProfilePage({user,onUpdate}){
  const [form,setForm]=useState({nom:user?.nom||'',prenom:user?.prenom||'',rpps:user?.rpps||'',specialite:user?.specialite||'',telephone:user?.telephone||'',adresse:user?.adresse||'',photo:user?.photo||''});
  const [pwForm,setPwForm]=useState({current:'',next:'',confirm:''});
  const [saving,setSaving]=useState(false);
  const [pwSaving,setPwSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const [pwMsg,setPwMsg]=useState('');

  useEffect(()=>{api.get('/auth/me').then(u=>{if(u?.id)setForm({nom:u.nom||'',prenom:u.prenom||'',rpps:u.rpps||'',specialite:u.specialite||'',telephone:u.telephone||'',adresse:u.adresse||'',photo:u.photo||''});});},[]);

  const saveProfile=async()=>{setSaving(true);const u=await api.put('/auth/profile',form);setSaving(false);if(u.id){setMsg('Profil mis à jour ✓');onUpdate(u);setTimeout(()=>setMsg(''),3000);}};
  const savePw=async()=>{if(pwForm.next!==pwForm.confirm){setPwMsg('Les mots de passe ne correspondent pas');return;}setPwSaving(true);const r=await api.put('/auth/password',{current:pwForm.current,next:pwForm.next});setPwSaving(false);if(r.ok){setPwMsg('Mot de passe mis à jour ✓');setPwForm({current:'',next:'',confirm:''});setTimeout(()=>setPwMsg(''),3000);}else setPwMsg(r.error||'Erreur');};
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const setPw=k=>e=>setPwForm(f=>({...f,[k]:e.target.value}));

  return(
    <Page title="Mon profil" subtitle="Gérez vos informations et votre accès">
      <div className="max-w-2xl space-y-6">
        {/* Avatar header */}
        <div style={{background:'var(--navy)',padding:'32px 36px',display:'flex',alignItems:'center',gap:'24px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',bottom:0,left:0,width:'56px',height:'2px',background:'var(--gold)'}}/>
          {form.photo
            ? <img src={encodeURI(form.photo)} alt="" style={{width:'72px',height:'72px',objectFit:'cover',flexShrink:0}}/>
            : <div style={{width:'72px',height:'72px',background:'rgba(184,147,90,0.15)',border:'1px solid rgba(184,147,90,0.3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:"'Cormorant Garamond',serif",fontSize:'28px',fontWeight:300,color:'var(--gold-light)'}}>{initials(form.prenom,form.nom)}</div>
          }
          <div>
            <p className="eyebrow" style={{color:'rgba(250,250,248,0.45)',marginBottom:'8px'}}>Mon profil</p>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'26px',fontWeight:300,color:'var(--white)',lineHeight:1.2}}>{form.prenom} {form.nom}</h2>
            <p style={{fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(250,250,248,0.5)',marginTop:'4px',fontWeight:300}}>{form.specialite||'Médecin'}</p>
            {form.rpps&&<p style={{fontSize:'10px',color:'rgba(250,250,248,0.35)',marginTop:'4px',fontFamily:'monospace'}}>N° RPPS : {form.rpps}</p>}
          </div>
        </div>

        {/* Profile form */}
        <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'28px 32px'}}>
          <p className="eyebrow" style={{marginBottom:'20px'}}>Informations professionnelles</p>
          {msg&&<div style={{marginBottom:'16px',background:'#f0f7f4',border:'1px solid rgba(74,124,107,0.3)',color:'var(--green)',fontSize:'12px',padding:'10px 16px',display:'flex',alignItems:'center',gap:'6px'}}><Ic.Check style={{width:'12px',height:'12px'}}/>{msg}</div>}
          <div className="grid grid-cols-2 gap-4">
            <Input label="Prénom" value={form.prenom} onChange={set('prenom')}/>
            <Input label="Nom" value={form.nom} onChange={set('nom')}/>
            <Input label="N° RPPS" value={form.rpps} onChange={set('rpps')}/>
            <Input label="Spécialité" value={form.specialite} onChange={set('specialite')}/>
            <Input label="Téléphone" value={form.telephone} onChange={set('telephone')}/>
            <Input label="Adresse du cabinet" value={form.adresse} onChange={set('adresse')}/>
          </div>
          <div style={{marginTop:'20px',display:'flex',justifyContent:'flex-end'}}>
            <Btn variant="primary" onClick={saveProfile} loading={saving} icon={Ic.Check}>Enregistrer</Btn>
          </div>
        </div>

        {/* Password */}
        <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'28px 32px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}>
            <Ic.Key style={{width:'14px',height:'14px',color:'var(--muted)'}}/>
            <p className="eyebrow">Sécurité</p>
          </div>
          {pwMsg&&<div style={{marginBottom:'16px',fontSize:'12px',padding:'10px 16px',border:'1px solid',borderColor:pwMsg.includes('✓')?'rgba(74,124,107,0.3)':'rgba(197,71,42,0.2)',color:pwMsg.includes('✓')?'var(--green)':'var(--accent)',background:pwMsg.includes('✓')?'#f0f7f4':'#fdf5f3'}}>{pwMsg}</div>}
          <div className="space-y-4">
            <Input label="Mot de passe actuel" type="password" value={pwForm.current} onChange={setPw('current')}/>
            <Input label="Nouveau mot de passe" type="password" value={pwForm.next} onChange={setPw('next')}/>
            <Input label="Confirmer le nouveau mot de passe" type="password" value={pwForm.confirm} onChange={setPw('confirm')}/>
          </div>
          <div style={{marginTop:'20px',display:'flex',justifyContent:'flex-end'}}>
            <Btn variant="primary" onClick={savePw} loading={pwSaving} icon={Ic.Key}>Changer le mot de passe</Btn>
          </div>
        </div>
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   AUDIT LOG
══════════════════════════════════════════════════════════════ */
function AuditLog(){
  const [logs,setLogs]=useState([]);
  const [total,setTotal]=useState(0);
  const [page,setPage]=useState(0);
  useEffect(()=>{api.get(`/audit?page=${page}`).then(d=>{setLogs(d.logs||[]);setTotal(d.total||0);});},[page]);
  const actionColor=a=>a.includes('LOGIN')?'blue':a.includes('VALIDATE')?'green':a.includes('CREATE')?'violet':a.includes('DELETE')?'red':'slate';
  return(
    <Page title="Journal d'audit" subtitle={`${total} événements enregistrés`}>
      <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wide">
            <th className="text-left px-6 py-3.5">Date</th>
            <th className="text-left px-4 py-3.5">Utilisateur</th>
            <th className="text-left px-4 py-3.5">Action</th>
            <th className="text-left px-4 py-3.5">Entité</th>
            <th className="text-left px-4 py-3.5">Détails</th>
          </tr></thead>
          <tbody className="divide-y divide-slate-50">
            {logs.map(l=>(
              <tr key={l.id} className="hover:bg-slate-50/50">
                <td className="px-6 py-3 text-slate-400 text-xs whitespace-nowrap">{l.createdAt?.replace('T',' ').slice(0,19)}</td>
                <td className="px-4 py-3 text-slate-600 text-xs">{l.userEmail||'—'}</td>
                <td className="px-4 py-3"><Badge color={actionColor(l.action||'')} size="xs">{l.action}</Badge></td>
                <td className="px-4 py-3 text-slate-500 text-xs">{l.entityType||'—'}</td>
                <td className="px-4 py-3 text-slate-400 text-xs truncate max-w-xs">{l.details||'—'}</td>
              </tr>
            ))}
            {!logs.length&&<tr><td colSpan={5} className="px-6 py-10 text-center text-slate-400 text-sm">Aucun événement</td></tr>}
          </tbody>
        </table>
        {total>50&&(
          <div className="px-6 py-3 border-t border-slate-100 flex items-center justify-between text-sm text-slate-500">
            <span>Page {page+1} / {Math.ceil(total/50)}</span>
            <div className="flex gap-2">
              {page>0&&<Btn variant="secondary" size="sm" onClick={()=>setPage(p=>p-1)}>← Précédent</Btn>}
              {(page+1)*50<total&&<Btn variant="secondary" size="sm" onClick={()=>setPage(p=>p+1)}>Suivant →</Btn>}
            </div>
          </div>
        )}
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   AGENDA
══════════════════════════════════════════════════════════════ */
function AgendaPage(){
  const [current, setCurrent] = useState(new Date());
  const [appointments, setAppointments] = useState([]);
  const [patients, setPatients] = useState([]);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0,10));
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({patientId:'',date:'',heure:'09:00',motif:'',notes:''});
  const [patSearch, setPatSearch] = useState('');
  const [saving, setSaving] = useState(false);

  const year = current.getFullYear();
  const month = current.getMonth();

  const fromDate = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month+1, 0).getDate();
  const toDate = `${year}-${String(month+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

  useEffect(()=>{
    api.get(`/agenda?from=${fromDate}&to=${toDate}`).then(setAppointments);
    api.get('/patients').then(r=>setPatients(r.patients||r||[]));
  },[fromDate, toDate]);

  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  const firstDayOfMonth = new Date(year, month, 1).getDay();
  const startOffset = (firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1);
  const totalCells = Math.ceil((lastDay + startOffset) / 7) * 7;
  const cells = Array.from({length: totalCells}, (_, i) => {
    const d = i - startOffset + 1;
    if (d < 1 || d > lastDay) return null;
    return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  });

  const apptsByDate = {};
  appointments.forEach(a => { (apptsByDate[a.date]||(apptsByDate[a.date]=[])).push(a); });

  const dayAppts = (apptsByDate[selectedDate]||[]).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));

  const openCreate = () => {
    setForm({patientId:'',date:selectedDate,heure:'09:00',motif:'',notes:''});
    setPatSearch('');
    setModal({mode:'create'});
  };
  const openEdit = appt => {
    const pat = patients.find(p=>p.id===appt.patientId);
    setForm({patientId:appt.patientId,date:appt.date,heure:appt.heure||'09:00',motif:appt.motif||'',notes:appt.notes||''});
    setPatSearch(pat?`${pat.prenom} ${pat.nom}`:'');
    setModal({mode:'edit', appt});
  };

  const saveAppt = async () => {
    if(!form.patientId||!form.date){return;}
    setSaving(true);
    if(modal.mode==='create'){
      const r=await api.post('/agenda',form);
      setAppointments(a=>[...a,r]);
    } else {
      const r=await api.put('/agenda/'+modal.appt.id,{...form,statut:modal.appt.statut||'planifie'});
      setAppointments(a=>a.map(x=>x.id===modal.appt.id?r:x));
    }
    setSaving(false);
    setModal(null);
  };

  const deleteAppt = async id => {
    if(!confirm('Supprimer ce rendez-vous ?'))return;
    await api.delete('/agenda/'+id);
    setAppointments(a=>a.filter(x=>x.id!==id));
  };

  const statusColor = s => s==='confirme'?'bg-emerald-500':s==='annule'?'bg-rose-400':'bg-blue-500';
  const statusLabel = s => s==='confirme'?'Confirmé':s==='annule'?'Annulé':'Planifié';
  const statusBadge = s => s==='confirme'?'green':s==='annule'?'red':'blue';

  const filteredPats = patSearch.length>=2 ? patients.filter(p=>`${p.prenom} ${p.nom}`.toLowerCase().includes(patSearch.toLowerCase())).slice(0,6) : [];

  return(
    <Page title="Agenda" subtitle={`${monthNames[month]} ${year}`}
      actions={<Btn icon={Ic.Plus} onClick={openCreate}>Nouveau RDV</Btn>}>
      <div className="flex gap-6">
        {/* Calendar */}
        <div style={{flex:1,background:'var(--white)',border:'1px solid var(--border)'}}>
          {/* Month nav */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 24px',borderBottom:'1px solid var(--border)'}}>
            <button onClick={()=>setCurrent(new Date(year, month-1, 1))} style={{padding:'6px',background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}
              onMouseEnter={e=>e.currentTarget.style.color='var(--navy)'}
              onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
              <Ic.Back style={{width:'14px',height:'14px'}}/>
            </button>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'18px',fontWeight:400,color:'var(--navy)'}}>{monthNames[month]} {year}</p>
            <button onClick={()=>setCurrent(new Date(year, month+1, 1))} style={{padding:'6px',background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}
              onMouseEnter={e=>e.currentTarget.style.color='var(--navy)'}
              onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
              <Ic.Chevron style={{width:'14px',height:'14px'}}/>
            </button>
          </div>
          {/* Day headers */}
          <div className="grid grid-cols-7" style={{borderBottom:'1px solid var(--border)'}}>
            {dayNames.map(d=><div key={d} style={{padding:'8px',textAlign:'center',fontSize:'9px',fontWeight:500,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--muted)'}}>{d}</div>)}
          </div>
          {/* Day cells */}
          <div className="grid grid-cols-7">
            {cells.map((date, i)=>{
              if(!date) return <div key={i} className="h-20 border-b border-r border-slate-50"/>;
              const dayNum = parseInt(date.slice(8));
              const isToday = date === new Date().toISOString().slice(0,10);
              const isSelected = date === selectedDate;
              const appts = apptsByDate[date]||[];
              return(
                <div key={date} onClick={()=>setSelectedDate(date)}
                  className="cursor-pointer"
                  style={{height:'80px',padding:'6px',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',background:isSelected?'var(--cream)':isToday?'var(--gold-pale)':'var(--white)',transition:'background .15s'}}
                  onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background='var(--cream)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background=isSelected?'var(--cream)':isToday?'var(--gold-pale)':'var(--white)';}}>
                  <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'22px',height:'22px',fontSize:'11px',fontWeight:isToday||isSelected?500:400,marginBottom:'4px',color:isToday?'var(--white)':isSelected?'var(--navy)':'var(--charcoal)',background:isToday?'var(--navy)':'transparent'}}>
                    {dayNum}
                  </span>
                  <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                    {appts.slice(0,3).map(a=>(
                      <div key={a.id} style={{fontSize:'9px',padding:'1px 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--white)',fontWeight:400,background:a.statut==='confirme'?'var(--green)':a.statut==='annule'?'var(--accent)':'var(--navy)'}}>
                        {a.heure} {a.prenom}
                      </div>
                    ))}
                    {appts.length>3&&<div className="text-[10px] text-slate-400 pl-1">+{appts.length-3}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Day panel */}
        <div style={{width:'280px',flexShrink:0,display:'flex',flexDirection:'column',gap:'16px'}}>
          <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'16px 20px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
              <p style={{fontSize:'12px',fontWeight:400,color:'var(--navy)',textTransform:'capitalize'}}>
                {new Date(selectedDate+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
              </p>
              <button onClick={openCreate} style={{width:'28px',height:'28px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold-light)',border:'none',cursor:'pointer'}}>
                <Ic.Plus style={{width:'12px',height:'12px'}}/>
              </button>
            </div>
            {dayAppts.length===0
              ? <div style={{textAlign:'center',padding:'32px 0',color:'var(--muted)'}}>
                  <Ic.Calendar style={{width:'28px',height:'28px',margin:'0 auto 8px',opacity:0.25}}/>
                  <p style={{fontSize:'12px',fontWeight:300}}>Aucun RDV ce jour</p>
                </div>
              : <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {dayAppts.map(a=>(
                    <div key={a.id} className="data-row" style={{padding:'10px 12px',cursor:'pointer',background:'var(--cream)'}} onClick={()=>openEdit(a)}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{fontSize:'12px',fontWeight:400,color:'var(--navy)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.prenom} {a.nom}</p>
                          <p style={{fontSize:'10px',color:'var(--gold)',fontWeight:500,marginTop:'2px'}}>{a.heure} · {a.motif||'RDV'}</p>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                          <Badge color={statusBadge(a.statut)} size="xs">{statusLabel(a.statut)}</Badge>
                          <button onClick={e=>{e.stopPropagation();deleteAppt(a.id);}} style={{padding:'2px',background:'none',border:'none',cursor:'pointer',color:'var(--light)'}}
                            onMouseEnter={e=>e.currentTarget.style.color='var(--accent)'}
                            onMouseLeave={e=>e.currentTarget.style.color='var(--light)'}>
                            <Ic.Trash style={{width:'11px',height:'11px'}}/>
                          </button>
                        </div>
                      </div>
                      {a.notes&&<p style={{fontSize:'10px',color:'var(--muted)',marginTop:'4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:300}}>{a.notes}</p>}
                    </div>
                  ))}
                </div>
            }
          </div>

          {/* Monthly summary */}
          <div style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'16px 20px'}}>
            <p className="eyebrow" style={{marginBottom:'12px'}}>Ce mois</p>
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:'12px',color:'var(--muted)',fontWeight:300}}>Total RDV</span><span style={{fontSize:'12px',fontWeight:500,color:'var(--navy)'}}>{appointments.length}</span></div>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:'12px',color:'var(--muted)',fontWeight:300}}>Confirmés</span><span style={{fontSize:'12px',fontWeight:500,color:'var(--green)'}}>{appointments.filter(a=>a.statut==='confirme').length}</span></div>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:'12px',color:'var(--muted)',fontWeight:300}}>Annulés</span><span style={{fontSize:'12px',fontWeight:500,color:'var(--accent)'}}>{appointments.filter(a=>a.statut==='annule').length}</span></div>
            </div>
          </div>
        </div>
      </div>

      {/* Modal */}
      {modal&&(
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={()=>setModal(null)}>
          <div style={{background:'var(--white)',boxShadow:'0 24px 64px rgba(0,0,0,0.15)',width:'100%',maxWidth:'440px',padding:'0'}} onClick={e=>e.stopPropagation()} className="fade-in">
            <div style={{padding:'20px 28px',borderBottom:'1px solid var(--border)'}}>
              <p className="eyebrow" style={{marginBottom:'4px'}}>Agenda</p>
              <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'22px',fontWeight:300,color:'var(--navy)'}}>{modal.mode==='create'?'Nouveau rendez-vous':'Modifier le rendez-vous'}</h3>
            </div>
            <div style={{padding:'20px 28px',display:'flex',flexDirection:'column',gap:'16px'}}>
              {/* Patient search */}
              <div style={{position:'relative'}}>
                <label style={{display:'block',fontSize:'9px',letterSpacing:'0.25em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,marginBottom:'8px'}}>Patient *</label>
                <input value={patSearch} onChange={e=>{setPatSearch(e.target.value);if(!e.target.value)setForm(f=>({...f,patientId:''}));}}
                  placeholder="Rechercher un patient..." style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'10px 14px',fontSize:'13px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}/>
                {filteredPats.length>0&&(
                  <div style={{position:'absolute',zIndex:10,left:0,right:0,background:'var(--white)',border:'1px solid var(--border)',marginTop:'1px',boxShadow:'0 8px 24px rgba(0,0,0,0.08)'}}>
                    {filteredPats.map(p=>(
                      <button key={p.id} className="data-row w-full text-left" style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:'10px',background:'none',border:'none',cursor:'pointer'}}
                        onClick={()=>{setForm(f=>({...f,patientId:p.id}));setPatSearch(`${p.prenom} ${p.nom}`);}}>
                        <div style={{width:'24px',height:'24px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold-light)',fontSize:'9px',flexShrink:0,fontFamily:"'Cormorant Garamond',serif"}}>{initials(p.prenom,p.nom)}</div>
                        <span style={{fontSize:'12px',color:'var(--navy)',fontWeight:400}}>{p.prenom} {p.nom}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label style={{display:'block',fontSize:'9px',letterSpacing:'0.25em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,marginBottom:'8px'}}>Date *</label>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'10px 14px',fontSize:'13px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'9px',letterSpacing:'0.25em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,marginBottom:'8px'}}>Heure</label>
                  <input type="time" value={form.heure} onChange={e=>setForm(f=>({...f,heure:e.target.value}))}
                    style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'10px 14px',fontSize:'13px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}/>
                </div>
              </div>
              <Input label="Motif" value={form.motif} onChange={e=>setForm(f=>({...f,motif:e.target.value}))} placeholder="Ex: Consultation de suivi"/>
              <Input label="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} textarea rows={2} placeholder="Informations complémentaires..."/>
              {modal.mode==='edit'&&(
                <div>
                  <label style={{display:'block',fontSize:'9px',letterSpacing:'0.25em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,marginBottom:'8px'}}>Statut</label>
                  <select value={modal.appt.statut||'planifie'} onChange={e=>setModal(m=>({...m,appt:{...m.appt,statut:e.target.value}}))}
                    style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'10px 14px',fontSize:'13px',color:'var(--charcoal)',fontFamily:"'DM Sans',sans-serif",fontWeight:300,outline:'none'}}>
                    <option value="planifie">Planifié</option>
                    <option value="confirme">Confirmé</option>
                    <option value="annule">Annulé</option>
                  </select>
                </div>
              )}
            </div>
            <div style={{padding:'16px 28px',borderTop:'1px solid var(--border)',display:'flex',gap:'8px',justifyContent:'flex-end'}}>
              <Btn variant="secondary" onClick={()=>setModal(null)} size="md">Annuler</Btn>
              <Btn onClick={saveAppt} loading={saving} disabled={!form.patientId||!form.date} size="md">{modal.mode==='create'?'Créer':'Enregistrer'}</Btn>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   DOC MODAL (Arrêt, Certificat, Adressage)
══════════════════════════════════════════════════════════════ */
function DocModal({consultationId,patient,onClose}){
  const[type,setType]=useState('arret');
  const[loading,setLoading]=useState(false);
  const[duree,setDuree]=useState(3);
  const[dateDebut,setDateDebut]=useState(new Date().toISOString().slice(0,10));
  const[sortie,setSortie]=useState('autorisee');
  const[objet,setObjet]=useState('');
  const[observations,setObservations]=useState('');
  const[specialiste,setSpecialiste]=useState('');
  const[specialiteAdre,setSpecialiteAdre]=useState('');
  const[motif,setMotif]=useState('');

  const routes={arret:'arret-maladie',certificat:'certificat',adressage:'adressage'};
  const bodies={arret:{duree,dateDebut,sortie},certificat:{objet,observations},adressage:{specialiste,specialite:specialiteAdre,motif}};

  const generate=async()=>{
    setLoading(true);
    const r=await fetch(`${API}/consultations/${consultationId}/${routes[type]}/pdf`,{
      method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},
      body:JSON.stringify(bodies[type])
    });
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`${routes[type]}-${patient?.nom||'patient'}.pdf`;a.click();
    URL.revokeObjectURL(url);setLoading(false);
  };

  const inp='ch-input w-full';
  const lbl='block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide';
  const tabs=[{id:'arret',label:'Arrêt maladie'},{id:'certificat',label:'Certificat'},{id:'adressage',label:'Adressage'}];

  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 fade-in">
      <div style={{background:'var(--white)',width:'100%',maxWidth:'512px',border:'1px solid var(--border)'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)'}}>Documents médicaux</h3>
          <button onClick={onClose} style={{width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',background:'none',border:'none',cursor:'pointer',fontSize:'18px'}}>✕</button>
        </div>
        <div className="px-6 py-5">
          <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:'20px'}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setType(t.id)}
                style={{flex:1,padding:'10px 0',fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',background:'none',border:'none',borderBottom:type===t.id?'2px solid var(--gold)':'2px solid transparent',color:type===t.id?'var(--navy)':'var(--muted)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                {t.label}
              </button>
            ))}
          </div>
          <div style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'12px 16px',marginBottom:'20px'}}>
            <p style={{fontSize:'14px',color:'var(--navy)',fontFamily:"'Cormorant Garamond',serif"}}>{patient?.prenom} {patient?.nom}</p>
            <p style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{ageStr(patient?.dateNaissance)} · {patient?.typeAssurance||'Assurance non renseignée'}</p>
          </div>

          {type==='arret'&&<div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <div><label className={lbl}>Date de début</label>

              <div><label className={lbl}>Spécialiste</label>
                <input type="text" value={specialiste} onChange={e=>setSpecialiste(e.target.value)}
                  placeholder="Dr. Nom" className={inp}/></div>
              <div><label className={lbl}>Spécialité</label>
                <input type="text" value={specialiteAdre} onChange={e=>setSpecialiteAdre(e.target.value)}
                  placeholder="Cardiologie, ORL..." className={inp}/></div>
            </div>
            <div><label className={lbl}>Motif d'adressage</label>
              <textarea value={motif} onChange={e=>setMotif(e.target.value)}
                rows={3} placeholder="Raison de la demande de consultation..." className={inp+' resize-none'}/></div>

        </div>

          <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
          <Btn variant="primary" icon={Ic.Download} onClick={generate} loading={loading}>Générer PDF</Btn>
        </div>
      </div>
    </div>
  );
}

function FactureModal({consult,tarifs,onClose,onSave}){
  const firstActe=tarifs[0]?.typeActe||'Consultation simple';
  const[typeActe,setTypeActe]=useState(firstActe);
  const[montant,setMontant]=useState(()=>{const t=tarifs.find(t=>t.typeActe===firstActe);return t?.montant||5000;});
  const[statut,setStatut]=useState('en_attente');
  const[caisse,setCaisse]=useState(consult?.typeAssurance||'');
  const[dateFact,setDateFact]=useState(new Date().toISOString().slice(0,10));
  const[datePay,setDatePay]=useState(new Date().toISOString().slice(0,10));
  const[notes,setNotes]=useState('');
  const[saving,setSaving]=useState(false);
  useEffect(()=>{const t=tarifs.find(t=>t.typeActe===typeActe);if(t)setMontant(t.montant);},[typeActe]);
  const handleSave=async()=>{
    setSaving(true);
    await api.post('/honoraires',{consultationId:consult.id,montant:Number(montant),statut,caisse:caisse||null,typeActe,dateFacturation:dateFact,datePaiement:statut==='paye'?datePay:null,notes:notes||null});
    await onSave();onClose();
  };
  const sel='ch-input w-full';
  const inp='ch-input w-full';
  const lbl='block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide';
  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 fade-in">
      <div style={{background:'var(--white)',width:'100%',maxWidth:'512px',border:'1px solid var(--border)'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)'}}>Facturer la consultation</h3>
          <button onClick={onClose} style={{width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',background:'none',border:'none',cursor:'pointer',fontSize:'18px'}}>✕</button>
        </div>
        <div className="px-6 py-5 space-y-4">
          <div style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'12px 16px'}}>
            <p style={{fontSize:'14px',color:'var(--navy)',fontFamily:"'Cormorant Garamond',serif"}}>{consult?.prenom} {consult?.nom}</p>
            <p style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{consult?.motif} · {fmtDate(consult?.date)}</p>
          </div>
          <div><label className={lbl}>Type d'acte</label>
            <select value={typeActe} onChange={e=>setTypeActe(e.target.value)} className={sel}>
              {tarifs.map(t=><option key={t.typeActe} value={t.typeActe}>{t.typeActe} — {new Intl.NumberFormat('fr-FR').format(t.montant)} FCFA</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className={lbl}>Montant (FCFA)</label>
              <input type="number" value={montant} onChange={e=>setMontant(e.target.value)} className={inp}/></div>
            <div><label className={lbl}>Caisse</label>
              <select value={caisse} onChange={e=>setCaisse(e.target.value)} className={sel}>
                <option value="">Non spécifié</option>
                {['CNAMGS','CNSS','Saham','NSIA','Particulier'].map(c=><option key={c}>{c}</option>)}
              </select></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className={lbl}>Statut</label>
              <select value={statut} onChange={e=>setStatut(e.target.value)} className={sel}>
                <option value="en_attente">En attente</option>
                <option value="paye">Payé</option>
              </select></div>
            <div><label className={lbl}>Date facturation</label>
              <input type="date" value={dateFact} onChange={e=>setDateFact(e.target.value)} className={inp}/></div>
          </div>
          {statut==='paye'&&<div><label className={lbl}>Date de paiement</label>
            <input type="date" value={datePay} onChange={e=>setDatePay(e.target.value)} className={inp}/></div>}
          <div><label className={lbl}>Notes</label>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"/></div>
        </div>
        <div className="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
          <Btn variant="secondary" onClick={onClose}>Annuler</Btn>
          <Btn variant="primary" onClick={handleSave} loading={saving}>Enregistrer</Btn>
        </div>
      </div>
    </div>
  );
}

            <div>
              <h3 className="font-semibold text-slate-900">Grille tarifaire</h3>
              <p className="text-xs text-slate-400 mt-0.5">Tarifs utilisés par défaut lors de la facturation</p>
            </div>
            {!editTarifs
              ? <Btn variant="secondary" size="sm" onClick={()=>{setEditTarifs(true);setTarifsDraft([...tarifs]);}}>Modifier</Btn>
              : <div className="flex gap-2">
                  <Btn variant="secondary" size="sm" onClick={()=>setEditTarifs(false)}>Annuler</Btn>
                  <Btn variant="primary" size="sm" onClick={saveTarifs} loading={saving}>Enregistrer</Btn>
                </div>
            }
          </div>
          <div className="divide-y divide-slate-50">
            {(editTarifs?tarifsDraft:tarifs).map((t,i)=>(
              <div key={i} className="px-6 py-4 flex items-center gap-4">
                <div className="flex-1">
                  {editTarifs
                    ?<input value={t.typeActe} onChange={e=>{const d=[...tarifsDraft];d[i]={...d[i],typeActe:e.target.value};setTarifsDraft(d);}}
                        style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
                    :<p className="font-medium text-slate-900 text-sm">{t.typeActe}</p>
                  }
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {editTarifs
                    ?<><input type="number" value={t.montant} onChange={e=>{const d=[...tarifsDraft];d[i]={...d[i],montant:Number(e.target.value)};setTarifsDraft(d);}}
                          style={{width:'112px',border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',textAlign:'right',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
                        <span className="text-sm text-slate-500">FCFA</span></>
                    :<p className="font-semibold text-slate-900">{new Intl.NumberFormat('fr-FR').format(t.montant)} FCFA</p>
                  }
                </div>
              </div>
            ))}
          </div>
          {editTarifs&&(
            <div className="px-6 py-3 border-t border-slate-100">
              <button onClick={()=>setTarifsDraft([...tarifsDraft,{typeActe:"Nouveau type d'acte",montant:0}])}
                style={{fontSize:'11px',color:'var(--gold)',letterSpacing:'0.1em',textTransform:'uppercase',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',fontFamily:"'DM Sans',sans-serif"}}>
                <Ic.Plus style={{width:'12px',height:'12px'}}/>Ajouter un type d'acte
              </button>
            </div>
          )}
        </div>
      )}
    </Page>
  </>);
}

/* ══════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [params,setParams]=useState({});
  const [aiEnabled,setAiEnabled]=useState(true);

  useEffect(()=>{
    if(getToken())api.get('/auth/me').then(u=>{if(u?.id)setUser(u);else setToken(null);}).catch(()=>setToken(null)).finally(()=>setChecking(false));
    else setChecking(false);
  },[]);

  useEffect(()=>{
    if(user)api.get('/dashboard').then(d=>{if(d?.aiEnabled!==undefined)setAiEnabled(d.aiEnabled);});
  },[user]);

  const nav=p=>{
    const parts=p.split('/');
    if(parts[0]==='patient'&&parts[1]){setParams({patientId:parts[1]});setPage('patient');}
    else if(parts[0]==='edit-patient'&&parts[1]){setParams({patientId:parts[1]});setPage('edit-patient');}
    else if(parts[0]==='consultation'&&parts[1]){setParams(pr=>({...pr,consultationId:parts[1],patientId:parts[2]||pr.patientId}));setPage('consultation');}
    else{setParams({});setPage(p);}
  };

  const logout=()=>{setToken(null);setUser(null);};

  if(checking)return<div className="min-h-screen flex items-center justify-center" style={{background:'#F0F4F8'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'16px'}}><div style={{width:'44px',height:'44px',background:'linear-gradient(135deg,#3B82F6,#6366F1)',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(59,130,246,0.35)'}}><Ic.Steth className="w-5 h-5 text-white"/></div><Ic.Spin className="w-6 h-6" style={{color:'#3B82F6'}}/></div></div>;
  if(!user)return<LoginPage onLogin={u=>{setUser(u);setPage('dashboard');}}/>;

  const renderPage=()=>{
    if(page==='patients')return<PatientList onSelect={id=>nav('patient/'+id)} onNew={()=>{setParams({});setPage('new-patient');}}/>;
    if(page==='new-patient')return<PatientForm onSave={()=>nav('patients')} onBack={()=>nav('patients')}/>;
    if(page==='patient')return<PatientFile patientId={params.patientId} userId={user?.id} user={user} onConsultation={(cId,pId)=>{setParams(p=>({...p,consultationId:cId,patientId:pId}));setPage('consultation');}} onEdit={()=>nav('edit-patient/'+params.patientId)} onBack={()=>nav('patients')}/>;
    if(page==='edit-patient')return<PatientForm patientId={params.patientId} onSave={()=>nav('patient/'+params.patientId)} onBack={()=>nav('patient/'+params.patientId)}/>;
    if(page==='consultation')return<ConsultationScreen consultationId={params.consultationId} patientId={params.patientId} onBack={()=>nav('patient/'+params.patientId)}/>;
    if(page==='analytics')return<AnalyticsPage/>;
    if(page==='intelligence')return<IntelligencePage onViewPatient={id=>{setParams(p=>({...p,patientId:id}));nav('patient/'+id);}}/>;
    if(page==='agenda')return<AgendaPage/>;
    if(page==='profile')return<ProfilePage user={user} onUpdate={u=>setUser(u)}/>;
    if(page==='audit')return<AuditLog/>;
    if(page==='honoraires')return<HonorairesPage/>;
    return<Dashboard onNav={nav} user={user}/>;
  };

  return(
    <div className="flex min-h-screen" style={{background:'var(--white)'}}>
      <Sidebar page={page} onNav={nav} user={user} onLogout={logout}/>
      <div className="flex-1 min-w-0 overflow-x-hidden" style={{marginLeft:'240px'}}>
        {/* Demo banner — only shown when AI is not configured */}
        {!aiEnabled&&(
        <div className="bg-amber-50 border-b border-amber-100 px-8 py-2 flex items-center gap-2 text-xs text-amber-700">
          <Ic.Warn className="w-3.5 h-3.5 flex-shrink-0"/>
          <span>Transcription IA désactivée — ajoutez <code className="font-mono bg-amber-100 px-1 rounded">OPENAI_API_KEY</code> dans <code className="font-mono bg-amber-100 px-1 rounded">.env</code> pour l'activer · les données restent chiffrées</span>
        </div>
        )}
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
