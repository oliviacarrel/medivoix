<style>
/* ── DESIGN TOKENS (capitalhumain) ── */
:root{
  --white:#FAFAF8;
  --cream:#F5F3EE;
  --cream2:#EDE9E0;
  --navy:#1A2332;
  --navy-mid:#243347;
  --gold:#B8935A;
  --gold-light:#D4AC78;
  --gold-pale:#F0E8D8;
  --charcoal:#3A3A3A;
  --muted:#8A8A8A;
  --light:#BEBEBE;
  --border:#E8E4DC;
  --accent:#C5472A;
  --green:#4A7C6B;
}

/* ── BASE ── */
*,*::before,*::after{box-sizing:border-box;}
body{
  font-family:'DM Sans',system-ui,sans-serif!important;
  background:var(--white)!important;
  color:var(--charcoal)!important;
  font-size:14px;
  line-height:1.7;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border)}
::-webkit-scrollbar-thumb:hover{background:var(--light)}

/* ── ANIMATIONS ── */
.pulse-ring{animation:pulseRing 2s cubic-bezier(.215,.61,.355,1) infinite;}
@keyframes pulseRing{0%{transform:scale(.97);box-shadow:0 0 0 0 rgba(197,71,42,.4)}70%{transform:scale(1);box-shadow:0 0 0 10px rgba(197,71,42,0)}100%{transform:scale(.97);box-shadow:0 0 0 0 rgba(197,71,42,0)}}
.fade-in{animation:fadeUp .3s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:fadeUp .25s ease forwards;}
.interim{color:var(--light);font-style:italic;}

/* ── SIDEBAR ── */
.sidebar-item{
  transition:background .15s ease,color .15s ease;
  margin-bottom:1px;
  position:relative;
}
.sidebar-item:not(.active):hover{background:var(--cream);}
.sidebar-item.active{
  background:var(--navy);
  color:var(--white)!important;
}
.sidebar-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);
}
.sidebar-item.active svg{opacity:1!important;}

/* ── CARD ── */
.card{
  background:var(--white);
  border:1px solid var(--border);
}
.card-hover{transition:border-color .2s ease,box-shadow .2s ease;}
.card-hover:hover{border-color:rgba(184,147,90,0.4);box-shadow:0 4px 24px rgba(0,0,0,0.06)!important;}

/* ── GOLD LEFT BORDER CARD ── */
.card-gold{
  background:var(--cream);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  padding:24px 28px;
}

/* ── STAT BLOCK (navy + gold number) ── */
.stat-block{
  background:var(--navy);
  padding:28px 24px;
  position:relative;
}
.stat-block::after{content:'';position:absolute;bottom:0;left:0;width:40px;height:2px;background:var(--gold);}
.stat-block .stat-n{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:var(--gold-light);display:block;line-height:1;}
.stat-block .stat-l{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(250,250,248,0.5);margin-top:8px;display:block;}

/* ── FOCUS OVERRIDES ── */
input:focus,select:focus,textarea:focus{
  border-color:var(--gold)!important;
  box-shadow:0 0 0 3px rgba(184,147,90,0.12)!important;
  outline:none!important;
}

/* ── BUTTONS ── */
button{transition:background .15s ease,color .15s ease,border-color .15s ease;}
button:active:not(:disabled){opacity:0.85;}

/* ── STATUS ── */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.status-online{background:var(--green);}
.status-busy{background:var(--gold);}
.status-offline{background:var(--light);}

/* ── EYEBROW LABEL ── */
.eyebrow{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);font-weight:500;}

/* ── PAGE HEADER ── */
.page-header{
  background:var(--white);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.page-header::after{
  content:'';position:absolute;bottom:-1px;left:0;width:56px;height:2px;background:var(--gold);
}

/* ── SEARCH ── */
.search-premium{
  background:var(--white);
  border:1px solid var(--border);
  transition:border-color .15s ease;
}
.search-premium:focus{border-color:var(--gold)!important;box-shadow:none!important;}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:32px 0;}

/* ── TABLE / LIST ── */
.data-row{border-bottom:1px solid var(--border);transition:background .15s ease;}
.data-row:hover{background:var(--cream);}
</style>

const getToken=()=>localStorage.getItem('mv_token');
const setToken=t=>t?localStorage.setItem('mv_token',t):localStorage.removeItem('mv_token');

const apiFetch=(method,url,body,isForm)=>{
  const token=getToken();
  return fetch(API+url,{
    method,
    headers:{...(token?{Authorization:`Bearer ${token}`}:{}),...(!isForm?{'Content-Type':'application/json'}:{})},
    ...(body&&!isForm?{body:JSON.stringify(body)}:{}),
    ...(isForm?{body}:{})
  }).then(r=>r.json());
};
const api={
  get:url=>apiFetch('GET',url),
  post:(url,b)=>apiFetch('POST',url,b),
  put:(url,b)=>apiFetch('PUT',url,b),
  upload:(url,fd)=>apiFetch('POST',url,fd,true),

};

/* ── Btn ── */
function Btn({children,onClick,variant='primary',size='md',disabled,icon:Icon,loading}){
  const base='inline-flex items-center gap-2 font-medium focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed';
  const variants={
    primary:{style:{background:'var(--navy)',color:'var(--white)',border:'1px solid var(--navy)',fontSize:'11px',fontWeight:500,letterSpacing:'0.15em',textTransform:'uppercase'},hover:{background:'var(--navy-mid)',borderColor:'var(--navy-mid)'}},
    secondary:{style:{background:'transparent',color:'var(--navy)',border:'1px solid var(--border)',fontSize:'11px',fontWeight:400,letterSpacing:'0.12em',textTransform:'uppercase'},hover:{borderColor:'var(--gold)',color:'var(--gold)'}},
    danger:{style:{background:'var(--accent)',color:'var(--white)',border:'1px solid var(--accent)',fontSize:'11px',fontWeight:500,letterSpacing:'0.12em',textTransform:'uppercase'},hover:{background:'#a83a21',borderColor:'#a83a21'}},
    ghost:{style:{background:'transparent',color:'var(--muted)',border:'1px solid transparent',fontSize:'11px',fontWeight:400,letterSpacing:'0.1em',textTransform:'uppercase'},hover:{color:'var(--navy)',borderColor:'var(--border)'}},
    success:{style:{background:'var(--green)',color:'var(--white)',border:'1px solid var(--green)',fontSize:'11px',fontWeight:500,letterSpacing:'0.12em',textTransform:'uppercase'},hover:{background:'#3d6658'}},
  };
  const sizes={sm:'px-3 py-1.5',md:'px-4 py-2.5',lg:'px-5 py-3'};
  const v=variants[variant]||variants.secondary;
  const [hov,setHov]=React.useState(false);
  const bgStyle=hov&&!disabled?{...v.style,...v.hover}:v.style;
  return<button onClick={onClick} disabled={disabled||loading}
    className={`${base} ${sizes[size]}`} style={bgStyle}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
    {loading?<Ic.Spin className="w-4 h-4"/>:Icon?<Icon className="w-4 h-4"/>:null}{children}
  </button>;
}

/* ── Input ── */
function Input({label,value,onChange,type='text',placeholder,textarea,rows=3,required}){
  const cls="w-full px-3.5 py-2.5 text-sm resize-none";
  const istyle={background:'#FFFFFF',border:'1px solid #E5E7EB',color:'#111827',fontFamily:'Inter,sans-serif',outline:'none',borderRadius:'10px',fontSize:'13px',transition:'border-color .15s,box-shadow .15s'};
  return<div>
    {label&&<label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#374151',marginBottom:'6px'}}>{label}</label>}
    {textarea?<textarea value={value||''} onChange={onChange} rows={rows} placeholder={placeholder} className={cls} style={istyle}/>
             :<input type={type} value={value||''} onChange={onChange} placeholder={placeholder} required={required} className={cls} style={istyle}/>}
  </div>;
}

/* ══════════════════════════════════════════════════════════════

function Dashboard({onNav,user}){
  const [stats,setStats]=useState(null);
  const [hon,setHon]=useState(null);
  const [agenda,setAgenda]=useState(null);
  const [search,setSearch]=useState('');
  const [searchRes,setSearchRes]=useState(null);
  const [alerts,setAlerts]=useState([]);
  const [alertsUnread,setAlertsUnread]=useState(0);
  const [showAlerts,setShowAlerts]=useState(false);
  const searchTimer=useRef(null);
  const alertsPollRef=useRef(null);

  const today=new Date().toISOString().slice(0,10);

  const loadAlerts=()=>api.get('/alerts').then(d=>{setAlerts(d.alerts||[]);setAlertsUnread(d.unread||0);});

  useEffect(()=>{
    Promise.all([
      api.get('/dashboard'),
      api.get('/honoraires/dashboard'),
      api.get(`/agenda?from=${today}&to=${today}`),
    ]).then(([s,h,ag])=>{setStats(s);setHon(h);setAgenda(ag);});
    loadAlerts();
    alertsPollRef.current=setInterval(loadAlerts,30000);
    return()=>clearInterval(alertsPollRef.current);
  },[]);

  const markRead=async(id)=>{
    await fetch(`${API}/alerts/${id}/read`,{method:'PATCH',headers:{Authorization:`Bearer ${getToken()}`,'Content-Type':'application/json'}});
    setAlerts(a=>a.map(x=>x.id===id?{...x,isRead:1}:x));
    setAlertsUnread(n=>Math.max(0,n-1));
  };

  const markAllRead=async()=>{
    await fetch(`${API}/alerts/read-all`,{method:'POST',headers:{Authorization:`Bearer ${getToken()}`,'Content-Type':'application/json'}});
    setAlerts(a=>a.map(x=>({...x,isRead:1})));
    setAlertsUnread(0);
  };

  useEffect(()=>{
    clearTimeout(searchTimer.current);
    if(search.trim().length<2){setSearchRes(null);return;}
    searchTimer.current=setTimeout(()=>api.get(`/search?q=${encodeURIComponent(search)}`).then(setSearchRes),300);
  },[search]);

  const hour=new Date().getHours();
  const greeting=hour<12?'Bonjour':'Bonsoir';
  const dayStr=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const statCards=[
    {label:'Patients total',    val:stats?.totalPatients??'—',  sub:'dans la base',      icon:Ic.Users,  from:'from-blue-500',  to:'to-blue-700'},
    {label:'Aujourd\'hui',      val:stats?.consultToday??'—',   sub:'consultations',     icon:Ic.Steth,  from:'from-teal-500',  to:'to-cyan-600'},
    {label:'Cette semaine',     val:stats?.consultWeek??'—',    sub:'consultations',     icon:Ic.Chart,  from:'from-violet-500',to:'to-purple-700'},
    {label:'Notes validées',    val:stats?.notesValidated??'—', sub:'compte rendus',     icon:Ic.Check,  from:'from-emerald-500',to:'to-green-700'},
  ];

  const statusLabel=s=>s==='validee'?{t:'Validée',c:'green'}:s==='note_generee'?{t:'Note générée',c:'blue'}:{t:'En cours',c:'amber'};
  const statutAgenda=s=>s==='confirme'?{t:'Confirmé',c:'green'}:s==='annule'?{t:'Annulé',c:'red'}:{t:'Planifié',c:'blue'};
  const hasAlerts=(stats?.pendingNotes>0)||(hon?.nonFactures?.count>0)||(hon?.rejets?.count>0);

  const drName=`Dr. ${user?.nom||''}`;

  return(
    <Page
      title={`${greeting}, ${drName}`}
      subtitle={dayStr.charAt(0).toUpperCase()+dayStr.slice(1)}
      actions={<Btn variant="primary" icon={Ic.Plus} onClick={()=>onNav('patients')}>Nouvelle consultation</Btn>}
    >
      {/* ── Search bar ── */}
      <div className="relative mb-8">
        <Ic.Search style={{position:'absolute',left:'16px',top:'50%',transform:'translateY(-50%)',width:'14px',height:'14px',color:'var(--light)',pointerEvents:'none'}}/>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Rechercher un patient, un motif…"
          className="search-premium w-full"
          style={{paddingLeft:'44px',paddingRight:'16px',paddingTop:'13px',paddingBottom:'13px',fontSize:'13px',color:'var(--charcoal)',width:'100%',fontFamily:"'DM Sans',sans-serif",fontWeight:300,letterSpacing:'0.01em'}}/>
        {searchRes&&(
          <div className="absolute top-full mt-2 left-0 right-0 bg-white border border-slate-200 rounded-2xl shadow-xl z-10 overflow-hidden fade-in">
            {searchRes.patients?.length>0&&<>
              <p className="px-4 pt-3 pb-1 text-xs font-semibold text-slate-400 uppercase tracking-wide">Patients</p>
              {searchRes.patients.map(p=>(
                <button key={p.id} onClick={()=>{setSearch('');setSearchRes(null);onNav('patient/'+p.id);}}
                  className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 text-left">
                  <div className={`w-8 h-8 rounded-full ${avatarColor(p.sexe)} flex items-center justify-center text-white text-xs font-bold flex-shrink-0`}>{initials(p.prenom,p.nom)}</div>
                  <span className="text-sm font-medium">{p.prenom} {p.nom}</span>
                  <span className="text-xs text-slate-400 ml-auto">{ageStr(p.dateNaissance)}</span>
                </button>
              ))}
            </>}
            {searchRes.consultations?.length>0&&<>
              <p className="px-4 pt-2 pb-1 text-xs font-semibold text-slate-400 uppercase tracking-wide border-t border-slate-100 mt-1">Consultations</p>
              {searchRes.consultations.map(c=>(
                <button key={c.id} onClick={()=>{setSearch('');setSearchRes(null);onNav('consultation/'+c.id+'/patient');}}
                  className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 text-left">
                  <Ic.Steth className="w-4 h-4 text-slate-400 flex-shrink-0"/>
                  <div>
                    <p className="text-sm font-medium">{c.motif}</p>
                    <p className="text-xs text-slate-400">{c.prenom} {c.nom} · {fmtDate(c.date)}</p>
                  </div>
                </button>
              ))}
            </>}
            {!searchRes.patients?.length&&!searchRes.consultations?.length&&
              <p className="px-4 py-4 text-sm text-slate-400 text-center">Aucun résultat pour « {search} »</p>}
          </div>
        )}
      </div>

      {/* ── Secretary Alerts ── */}
      {(alertsUnread>0||showAlerts)&&(
        <div className={`rounded-2xl border shadow-sm mb-6 overflow-hidden ${alertsUnread>0?'border-amber-200 bg-amber-50':'border-slate-100 bg-white'}`}>
          <div className="px-5 py-3.5 flex items-center gap-3">
            <div className={`w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0 ${alertsUnread>0?'bg-amber-100':'bg-slate-100'}`}>
              <Ic.Bell className={`w-4 h-4 ${alertsUnread>0?'text-amber-600':'text-slate-400'}`}/>
            </div>
            <div className="flex-1">
              <span className="text-sm font-semibold text-slate-800">Messages du secrétariat</span>
              {alertsUnread>0&&<span className="ml-2 text-xs font-bold bg-amber-500 text-white rounded-full px-2 py-0.5">{alertsUnread} nouveau{alertsUnread>1?'x':''}</span>}
            </div>
            {alertsUnread>0&&<button onClick={markAllRead} className="text-xs text-amber-700 hover:text-amber-900 font-medium">Tout marquer lu</button>}
            <button onClick={()=>setShowAlerts(s=>!s)} className="text-xs text-slate-400 hover:text-slate-600 font-medium">{showAlerts?'Réduire':'Voir tout'}</button>
          </div>
          {/* Always show unread; show all when expanded */}
          <div className="divide-y divide-amber-100">
            {alerts.filter(a=>showAlerts||!a.isRead).map(al=>{
              const typeColor={urgent:'bg-red-100 text-red-700',rdv:'bg-blue-100 text-blue-700',admin:'bg-violet-100 text-violet-700',info:'bg-slate-100 text-slate-600'}[al.type]||'bg-slate-100 text-slate-600';
              const typeLabel={urgent:'Urgent',rdv:'RDV',admin:'Administratif',info:'Info'}[al.type]||'Info';
              return(
                <div key={al.id} className={`px-5 py-3.5 flex items-start gap-3 ${al.isRead?'opacity-60':''}`}>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 mt-0.5 ${typeColor}`}>{typeLabel}</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-slate-800">{al.message}</p>
                    <p className="text-xs text-slate-400 mt-0.5">{al.fromName} · {new Date(al.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</p>
                  </div>
                  {!al.isRead&&<button onClick={()=>markRead(al.id)} className="text-xs text-slate-400 hover:text-slate-600 flex-shrink-0 mt-0.5">✓ Lu</button>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {!alertsUnread&&!showAlerts&&alerts.length>0&&(
        <div className="flex justify-end mb-2">
          <button onClick={()=>setShowAlerts(true)} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-600">
            <Ic.Bell className="w-3.5 h-3.5"/>{alerts.length} message{alerts.length>1?'s':''} secrétariat
          </button>
        </div>
      )}

      {/* ── Main grid: left (2/3) + right agenda (1/3) ── */}
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">

        {/* ─── LEFT column ─── */}
        <div className="xl:col-span-2 space-y-6">

          {/* Stat cards */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              {label:'Patients',      val:stats?.totalPatients??'—', sub:'dans la base'},
              {label:'Aujourd\'hui',  val:stats?.consultToday??'—',  sub:'consultations'},
              {label:'Cette semaine', val:stats?.consultWeek??'—',   sub:'consultations'},
              {label:'Notes validées',val:stats?.notesValidated??'—',sub:'comptes rendus'},
            ].map(({label,val,sub})=>(
              <div key={label} className="stat-block card-hover">
                <span className="stat-n">{val}</span>
                <span className="stat-l">{label}</span>
                <span style={{display:'block',fontSize:'9px',letterSpacing:'0.15em',textTransform:'uppercase',color:'rgba(250,250,248,0.3)',marginTop:'4px'}}>{sub}</span>
              </div>
            ))}
          </div>

          {/* Activity line chart */}
          {stats?.last7days?.length>0&&(
            <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'28px 32px'}}>
              <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:'24px'}}>
                <div>
                  <p className="eyebrow" style={{marginBottom:'6px'}}>Activité</p>
                  <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)',lineHeight:1.2}}>Consultations — 7 derniers jours</h3>
                  <p style={{fontSize:'12px',color:'var(--muted)',marginTop:'3px',fontWeight:300}}>{stats.last7days.reduce((a,d)=>a+d.n,0)} au total cette semaine</p>
                </div>
                <button onClick={()=>onNav('analytics')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,background:'none',border:'none'}}>Statistiques →</button>
              </div>
              {(()=>{
                const data=stats.last7days;
                const maxV=Math.max(...data.map(d=>d.n),1);
                const W=500,H=90,pad=20;
                const pts=data.map((d,i)=>{
                  const x=pad+i*((W-pad*2)/(data.length-1||1));
                  const y=H-(d.n/maxV)*(H-16)+8;
                  return{x,y,d};
                });
                const path=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
                const area=`M${pts[0].x},${H} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${H} Z`;
                return(
                  <svg width="100%" viewBox={`0 0 ${W} ${H+22}`} style={{overflow:'visible'}}>
                    <defs>
                      <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#B8935A" stopOpacity="0.12"/>
                        <stop offset="100%" stopColor="#B8935A" stopOpacity="0"/>
                      </linearGradient>
                    </defs>
                    {[0,1,2,3].map(i=>{
                      const y=8+(i/3)*(H-16);
                      return<line key={i} x1={pad} y1={y} x2={W-pad} y2={y} stroke="#E8E4DC" strokeWidth="1"/>;
                    })}
                    <path d={area} fill="url(#chartGrad)"/>
                    <path d={path} fill="none" stroke="#B8935A" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter"/>
                    {pts.map((p,i)=>(
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r="3" fill="#FAFAF8" stroke="#B8935A" strokeWidth="1.5"/>
                        {p.d.n>0&&<text x={p.x} y={p.y-10} fontSize="9" textAnchor="middle" fill="#B8935A" fontWeight="400">{p.d.n}</text>}
                        <text x={p.x} y={H+18} fontSize="9" textAnchor="middle" fill="#BEBEBE">{p.d.d?.slice(5)}</text>
                      </g>
                    ))}
                  </svg>
                );
              })()}
            </div>
          )}

          {/* Honoraires + Alertes row */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            {/* Honoraires card */}
            <button onClick={()=>onNav('honoraires')} className="card-hover text-left" style={{background:'var(--navy)',border:'1px solid var(--navy-mid)',padding:'28px 28px 24px',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',bottom:0,left:0,width:'40px',height:'2px',background:'var(--gold)'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
                <p className="eyebrow" style={{color:'rgba(250,250,248,0.45)'}}>Honoraires</p>
                <span style={{fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500}}>Voir →</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'16px'}}>
                {[{v:hon?fmtFCFA(hon.revenus?.jour):'—',l:"Aujourd'hui"},{v:hon?fmtFCFA(hon.revenus?.mois):'—',l:'Ce mois'},{v:hon?.nonFactures?.count??'—',l:'Non facturés'}].map(({v,l})=>(
                  <div key={l}>
                    <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'24px',fontWeight:300,color:'var(--gold-light)',lineHeight:1}}>{v}</p>
                    <p style={{fontSize:'9px',letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(250,250,248,0.35)',marginTop:'6px'}}>{l}</p>
                  </div>
                ))}
              </div>
            </button>

            {/* Alertes */}
            <div style={{background:'var(--cream)',border:'1px solid var(--border)',padding:'28px'}}>
              <p className="eyebrow" style={{marginBottom:'16px'}}>À traiter</p>
              {!hasAlerts&&<p style={{fontSize:'13px',color:'var(--muted)',fontWeight:300}}>Aucune alerte en cours.</p>}
              <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                {stats?.pendingNotes>0&&(
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                    <p style={{fontSize:'13px',color:'var(--charcoal)',fontWeight:300}}>{stats.pendingNotes} note{stats.pendingNotes>1?'s':''} en attente</p>
                    <button onClick={()=>onNav('patients')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,background:'none',border:'none'}}>Voir</button>
                  </div>
                )}
                {hon?.nonFactures?.count>0&&(
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                    <p style={{fontSize:'13px',color:'var(--charcoal)',fontWeight:300}}>{hon.nonFactures.count} acte{hon.nonFactures.count>1?'s':''} non facturé{hon.nonFactures.count>1?'s':''}</p>
                    <button onClick={()=>onNav('honoraires')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,background:'none',border:'none'}}>Facturer</button>
                  </div>
                )}
                {hon?.rejets?.count>0&&(
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0'}}>
                    <p style={{fontSize:'13px',color:'var(--accent)',fontWeight:300}}>{hon.rejets.count} rejet{hon.rejets.count>1?'s':''} — {fmtFCFA(hon.rejets.total)}</p>
                    <button onClick={()=>onNav('honoraires')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--accent)',fontWeight:500,background:'none',border:'none'}}>Traiter</button>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Recent consultations */}
          <div style={{border:'1px solid var(--border)'}}>
            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <p className="eyebrow">Consultations récentes</p>
              <button onClick={()=>onNav('patients')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,background:'none',border:'none'}}>Voir patients →</button>
            </div>
            {stats?.recentConsultations?.length===0&&<p style={{padding:'32px',textAlign:'center',fontSize:'13px',color:'var(--muted)',fontWeight:300}}>Aucune consultation</p>}
            {stats?.recentConsultations?.map(c=>{
              const {t,c:color}=statusLabel(c.statut);
              const statusColors={green:'var(--green)',blue:'var(--navy)',amber:'var(--gold)'};
              return(
                <div key={c.id} onClick={()=>onNav('consultation/'+c.id+'/'+c.patientId)}
                  className="data-row" style={{padding:'14px 24px',display:'flex',alignItems:'center',gap:'16px',cursor:'pointer'}}>
                  <div style={{width:'28px',height:'28px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold-light)',fontSize:'10px',flexShrink:0,fontFamily:"'Cormorant Garamond',serif"}}>{initials(c.prenom,c.nom)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:'13px',fontWeight:400,color:'var(--navy)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.prenom} {c.nom}</p>
                    <p style={{fontSize:'11px',color:'var(--muted)',fontWeight:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.motif}</p>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'12px',flexShrink:0}}>
                    <span style={{fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:statusColors[color]||'var(--muted)',fontWeight:500}}>{t}</span>
                    <span style={{fontSize:'11px',color:'var(--light)'}}>{fmtDate(c.date)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ─── RIGHT column: Agenda du jour ─── */}
        <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
          <div style={{border:'1px solid var(--border)',overflow:'hidden'}}>
            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <p className="eyebrow">Agenda du jour</p>
              <button onClick={()=>onNav('agenda')} style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--gold)',fontWeight:500,background:'none',border:'none'}}>Tout →</button>
            </div>
            {!agenda&&<p style={{padding:'24px',textAlign:'center',fontSize:'13px',color:'var(--muted)',fontWeight:300}}>Chargement…</p>}
            {agenda?.length===0&&(
              <div style={{padding:'32px',textAlign:'center'}}>
                <p style={{fontSize:'13px',color:'var(--muted)',fontWeight:300}}>Pas de rendez-vous aujourd'hui</p>
              </div>
            )}
            {agenda?.slice(0,8).map(a=>{
              const {t}=statutAgenda(a.statut);
              return(
                <div key={a.id} className="data-row" style={{padding:'12px 24px',display:'flex',alignItems:'center',gap:'14px'}}>
                  <span style={{fontSize:'12px',color:'var(--gold)',fontWeight:500,minWidth:'36px',flexShrink:0}}>{a.heure}</span>
                  <div style={{width:'26px',height:'26px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold-light)',fontSize:'9px',flexShrink:0,fontFamily:"'Cormorant Garamond',serif"}}>{initials(a.prenom,a.nom)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:'12px',fontWeight:400,color:'var(--navy)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.prenom} {a.nom}</p>
                    <p style={{fontSize:'10px',color:'var(--muted)',fontWeight:300,letterSpacing:'0.02em'}}>{a.motif||'Consultation'}</p>
                  </div>
                  <span style={{fontSize:'9px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--muted)',flexShrink:0}}>{t}</span>
                </div>
              );
            })}
          </div>

          {/* Top motifs */}
          {stats?.topMotifsWeek?.length>0&&(
            <div style={{border:'1px solid var(--border)',padding:'20px 24px'}}>
              <p className="eyebrow" style={{marginBottom:'16px'}}>Top motifs — 7 jours</p>
              {stats.topMotifsWeek.map((m,i)=>{
                const pct=Math.round((m.n/(stats.topMotifsWeek[0].n||1))*100);
                return(
                  <div key={i} style={{marginBottom:'12px'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}>
                      <p style={{fontSize:'12px',color:'var(--charcoal)',fontWeight:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:'8px'}}>{m.motif}</p>
                      <span style={{fontSize:'11px',color:'var(--muted)',flexShrink:0}}>{m.n}</span>
                    </div>
                    <div style={{height:'1px',background:'var(--border)',overflow:'hidden'}}>
                      <div style={{height:'100%',background:'var(--gold)',width:pct+'%'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   PATIENTS LIST
══════════════════════════════════════════════════════════════ */
function PatientList({onSelect,onNew}){
  const [patients,setPatients]=useState([]);
  const [search,setSearch]=useState('');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api.get('/patients').then(d=>{if(Array.isArray(d))setPatients(d);setLoading(false);});},[]);
  const filtered=useMemo(()=>patients.filter(p=>`${p.nom} ${p.prenom}`.toLowerCase().includes(search.toLowerCase())),[patients,search]);

  return(
    <Page title="Patients" subtitle={`${patients.length} patient${patients.length>1?'s':''} enregistré${patients.length>1?'s':''}`}
      actions={<Btn variant="primary" icon={Ic.Plus} onClick={onNew}>Nouveau patient</Btn>}>
      <div className="relative mb-6">
        <Ic.Search className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher par nom ou prénom…"
          className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>
      {loading?<div className="flex justify-center py-20"><Ic.Spin className="w-6 h-6 text-slate-400"/></div>:(
        <div className="grid gap-3">
          {filtered.map(p=>(
            <button key={p.id} onClick={()=>onSelect(p.id)}
              className="card-hover bg-white border border-slate-100 rounded-2xl px-5 py-4 flex items-center gap-4 text-left w-full shadow-sm">
              <div className={`w-12 h-12 rounded-2xl ${avatarColor(p.sexe)} flex items-center justify-center text-white font-bold flex-shrink-0`}>
                {initials(p.prenom,p.nom)}
              </div>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-slate-900">{p.prenom} {p.nom}</p>
                <p className="text-slate-400 text-sm">{ageStr(p.dateNaissance)} · né{p.sexe==='F'?'e':''} le {fmtDate(p.dateNaissance)}</p>
              </div>
              <Badge color={p.sexe==='F'?'red':'blue'}>{p.sexe==='F'?'F':'M'}</Badge>
              <Ic.Chevron className="w-4 h-4 text-slate-300 flex-shrink-0"/>
            </button>
          ))}
          {!filtered.length&&<div className="text-center py-16 text-slate-400">
            <Ic.Users className="w-10 h-10 mx-auto mb-3 opacity-40"/>
            <p className="text-sm">Aucun patient trouvé</p>
          </div>}
        </div>
      )}
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   PATIENT FORM
══════════════════════════════════════════════════════════════ */
function PatientForm({patientId,onSave,onBack}){
  const empty={nom:'',prenom:'',dateNaissance:'',sexe:'M',telephone:'',telephone2:'',email:'',adresse:'',typeAssurance:'',numAssurance:'',antecedents:'',allergies:'',traitements:'',antecedents_familiaux:'',antecedents_chirurgicaux:'',vaccinations:'',facteurs_risque:'',intolerances:''};
  const [form,setForm]=useState(empty);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(patientId)api.get(`/patients/${patientId}`).then(p=>setForm(p));},[patientId]);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const save=async()=>{setSaving(true);if(patientId)await api.put(`/patients/${patientId}`,form);else await api.post('/patients',form);setSaving(false);onSave();};

  return(
    <Page title={patientId?'Modifier le dossier':'Nouveau patient'} breadcrumb={<><span className="cursor-pointer hover:text-slate-600" onClick={onBack}>Patients</span> / {patientId?'Modifier':'Nouveau'}</>}>
      <div className="max-w-2xl space-y-5">
        <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm space-y-5">
          <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Identité</p>
          <div className="grid grid-cols-2 gap-4">
            <Input label="Prénom" value={form.prenom} onChange={set('prenom')}/>
            <Input label="Nom" value={form.nom} onChange={set('nom')}/>
            <Input label="Date de naissance" type="date" value={form.dateNaissance} onChange={set('dateNaissance')}/>
            <div>
              <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Sexe</label>
              <select value={form.sexe} onChange={set('sexe')} className="w-full border border-slate-200 bg-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="M">Masculin</option><option value="F">Féminin</option>
              </select>
            </div>
            <Input label="Téléphone" value={form.telephone} onChange={set('telephone')}/>
            <Input label="Email" type="email" value={form.email} onChange={set('email')}/>
            <Input label="Tél. WhatsApp 2" value={form.telephone2||''} onChange={set('telephone2')}/>
            <div className="col-span-2">
              <Input label="Adresse / Quartier" value={form.adresse} onChange={set('adresse')}/>
            </div>
          </div>
          <div className="border-t border-slate-100 pt-5">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Assurance</p>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Type d'assurance</label>
                <select value={form.typeAssurance} onChange={set('typeAssurance')} className="w-full border border-slate-200 bg-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">— Sélectionner —</option>
                  <option value="CNAMGS">CNAMGS</option>
                  <option value="CNSS">CNSS</option>
                  <option value="Privée (Saham)">Privée (Saham)</option>
                  <option value="Privée (AXA)">Privée (AXA)</option>
                  <option value="Privée (Autre)">Privée (Autre)</option>
                  <option value="Aucune">Aucune</option>
                </select>
              </div>
              <Input label="Numéro d'assurance" value={form.numAssurance} onChange={set('numAssurance')}/>
            </div>
          </div>
          <div className="border-t border-slate-100 pt-5">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Informations médicales</p>
            <div className="space-y-4">
              <Input label="Antécédents médicaux personnels" value={form.antecedents} onChange={set('antecedents')} textarea rows={2} placeholder="Ex: HTA depuis 2018, hypothyroïdie…"/>
              <Input label="Antécédents familiaux" value={form.antecedents_familiaux||''} onChange={set('antecedents_familiaux')} textarea rows={2} placeholder="Ex: père — IDM à 55 ans, mère — diabète type 2…"/>
              <Input label="Antécédents chirurgicaux" value={form.antecedents_chirurgicaux||''} onChange={set('antecedents_chirurgicaux')} textarea rows={2} placeholder="Ex: appendicectomie 2005, cholécystectomie 2015…"/>
              <div className="grid grid-cols-2 gap-4">
                <Input label="Allergies médicamenteuses" value={form.allergies} onChange={set('allergies')} textarea rows={2} placeholder="Ex: Pénicilline, Aspirine…"/>
                <Input label="Intolérances médicamenteuses" value={form.intolerances||''} onChange={set('intolerances')} textarea rows={2} placeholder="Ex: AINS (gastrite), Codéine (nausées)…"/>
              </div>
              <Input label="Vaccinations" value={form.vaccinations||''} onChange={set('vaccinations')} textarea rows={2} placeholder="Ex: Fièvre jaune 2023, Hépatite B (complet), Tétanos 2020…"/>
              <Input label="Facteurs de risque" value={form.facteurs_risque||''} onChange={set('facteurs_risque')} textarea rows={2} placeholder="Ex: tabagisme, obésité, sédentarité, alcool, exposition professionnelle…"/>
              <Input label="Traitements chroniques en cours" value={form.traitements} onChange={set('traitements')} textarea rows={3} placeholder="Ex: Lévothyrox 75µg 1cp/j, Ramipril 5mg 1cp/j…"/>
            </div>
          </div>
        </div>
        <div className="flex gap-3 justify-end">
          <Btn variant="secondary" onClick={onBack}>Annuler</Btn>
          <Btn variant="primary" onClick={save} loading={saving} icon={Ic.Check}>{patientId?'Enregistrer':'Créer le patient'}</Btn>
        </div>
      </div>
    </Page>
  );
}

/* ══════════════════════════════════════════════════════════════
   DISCUSSION PANEL (chat inter-médecins par patient)
══════════════════════════════════════════════════════════════ */
function DiscussionPanel({patientId,userId}){
  const [discussions,setDiscussions]=useState([]);
  const [active,setActive]=useState(null);
  const [messages,setMessages]=useState([]);
  const [participants,setParticipants]=useState([]);
  const [text,setText]=useState('');
  const [otherDoctors,setOtherDoctors]=useState([]);
  const [showInvite,setShowInvite]=useState(false);
  const [creating,setCreating]=useState(false);
  const [newTitre,setNewTitre]=useState('');
  const [sending,setSending]=useState(false);
  const [uploading,setUploading]=useState(false);
  const msgEnd=useRef(null);
  const pollRef=useRef(null);
  const fileRef=useRef(null);

  const loadDiscussions=()=>api.get(`/patients/${patientId}/discussions`).then(setDiscussions);
  useEffect(()=>{loadDiscussions();},[patientId]);

  const openDiscussion=async(d)=>{
    setActive(d);
    const data=await api.get(`/discussions/${d.id}/messages`);
    setMessages(data.messages);
    setParticipants(data.participants);
  };

  // Poll for new messages when a discussion is open
  useEffect(()=>{
    clearInterval(pollRef.current);
    if(!active) return;
    pollRef.current=setInterval(async()=>{
      const data=await api.get(`/discussions/${active.id}/messages`);
      setMessages(data.messages);
      setParticipants(data.participants);
    },5000);
    return()=>clearInterval(pollRef.current);
  },[active]);

  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:'smooth'});},[messages]);

  const send=async()=>{
    if(!text.trim()||sending) return;
    setSending(true);
    const msg=await api.post(`/discussions/${active.id}/messages`,{contenu:text});
    setMessages(m=>[...m,msg]);
    setText('');
    setSending(false);
  };

  const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  const uploadPdf=async e=>{
    const file=e.target.files?.[0];
    if(!file||!active) return;
    e.target.value='';
    setUploading(true);
    const fd=new FormData();
    fd.append('fichier',file);
    try{
      const r=await fetch(`${API}/discussions/${active.id}/upload`,{method:'POST',headers:{Authorization:`Bearer ${getToken()}`},body:fd});
      const msg=await r.json();
      if(msg.id) setMessages(m=>[...m,msg]);
    }finally{setUploading(false);}
  };

  const downloadPdf=async(filename,nom)=>{
    const r=await fetch(`${API}/discussions/files/${filename}`,{headers:{Authorization:`Bearer ${getToken()}`}});
    if(!r.ok) return;
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=nom||filename;a.click();
    URL.revokeObjectURL(url);
  };;

  const loadInvitable=async()=>{
    const all=await api.get('/users');
    setOtherDoctors(all.filter(u=>!participants.find(p=>p.id===u.id)));
    setShowInvite(true);
  };

  const invite=async(uid)=>{
    await api.post(`/discussions/${active.id}/invite`,{userId:uid});
    const data=await api.get(`/discussions/${active.id}/messages`);
    setParticipants(data.participants);
    setOtherDoctors([]);
    setShowInvite(false);
  };

  const create=async()=>{
    if(!newTitre.trim()) return;
    const d=await api.post(`/patients/${patientId}/discussions`,{titre:newTitre});
    setNewTitre('');setCreating(false);
    await loadDiscussions();
    const fresh=await api.get(`/patients/${patientId}/discussions`);
    const found=fresh.find(x=>x.id===d.id);
    if(found) openDiscussion(found);
  };

  const fmtTime=s=>{
    if(!s) return '';
    const dt=new Date(s.replace(' ','T'));
    const today=new Date().toDateString();
    if(dt.toDateString()===today) return dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  };

  const initDoc=(nom,prenom)=>((prenom?.[0]||'')+(nom?.[0]||'')).toUpperCase();
  const docColor=id=>{const colors=['bg-violet-500','bg-teal-500','bg-blue-500','bg-emerald-500','bg-indigo-500'];const i=id?.charCodeAt(id.length-1)%colors.length||0;return colors[i];};

  // ── LIST VIEW ──
  if(!active) return(
    <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
      <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 className="font-semibold text-slate-900 flex items-center gap-2"><Ic.Chat className="w-4 h-4 text-violet-500"/>Discussions médicales</h3>
        <Btn variant="secondary" size="sm" icon={Ic.Plus} onClick={()=>setCreating(true)}>Nouvelle</Btn>
      </div>

      {creating&&(
        <div className="px-5 py-4 border-b border-slate-100 bg-violet-50/40 flex gap-2 items-center">
          <input autoFocus value={newTitre} onChange={e=>setNewTitre(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')create();if(e.key==='Escape'){setCreating(false);setNewTitre('');}}}
            placeholder="Sujet de la discussion…"
            className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/>
          <Btn variant="primary" size="sm" onClick={create} disabled={!newTitre.trim()}>Créer</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>{setCreating(false);setNewTitre('');}}>✕</Btn>
        </div>
      )}

      {discussions.length===0&&!creating&&(
        <div className="px-6 py-8 text-center">
          <Ic.Chat className="w-8 h-8 text-slate-200 mx-auto mb-2"/>
          <p className="text-sm text-slate-400">Aucune discussion pour ce patient</p>
          <p className="text-xs text-slate-300 mt-1">Collaborez avec un confrère sur ce cas</p>
        </div>
      )}

      <div className="divide-y divide-slate-50">
        {discussions.map(d=>(
          <button key={d.id} onClick={()=>openDiscussion(d)}
            className="w-full px-5 py-3.5 flex items-start gap-3 hover:bg-slate-50 text-left">
            <div className="w-9 h-9 rounded-xl bg-violet-100 flex items-center justify-center flex-shrink-0">
              <Ic.Chat className="w-4 h-4 text-violet-600"/>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-2">
                <p className="text-sm font-semibold text-slate-900 truncate">{d.titre}</p>
                <span className="text-xs text-slate-400 flex-shrink-0">{fmtTime(d.lastAt||d.createdAt)}</span>
              </div>
              {d.lastMsg&&<p className="text-xs text-slate-400 truncate mt-0.5">{d.lastMsg}</p>}
              <div className="flex items-center gap-1.5 mt-1.5">
                {d.participants?.map(p=>(
                  <div key={p.id} title={`${p.prenom} ${p.nom} — ${p.specialite}`}
                    className={`w-5 h-5 rounded-full ${docColor(p.id)} flex items-center justify-center text-white flex-shrink-0`}
                    style={{fontSize:'8px',fontWeight:'bold'}}>{initDoc(p.nom,p.prenom)}</div>
                ))}
                {d.msgCount>0&&<span className="text-xs text-slate-400 ml-1">{d.msgCount} message{d.msgCount>1?'s':''}</span>}
              </div>
            </div>
            <Ic.Chevron className="w-4 h-4 text-slate-300 mt-1 flex-shrink-0"/>
          </button>
        ))}
      </div>
    </div>
  );

  // ── CHAT VIEW ──
  return(
    <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden flex flex-col" style={{minHeight:'480px'}}>
      {/* Header */}
      <div className="px-5 py-3.5 border-b border-slate-100 flex items-center gap-3">
        <button onClick={()=>{setActive(null);setMessages([]);setShowInvite(false);}} className="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-slate-900 truncate">{active.titre}</p>
          <div className="flex items-center gap-1.5 mt-0.5">
            {participants.map(p=>(
              <span key={p.id} className="text-xs text-slate-400">{p.prenom} {p.nom} ({p.specialite}){participants.indexOf(p)<participants.length-1?',':''}</span>
            ))}
          </div>
        </div>
        <div className="relative">
          <Btn variant="secondary" size="sm" icon={Ic.UserPlus} onClick={loadInvitable}>Inviter</Btn>
          {showInvite&&(
            <div className="absolute right-0 top-full mt-2 w-60 bg-white border border-slate-200 rounded-2xl shadow-xl z-20 overflow-hidden">
              <p className="px-4 pt-3 pb-1 text-xs font-semibold text-slate-400 uppercase tracking-wide">Inviter un médecin</p>
              {otherDoctors.length===0&&<p className="px-4 py-3 text-sm text-slate-400">Tous les médecins sont déjà dans la discussion.</p>}
              {otherDoctors.map(d=>(
                <button key={d.id} onClick={()=>invite(d.id)}
                  className="w-full px-4 py-2.5 flex items-center gap-3 hover:bg-slate-50 text-left">
                  <div className={`w-7 h-7 rounded-full ${docColor(d.id)} flex items-center justify-center text-white flex-shrink-0`} style={{fontSize:'10px',fontWeight:'bold'}}>{initDoc(d.nom,d.prenom)}</div>
                  <div>
                    <p className="text-sm font-semibold text-slate-900">{d.prenom} {d.nom}</p>
                    <p className="text-xs text-slate-400">{d.specialite}</p>
                  </div>
                </button>
              ))}
              <div className="border-t border-slate-100 p-2">
                <Btn variant="ghost" size="sm" onClick={()=>setShowInvite(false)} className="w-full">Fermer</Btn>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto p-4 space-y-3" style={{maxHeight:'320px'}}>
        {messages.length===0&&(
          <div className="text-center py-8">
            <Ic.Chat className="w-8 h-8 text-slate-200 mx-auto mb-2"/>
            <p className="text-sm text-slate-400">Aucun message — démarrez la discussion</p>
          </div>
        )}
        {messages.map((m,i)=>{
          const isMe=m.userId===userId;
          const prevSame=i>0&&messages[i-1].userId===m.userId;
          return(
            <div key={m.id} className={`flex items-end gap-2 ${isMe?'flex-row-reverse':''}`}>
              {!isMe&&!prevSame&&(
                <div className={`w-7 h-7 rounded-full ${docColor(m.userId)} flex items-center justify-center text-white flex-shrink-0 mb-0.5`} style={{fontSize:'9px',fontWeight:'bold'}}>{initDoc(m.nom,m.prenom)}</div>
              )}
              {!isMe&&prevSame&&<div className="w-7 flex-shrink-0"/>}
              <div className={`max-w-[75%] ${isMe?'items-end':'items-start'} flex flex-col gap-0.5`}>
                {!prevSame&&(
                  <p className={`text-xs text-slate-400 px-1 ${isMe?'text-right':''}`}>
                    {isMe?'Vous':`${m.prenom} ${m.nom}`} · {fmtTime(m.createdAt)}
                  </p>
                )}
                <div className={`rounded-2xl px-3.5 py-2.5 text-sm leading-relaxed ${isMe?'bg-violet-600 text-white rounded-br-sm':'bg-slate-100 text-slate-900 rounded-bl-sm'}`}>
                  {m.contenu&&<p>{m.contenu}</p>}
                  {m.fichier&&(
                    <button onClick={()=>downloadPdf(m.fichier,m.fichierNom)}
                      className={`flex items-center gap-2 mt-1.5 px-3 py-2 rounded-xl border text-xs font-medium hover:opacity-80 transition-opacity w-full text-left ${isMe?'bg-white/15 border-white/20 text-white':'bg-white border-slate-200 text-slate-700'}`}>
                      <Ic.FileText className="w-4 h-4 flex-shrink-0"/>
                      <span className="truncate flex-1">{m.fichierNom||'document.pdf'}</span>
                      <Ic.Download className="w-3.5 h-3.5 flex-shrink-0 opacity-60"/>
                    </button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={msgEnd}/>
      </div>

      {/* Input */}
      <div className="border-t border-slate-100 p-3 flex items-end gap-2">
        <input ref={fileRef} type="file" accept=".pdf,application/pdf" className="hidden" onChange={uploadPdf}/>
        <button onClick={()=>fileRef.current?.click()} disabled={uploading}
          title="Joindre un PDF"
          className="w-9 h-9 rounded-xl border border-slate-200 hover:bg-slate-50 disabled:opacity-40 flex items-center justify-center text-slate-400 flex-shrink-0 transition-colors">
          {uploading?<Ic.Spin className="w-4 h-4"/>:<Ic.Paperclip className="w-4 h-4"/>}
        </button>
        <textarea value={text} onChange={e=>setText(e.target.value)} onKeyDown={handleKey}
          placeholder="Écrivez un message… (Entrée pour envoyer)"
          rows={1}
          className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 resize-none leading-5"
          style={{minHeight:'40px',maxHeight:'120px'}}
          onInput={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}/>
        <button onClick={send} disabled={!text.trim()||sending}
          className="w-9 h-9 rounded-xl bg-violet-600 hover:bg-violet-700 disabled:bg-slate-200 flex items-center justify-center text-white flex-shrink-0 transition-colors">
          <Ic.Send className="w-4 h-4"/>
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PATIENT FILE
══════════════════════════════════════════════════════════════ */
function NoteModal({consultationId, motif, onClose}){
  const [data,setData]=useState(null);
  useEffect(()=>{api.get(`/consultations/${consultationId}`).then(setData);},[consultationId]);
  const fields=[
    {label:'Motif',key:'motif'},
    {label:'Histoire de la maladie',key:'histoire'},
    {label:'Examen clinique',key:'examen'},
    {label:'Hypothèses diagnostiques',key:'hypotheses'},
    {label:'Conduite à tenir',key:'conduite'},
    {label:'Prescriptions / Examens',key:'prescriptions'},
    {label:'Conseils au patient',key:'conseils_patient'},
    {label:'⚠ Signes d\'alarme',key:'drapeaux_rouges'},
  ];
  const dlPdf=async()=>{const r=await fetch(`${API}/consultations/${consultationId}/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='consultation.pdf';a.click();};
  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 flex-shrink-0">
          <div>
            <h3 className="font-bold text-slate-900">{motif}</h3>
            {data&&<p className="text-xs text-slate-400 mt-0.5">{fmtDateLong(data.date)}</p>}
          </div>
          <div className="flex items-center gap-2">
            <button onClick={dlPdf} className="flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-700 font-medium px-3 py-1.5 rounded-lg hover:bg-blue-50">
              <Ic.Download className="w-3.5 h-3.5"/> PDF
            </button>
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 text-xl font-light">✕</button>
          </div>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-5">
          {!data?<div className="flex justify-center py-10"><Ic.Spin className="w-6 h-6 text-slate-400"/></div>
          :!data.note?<div className="text-center py-10 text-slate-400"><p className="text-sm">Aucune note disponible pour cette consultation.</p></div>
          :<div className="space-y-4">
            {data.transcription&&(
              <div className="bg-slate-50 rounded-xl p-4">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Transcription</p>
                <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{data.transcription}</p>
              </div>
            )}
            {fields.map(({label,key})=>data.note[key]?(
              <div key={key} className={`rounded-xl p-4 ${key==='drapeaux_rouges'?'bg-rose-50 border border-rose-100':key==='conseils_patient'?'bg-blue-50 border border-blue-100':'bg-slate-50'}`}>
                <p className={`text-xs font-semibold uppercase tracking-wide mb-1.5 ${key==='drapeaux_rouges'?'text-rose-600':key==='conseils_patient'?'text-blue-600':'text-slate-500'}`}>{label}</p>
                <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{data.note[key]}</p>
              </div>
            ):null)}
          </div>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   IMAGERIE MÉDICALE — PostDICOM
══════════════════════════════════════════════════════════════ */
function ImagingSection({patientId}){
  const [data,setData]=useState(null);
  const [open,setOpen]=useState(true);
  useEffect(()=>{api.get(`/patients/${patientId}/imaging`).then(setData);},[patientId]);

  const modalityLabel={CR:'Radiographie',US:'Échographie',MR:'IRM',CT:'Scanner',PT:'TEP',NM:'Scintigraphie',OT:'Autre',MG:'Mammographie',XA:'Angiographie'};
  const modalityColor={CR:'bg-blue-100 text-blue-700',US:'bg-teal-100 text-teal-700',MR:'bg-violet-100 text-violet-700',CT:'bg-orange-100 text-orange-700',OT:'bg-slate-100 text-slate-600',MG:'bg-pink-100 text-pink-700'};

  const fmtStudyDate=s=>{
    if(!s||s.length<8) return s||'—';
    return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
  };

  const studies=data?.studies||[];
  const isMock=data?.source==='mock';

  return(
    <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
      <button onClick={()=>setOpen(o=>!o)} className="w-full px-6 py-4 border-b border-slate-100 flex items-center justify-between hover:bg-slate-50/50">
        <h3 className="font-semibold text-slate-900 flex items-center gap-2">
          <svg className="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
          Imagerie médicale
          {isMock&&<span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">Démo</span>}
        </h3>
        <div className="flex items-center gap-2">
          {studies.length>0&&<span className="text-xs text-slate-400">{studies.length} examen{studies.length>1?'s':''}</span>}
          <svg className={`w-4 h-4 text-slate-400 transition-transform ${open?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
        </div>
      </button>

      {open&&(
        <div className="p-5">
          {!data&&<div className="flex justify-center py-6"><Ic.Spin className="w-5 h-5 text-slate-300"/></div>}

          {data&&studies.length===0&&(
            <div className="text-center py-8">
              <svg className="w-8 h-8 text-slate-200 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
              <p className="text-sm text-slate-400">Aucun examen d'imagerie enregistré</p>
            </div>
          )}

          {studies.length>0&&(
            <div className="space-y-3">
              {studies.map(s=>(
                <div key={s.id} className="border border-slate-100 rounded-xl p-4 hover:border-violet-200 hover:bg-violet-50/20 transition-colors">
                  <div className="flex items-start gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${modalityColor[s.modality]||'bg-slate-100 text-slate-600'}`}>{modalityLabel[s.modality]||s.modality}</span>
                        <span className="text-xs text-slate-400">{fmtStudyDate(s.studyDate)}</span>
                        {s.imageCount>0&&<span className="text-xs text-slate-400">{s.imageCount} image{s.imageCount>1?'s':''}</span>}
                      </div>
                      <p className="text-sm font-medium text-slate-800 leading-snug">{s.description}</p>
                      {s.reportSummary&&(
                        <p className="text-xs text-slate-500 mt-1.5 leading-relaxed border-l-2 border-violet-200 pl-2">{s.reportSummary}</p>
                      )}
                    </div>
                    {s.viewerUrl?(
                      <a href={s.viewerUrl} target="_blank" rel="noreferrer"
                        className="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-700 text-white text-xs font-semibold transition-colors">
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        Voir
                      </a>
                    ):(
                      <span className="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-100 text-slate-400 text-xs font-medium cursor-default" title="Connectez PostDICOM pour accéder au visualiseur">
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        Visualiseur
                      </span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          {isMock&&(
            <div className="mt-4 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3 flex items-start gap-2.5">
              <Ic.Warn className="w-4 h-4 text-amber-500 flex-shrink-0 mt-0.5"/>
              <div className="text-xs text-amber-800">
                <p className="font-semibold mb-0.5">Données de démonstration</p>
                <p>Pour afficher les vrais examens DICOM, configurez <code className="bg-amber-100 px-1 rounded font-mono">POSTDICOM_BASE_URL</code>, <code className="bg-amber-100 px-1 rounded font-mono">POSTDICOM_USER</code> et <code className="bg-amber-100 px-1 rounded font-mono">POSTDICOM_PASS</code> dans vos variables d'environnement.</p>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   DOCUMENTS HUB
══════════════════════════════════════════════════════════════ */
function DocumentsHub({patient,user}){
  const [open,setOpen]=useState(true);
  const [form,setForm]=useState(null); // {type, fields}
  const [emailModal,setEmailModal]=useState(false);
  const [emailTo,setEmailTo]=useState('');
  const [emailSubj,setEmailSubj]=useState('');
  const [emailBody,setEmailBody]=useState('');
  const [emailSending,setEmailSending]=useState(false);
  const [emailSent,setEmailSent]=useState(false);
  const [loading,setLoading]=useState(null);

  const lastValidated=patient?.consultations?.find(c=>c.statut==='validee');
  const phone=patient?.telephone?.replace(/\s/g,'');

  // Generic PDF generator — fetches blob and downloads / opens
  const genPdf=async(url,body={},filename='document.pdf')=>{
    setLoading(filename);
    try{
      const r=await fetch(`${API}${url}`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},body:JSON.stringify(body)});
      if(!r.ok){const e=await r.json();alert(e.error||'Erreur');return;}
      const blob=await r.blob();
      const burl=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=burl;a.download=filename;a.click();
      URL.revokeObjectURL(burl);
    }finally{setLoading(null);}
  };

  const printPdf=async(url,body={})=>{
    setLoading('print');
    try{
      const r=await fetch(`${API}${url}`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},body:JSON.stringify(body)});
      if(!r.ok) return;
      const blob=await r.blob();
      const burl=URL.createObjectURL(blob);
      const win=window.open(burl,'_blank');
      if(win){win.onload=()=>{win.focus();win.print();};}
    }finally{setLoading(null);}
  };

  const openEmail=(consultationId)=>{
    setEmailTo(patient?.email||'');
    setEmailSubj(`Compte rendu de consultation — ${patient?.prenom} ${patient?.nom}`);
    setEmailBody(`Bonjour ${patient?.prenom},\n\nVeuillez trouver ci-joint votre compte rendu médical.\n\nCordialement,\nDr. ${user?.nom}`);
    setEmailModal(consultationId);
  };

  const sendEmail=async()=>{
    setEmailSending(true);
    const r=await api.post(`/consultations/${emailModal}/send-email`,{to:emailTo,subject:emailSubj,body:emailBody});
    setEmailSending(false);
    if(r.ok!==false){setEmailSent(true);setTimeout(()=>{setEmailModal(false);setEmailSent(false);},2000);}
    else alert(r.error||'Erreur envoi email');
  };

  const openWhatsApp=(consultId)=>{
    if(!phone){alert('Numéro de téléphone non renseigné pour ce patient');return;}
    const msg=encodeURIComponent(`Bonjour ${patient?.prenom},\n\nVotre compte rendu médical a été généré par Dr. ${user?.nom||''}. Vous le recevrez également par email.\n\nN'hésitez pas à nous contacter si vous avez des questions.\n\nCentre Diagnostic de Libreville — MedPilot`);
    window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');
  };

  // Form configs for papeterie
  const papeterieTypes={
    'arret-maladie':{
      label:"Arrêt maladie",color:'#dc2626',
      fields:[
        {key:'dateDebut',label:'Date de début',type:'date',default:new Date().toISOString().slice(0,10)},
        {key:'duree',label:'Durée (jours)',type:'number',default:'3'},
        {key:'sortie',label:'Sorties',type:'select',options:[{v:'autorisee',l:'Autorisées'},{v:'interdite',l:'Interdites'},{v:'autorisee_horaires',l:'Aux heures habituelles'}],default:'autorisee'},
      ]
    },
    'certificat-sante':{
      label:'Certificat médical',color:'#16a34a',
      fields:[
        {key:'objet',label:'Objet du certificat',type:'text',default:'bonne santé générale'},
        {key:'observations',label:'Observations complémentaires',type:'textarea',default:''},
      ]
    },
    'dispense-sport':{
      label:'Dispense de sport',color:'#0284c7',
      fields:[
        {key:'duree',label:'Durée',type:'text',default:'1 mois'},
        {key:'motif',label:'Motif médical',type:'text',default:''},
        {key:'partielle',label:'Type',type:'select',options:[{v:'false',l:'Totale'},{v:'true',l:'Partielle'}],default:'false'},
      ]
    },
    'attestation-soins':{
      label:'Attestation de soins',color:'#7c3aed',
      fields:[
        {key:'nature',label:'Nature des soins',type:'text',default:'Consultation médicale'},
        {key:'datesSoins',label:'Date des soins',type:'date',default:new Date().toISOString().slice(0,10)},
      ]
    },
    'entete-vierge':{
      label:'En-tête vierge',color:'#475569',
      fields:[]
    },
  };

  const openForm=(type)=>{
    const cfg=papeterieTypes[type];
    const fields={};
    cfg.fields.forEach(f=>{fields[f.key]=f.default;});
    setForm({type,fields});
  };

  const submitForm=async()=>{
    if(!form) return;
    const{type,fields,consId}=form;
    const body={...fields};
    if(body.partielle!==undefined) body.partielle=body.partielle==='true';
    setForm(null);
    if(type==='_adressage'){
      await genPdf(`/consultations/${consId}/adressage/pdf`,body,`adressage-${patient.nom}.pdf`);
    } else {
      await genPdf(`/patients/${patient.id}/papeterie/${type}/pdf`,body,`${type}-${patient.nom}.pdf`);
    }
  };

  const formLabel=form?.type==='_adressage'?'Lettre d\'adressage':papeterieTypes[form?.type]?.label||'';

  const inp='w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500';

  return(
    <>
    <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
      <button onClick={()=>setOpen(o=>!o)} className="w-full px-6 py-4 border-b border-slate-100 flex items-center justify-between hover:bg-slate-50/50">
        <h3 className="font-semibold text-slate-900 flex items-center gap-2">
          <Ic.FileText className="w-4 h-4 text-blue-500"/>
          Documents &amp; Papeterie
        </h3>
        <svg className={`w-4 h-4 text-slate-400 transition-transform ${open?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
      </button>

      {open&&(
        <div className="p-5 space-y-5">

          {/* Depuis la dernière consultation */}
          {lastValidated&&(
            <div>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Dernière consultation validée</p>
              <div className="grid grid-cols-2 gap-2 mb-3">
                {[
                  {label:'Compte rendu',icon:'📋',action:()=>genPdf(`/consultations/${lastValidated.id}/pdf`,{},'compte-rendu.pdf')},
                  {label:'Arrêt maladie',icon:'🏥',action:()=>openForm('arret-maladie')},
                  {label:'Certificat médical',icon:'📋',action:()=>openForm('certificat-sante')},
                  {label:'Lettre d\'adressage',icon:'📨',action:()=>setForm({type:'_adressage',consId:lastValidated.id,fields:{specialiste:'',specialiteAdre:'',motif:''}})},
                ].map(({label,icon,action})=>(
                  <button key={label} onClick={action} disabled={!!loading}
                    className="flex items-center gap-2 px-3 py-2.5 rounded-xl border border-slate-200 hover:border-blue-300 hover:bg-blue-50/30 text-left text-sm font-medium text-slate-700 transition-colors disabled:opacity-50">
                    <span>{icon}</span>{label}
                  </button>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>openEmail(lastValidated.id)}
                  className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors">
                  <Ic.Mail className="w-4 h-4"/>Email au patient
                </button>
                <button onClick={()=>openWhatsApp(lastValidated.id)}
                  className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-semibold transition-colors">
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  WhatsApp
                </button>
              </div>
            </div>
          )}

          {/* Papeterie standard */}
          <div>
            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Papeterie standard</p>
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(papeterieTypes).map(([type,cfg])=>(
                <button key={type} onClick={()=>openForm(type)} disabled={!!loading}
                  className="flex items-center gap-2 px-3 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-left text-sm font-medium text-slate-700 transition-colors disabled:opacity-50">
                  <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:cfg.color}}/>
                  {cfg.label}
                </button>
              ))}
            </div>
          </div>

        </div>
      )}
    </div>

    {/* Form modal */}
    {form&&(
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)setForm(null);}}>
        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 fade-in">
          <h3 className="font-bold text-slate-900 mb-4">{formLabel}</h3>
          <div className="space-y-3 mb-5">
            {(form.type==='_adressage'?[
              {key:'specialiste',label:'Nom du spécialiste',type:'text',default:''},
              {key:'specialiteAdre',label:'Spécialité',type:'text',default:''},
              {key:'motif',label:"Motif d'adressage",type:'textarea',default:''},
            ]:papeterieTypes[form.type]?.fields||[]).map(f=>(
              <div key={f.key}>
                <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">{f.label}</label>
                {f.type==='select'?(
                  <select value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} className={inp}>
                    {f.options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                ):f.type==='textarea'?(
                  <textarea value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} rows={3} className={inp}/>
                ):(
                  <input type={f.type} value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} className={inp}/>
                )}
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <Btn variant="secondary" onClick={()=>setForm(null)} className="flex-1">Annuler</Btn>
            <Btn variant="primary" icon={Ic.Download} onClick={submitForm} loading={!!loading} className="flex-1">Générer PDF</Btn>
          </div>
        </div>
      </div>
    )}

    {/* Email modal */}
    {emailModal&&(
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)setEmailModal(false);}}>
        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 fade-in">
          <h3 className="font-bold text-slate-900 mb-4 flex items-center gap-2"><Ic.Mail className="w-4 h-4 text-blue-500"/>Envoyer par email</h3>
          {emailSent?(
            <div className="text-center py-6">
              <div className="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-3"><Ic.Check className="w-6 h-6 text-emerald-600"/></div>
              <p className="font-semibold text-slate-900">Email envoyé !</p>
            </div>
          ):(
            <div className="space-y-3">
              <div>
                <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Destinataire</label>
                <input value={emailTo} onChange={e=>setEmailTo(e.target.value)} type="email" className={inp}/>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Objet</label>
                <input value={emailSubj} onChange={e=>setEmailSubj(e.target.value)} className={inp}/>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Message</label>
                <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} rows={4} className={inp}/>
              </div>
              <p className="text-xs text-slate-400">Le compte rendu PDF sera joint automatiquement.</p>
              <div className="flex gap-2 pt-1">
                <Btn variant="secondary" onClick={()=>setEmailModal(false)} className="flex-1">Annuler</Btn>
                <Btn variant="primary" icon={Ic.Mail} onClick={sendEmail} loading={emailSending} disabled={!emailTo} className="flex-1">Envoyer</Btn>
              </div>
            </div>
          )}
        </div>
      </div>
    )}
    </>
  );
}

function PatientFile({patientId,userId,user,onConsultation,onEdit,onBack}){
  const [patient,setPatient]=useState(null);
  const [motif,setMotif]=useState('');
  const [starting,setStarting]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [noteModal,setNoteModal]=useState(null);
  const [prescriptions,setPrescriptions]=useState([]);
  const [rxExpanded,setRxExpanded]=useState(null);
  const [dossDlLoading,setDossDlLoading]=useState(false);

  useEffect(()=>{
    api.get(`/patients/${patientId}`).then(setPatient);
    api.get(`/patients/${patientId}/prescriptions`).then(setPrescriptions);
  },[patientId]);

  const downloadDossier=async()=>{
    setDossDlLoading(true);
    const r=await fetch(`${API}/patients/${patientId}/dossier/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`dossier-${patient?.nom||patientId}.pdf`;a.click();
    URL.revokeObjectURL(url);
    setDossDlLoading(false);
  };

  const start=async()=>{if(!motif.trim())return;setStarting(true);const c=await api.post('/consultations',{patientId,motif});setStarting(false);onConsultation(c.id,patientId);};
  if(!patient)return<div className="flex justify-center py-20"><Ic.Spin className="w-6 h-6 text-slate-400"/></div>;

  const statusInfo=s=>s==='validee'?{l:'Validée',c:'green'}:s==='note_generee'?{l:'Note générée',c:'blue'}:{l:'En cours',c:'amber'};

  return(<>
    <Page title={`${patient.prenom} ${patient.nom}`}
      breadcrumb={<><span className="cursor-pointer hover:text-slate-600" onClick={onBack}>Patients</span> / {patient.prenom} {patient.nom}</>}
      actions={<Btn variant="secondary" icon={Ic.User} onClick={onEdit} size="sm">Modifier le dossier</Btn>}>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Identity */}
        <div className="space-y-4">
