          <Ic.FileText className="w-4 h-4 text-blue-500"/>
          Documents &amp; Papeterie
        </h3>
        <svg className={`w-4 h-4 text-slate-400 transition-transform ${open?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
      </button>

      {open&&(
        <div className="p-5 space-y-5">

          {/* Depuis la dernière consultation */}
          {lastValidated&&(
            <div>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Dernière consultation validée</p>
              <div className="grid grid-cols-2 gap-2 mb-3">
                {[
                  {label:'Compte rendu',icon:'📋',action:()=>genPdf(`/consultations/${lastValidated.id}/pdf`,{},'compte-rendu.pdf')},
                  {label:'Arrêt maladie',icon:'🏥',action:()=>openForm('arret-maladie')},
                  {label:'Certificat médical',icon:'📋',action:()=>openForm('certificat-sante')},
                  {label:'Lettre d\'adressage',icon:'📨',action:()=>setForm({type:'_adressage',consId:lastValidated.id,fields:{specialiste:'',specialiteAdre:'',motif:''}})},
                ].map(({label,icon,action})=>(
                  <button key={label} onClick={action} disabled={!!loading}
                    style={{display:'flex',alignItems:'center',gap:'8px',padding:'10px 12px',border:'1px solid var(--border)',background:'var(--white)',textAlign:'left',fontSize:'13px',color:'var(--text)',fontFamily:"'DM Sans',sans-serif",cursor:'pointer',opacity:loading?0.5:1}}
                    onMouseEnter={e=>{if(!loading){e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.background='var(--cream)';}}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--white)';}}>
                    <span>{icon}</span>{label}
                  </button>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>openEmail(lastValidated.id)}
                  className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors">
                  <Ic.Mail className="w-4 h-4"/>Email au patient
                </button>
                <button onClick={()=>openWhatsApp(lastValidated.id)}
                  className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-semibold transition-colors">
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  WhatsApp
                </button>
              </div>
            </div>
          )}

          {/* Papeterie standard */}
          <div>
            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Papeterie standard</p>
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(papeterieTypes).map(([type,cfg])=>(
                <button key={type} onClick={()=>openForm(type)} disabled={!!loading}
                  className="flex items-center gap-2 px-3 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-left text-sm font-medium text-slate-700 transition-colors disabled:opacity-50">
                  <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:cfg.color}}/>
                  {cfg.label}
                </button>
              ))}
            </div>
          </div>

        </div>
      )}
    </div>

    {/* Form modal */}
    {form&&(
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)setForm(null);}}>
        <div style={{background:'var(--white)',width:'100%',maxWidth:'384px',padding:'28px 32px',border:'1px solid var(--border)'}} className="fade-in">
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)',marginBottom:'20px'}}>{formLabel}</h3>
          <div className="space-y-3 mb-5">
            {(form.type==='_adressage'?[
              {key:'specialiste',label:'Nom du spécialiste',type:'text',default:''},
              {key:'specialiteAdre',label:'Spécialité',type:'text',default:''},
              {key:'motif',label:"Motif d'adressage",type:'textarea',default:''},
            ]:papeterieTypes[form.type]?.fields||[]).map(f=>(
              <div key={f.key}>
                <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'4px',color:'var(--muted)'}}>{f.label}</label>
                {f.type==='select'?(
                  <select value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} className={inp}>

                  <textarea value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} rows={3} className={inp}/>
                ):(
                  <input type={f.type} value={form.fields[f.key]} onChange={e=>setForm(fm=>({...fm,fields:{...fm.fields,[f.key]:e.target.value}}))} className={inp}/>

    {emailModal&&(

        <div style={{background:'var(--white)',width:'100%',maxWidth:'448px',padding:'28px 32px',border:'1px solid var(--border)'}} className="fade-in">
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)',marginBottom:'20px',display:'flex',alignItems:'center',gap:'10px'}}><Ic.Mail style={{width:'16px',height:'16px',color:'var(--gold)'}}/>Envoyer par email</h3>
          {emailSent?(
            <div style={{textAlign:'center',padding:'24px 0'}}>
              <div style={{width:'48px',height:'48px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Ic.Check style={{width:'20px',height:'20px',color:'var(--gold-light)'}}/></div>

            </div>

              <div>
                <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'4px',color:'var(--muted)'}}>Destinataire</label>
                <input value={emailTo} onChange={e=>setEmailTo(e.target.value)} type="email" className={inp}/>
              </div>

                <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'4px',color:'var(--muted)'}}>Objet</label>

              </div>
              <div>
                <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'4px',color:'var(--muted)'}}>Message</label>
                <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} rows={4} className={inp}/>
              </div>

                <Btn variant="secondary" onClick={()=>setEmailModal(false)} className="flex-1">Annuler</Btn>
                <Btn variant="primary" icon={Ic.Mail} onClick={sendEmail} loading={emailSending} disabled={!emailTo} className="flex-1">Envoyer</Btn>
              </div>
            </div>
          )}
        </div>
      </div>
    )}
    </>
  );
}

                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.color='var(--gold)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                <Ic.Plus style={{width:'14px',height:'14px'}}/>Ouvrir une consultation
              </button>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                <Input value={motif} onChange={e=>setMotif(e.target.value)} placeholder="Motif de consultation (ex: céphalées, suivi diabète, renouvellement ordonnance…)"/>
                <div style={{display:'flex',gap:'8px'}}>

          {/* History */}

            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            {!patient.consultations?.length?(
              <div style={{padding:'40px',textAlign:'center'}}>
                <Ic.Clock style={{width:'32px',height:'32px',margin:'0 auto 8px',opacity:0.2,color:'var(--navy)'}}/>

              </div>
            ):(
              <div>
                {patient.consultations.map(c=>{
                  const {l,c:col}=statusInfo(c.statut);
                  const hasNote=c.statut==='validee'||c.statut==='note_generee';
                  const isMe=c.userId===userId;
                  return(
                    <div key={c.id} onClick={()=>hasNote&&setNoteModal(c)}
                      className="data-row" style={{padding:'14px 24px',display:'flex',alignItems:'flex-start',gap:'16px',cursor:hasNote?'pointer':'default'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:'13px',fontWeight:400,color:'var(--navy)'}}>{c.motif}</p>
                        <p style={{fontSize:'10px',color:'var(--muted)',fontWeight:300,marginTop:'3px',display:'flex',alignItems:'center',gap:'4px'}}><Ic.Clock style={{width:'10px',height:'10px'}}/>{fmtDateLong(c.date)}</p>
                        {c.docteurNom&&(
                          <p style={{fontSize:'10px',marginTop:'4px',fontWeight:400,color:isMe?'var(--gold)':'var(--muted)'}}>
                            Dr. {c.docteurPrenom} {c.docteurNom}{c.docteurSpec?` — ${c.docteurSpec}`:''}{isMe?' (vous)':''}
                          </p>
                        )}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0,marginTop:'2px'}}>
                        <Badge color={col} size="xs">{l}</Badge>
                        {hasNote&&<Ic.Chevron style={{width:'14px',height:'14px',color:'var(--light)'}}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {/* Dossier complet */}
          <div style={{background:'var(--cream)',border:'1px solid var(--border)',padding:'20px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px'}}>
            <div>
              <p style={{fontSize:'13px',fontWeight:400,color:'var(--navy)'}}>Dossier médical complet</p>

            </div>
            <Btn variant="secondary" icon={Ic.Download} onClick={downloadDossier} loading={dossDlLoading} size="sm">Télécharger</Btn>
          </div>

          {/* Discussions */}
          {userId&&<DiscussionPanel patientId={patientId} userId={userId}/>}
        </div>
      </div>
    </Page>
    {noteModal&&<NoteModal consultationId={noteModal.id} motif={noteModal.motif} onClose={()=>setNoteModal(null)}/>}
  </>);
}

].sort();

function DrugSearch({value,onChange}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState(value||'');
  const suggestions=q.length>1?DRUGS.filter(d=>d.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  const pick=d=>{setQ(d);onChange(d);setOpen(false);};
  React.useEffect(()=>{setQ(value||'');},[value]);
  return(
    <div className="relative col-span-2">
      <input value={q}
        onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),200)}
        placeholder="Médicament / DCI (ex: Amoxicilline 500mg)"
        style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
      {open&&suggestions.length>0&&(
        <div style={{position:'absolute',left:0,right:0,top:'100%',marginTop:'2px',background:'var(--white)',border:'1px solid var(--border)',zIndex:30,overflow:'hidden',boxShadow:'0 4px 16px rgba(26,35,50,0.08)'}}>
          {suggestions.map(d=>(
            <button key={d} onMouseDown={()=>pick(d)}
              style={{width:'100%',textAlign:'left',padding:'8px 12px',fontSize:'13px',color:'var(--text)',background:'var(--white)',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--cream)'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>{d}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PRESCRIPTION PANEL
══════════════════════════════════════════════════════════════ */
function PrescriptionPanel({consultationId}){
  const empty={medicament:'',posologie:'',duree:'',quantite:''};
  const [lignes,setLignes]=useState([]);
  const [validee,setValidee]=useState(false);
  const [saving,setSaving]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(false);
  const [renewModal,setRenewModal]=useState(false);

  useEffect(()=>{api.get(`/consultations/${consultationId}/prescription`).then(d=>{if(d.lignes){setLignes(d.lignes);setValidee(!!d.validee);}});},[consultationId]);

  const save=async(v=false)=>{setSaving(true);await api.put(`/consultations/${consultationId}/prescription`,{lignes,validee:v});if(v)setValidee(true);setSaving(false);};
  const addLigne=()=>setLignes(l=>[...l,{...empty}]);
  const upd=(i,k,v)=>setLignes(l=>l.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const del=i=>setLignes(l=>l.filter((_,idx)=>idx!==i));
  const dlPdf=async()=>{await save(validee);setPdfLoading(true);const r=await fetch(`${API}/consultations/${consultationId}/prescription/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='ordonnance.pdf';a.click();setPdfLoading(false);};

  return(
    <div>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        {validee&&<Badge color="green">Ordonnance validée</Badge>}
        <div className="flex gap-2 ml-auto flex-wrap">
          {!validee&&<Btn variant="secondary" onClick={()=>save(false)} loading={saving} size="sm">Sauvegarder</Btn>}
          {validee&&lignes.length>0&&<Btn variant="secondary" icon={Ic.Refresh} size="sm" onClick={()=>{setValidee(false);}}>Renouveler</Btn>}
          <Btn variant="secondary" icon={Ic.Download} onClick={dlPdf} loading={pdfLoading} size="sm">Ordonnance PDF</Btn>
          {!validee&&lignes.length>0&&<Btn variant="success" icon={Ic.Check} onClick={()=>save(true)} size="sm">Valider</Btn>}
        </div>
      </div>

      {!validee&&(
        <div className="space-y-3 mb-4">
          {lignes.map((l,i)=>(
            <div key={i} style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'16px',marginBottom:'12px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
                <span style={{fontSize:'11px',fontWeight:600,color:'var(--gold)',letterSpacing:'0.1em'}}>{String(i+1).padStart(2,'0')}</span>
                <button onClick={()=>del(i)} style={{width:'24px',height:'24px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',background:'none',border:'none',cursor:'pointer'}}><Ic.Trash style={{width:'12px',height:'12px'}}/></button>
              </div>
              <div className="grid grid-cols-2 gap-2.5">
                <DrugSearch value={l.medicament} onChange={v=>upd(i,'medicament',v)}/>
                <input value={l.posologie} onChange={e=>upd(i,'posologie',e.target.value)} placeholder="Posologie"
                  style={{gridColumn:'span 2',border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
                <input value={l.duree} onChange={e=>upd(i,'duree',e.target.value)} placeholder="Durée"
                  style={{border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
                <input value={l.quantite} onChange={e=>upd(i,'quantite',e.target.value)} placeholder="Quantité"
                  style={{border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
              </div>
            </div>
          ))}
          <button onClick={addLigne}
            style={{width:'100%',border:'1px dashed var(--border)',padding:'12px 0',fontSize:'11px',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--muted)',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',fontFamily:"'DM Sans',sans-serif"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.color='var(--gold)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
            <Ic.Plus className="w-4 h-4"/>Ajouter un médicament
          </button>
        </div>
      )}

      {validee&&lignes.length>0&&(
        <div className="space-y-3">
          {lignes.map((l,i)=>(
            <div key={i} className="flex gap-3 py-3 border-b border-slate-100 last:border-0">
              <div className="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-bold flex-shrink-0">{i+1}</div>
              <div>
                <p className="text-sm font-semibold text-slate-900">{l.medicament}</p>
                {l.posologie&&<p className="text-xs text-slate-600 mt-0.5">{l.posologie}</p>}
                {(l.duree||l.quantite)&&<p className="text-xs text-slate-400 mt-0.5">{[l.duree,l.quantite].filter(Boolean).join(' · ')}</p>}
              </div>
            </div>
          ))}
        </div>
      )}
      {validee&&lignes.length===0&&<p className="text-sm text-slate-400 italic">Aucun médicament prescrit</p>}
    </div>
  );
}

function ConsultationScreen({consultationId,patientId,onBack}){

  const [transcription,setTranscription]=useState('');
  const [interim,setInterim]=useState('');
  const [processing,setProcessing]=useState(false);
  const [note,setNote]=useState(null);
  const [noteEdit,setNoteEdit]=useState(null);
  const [validated,setValidated]=useState(false);
  const [ttsLoad,setTtsLoad]=useState(false);
  const [pdfLoad,setPdfLoad]=useState(false);
  const [consent,setConsent]=useState(false);
  const [audioTime,setAudioTime]=useState(0);
  const [tab,setTab]=useState('note');
  const [emailModal,setEmailModal]=useState(false);
  const [emailTo,setEmailTo]=useState('');
  const [emailSending,setEmailSending]=useState(false);
  const [docModal,setDocModal]=useState(false);
  const [realtimeOk]=useState(typeof window!=='undefined'&&('SpeechRecognition' in window||'webkitSpeechRecognition' in window));
  const [heureDebut,setHeureDebut]=useState(null);

  const mrRef=useRef(),chunksRef=useRef([]),streamRef=useRef(),timerRef=useRef(),recRef=useRef(),txRef=useRef(''),recordingRef=useRef(false);

  useEffect(()=>{
    api.get(`/patients/${patientId}`).then(setPatient);
    api.get(`/consultations/${consultationId}`).then(c=>{setConsultation(c);setTranscription(c.transcription||'');txRef.current=c.transcription||'';if(c.note){setNote(c.note);setNoteEdit({...c.note});}if(c.statut==='validee')setValidated(true);});
    return ()=>{recRef.current?.stop();mrRef.current?.stop();streamRef.current?.getTracks().forEach(t=>t.stop());clearInterval(timerRef.current);};
  },[]);

  useEffect(()=>{
    if(recording){timerRef.current=setInterval(()=>setAudioTime(t=>t+1),1000);}
    else{clearInterval(timerRef.current);setAudioTime(0);}
    return()=>clearInterval(timerRef.current);
  },[recording]);

  const startRec=async()=>{
    if(!consent){alert('Activez le consentement d\'enregistrement.');return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      if(realtimeOk){
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        const r=new SR();r.lang='fr-FR';r.continuous=true;r.interimResults=true;
        r.onresult=e=>{let im='',fb='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fb+=e.results[i][0].transcript+' ';else im+=e.results[i][0].transcript;}if(fb){const u=(txRef.current?txRef.current+' ':'')+fb.trim();txRef.current=u;setTranscription(u);api.post(`/consultations/${consultationId}/update-transcription`,{transcription:u});}setInterim(im);};
        r.onerror=e=>{if(e.error!=='aborted'&&recordingRef.current)setTimeout(()=>r.start(),300);};
        r.onend=()=>{if(recordingRef.current)r.start();};
        r.start();recRef.current=r;
      }else{
        // Firefox / Safari fallback : Whisper chunked every 30s
        const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
        const mr=new MediaRecorder(stream,{mimeType});mrRef.current=mr;chunksRef.current=[];
        const transcribeChunk=async()=>{
          if(!chunksRef.current.length)return;
          const blob=new Blob([...chunksRef.current],{type:'audio/webm'});
          const fd=new FormData();fd.append('audio',blob,'rec.webm');
          const res=await api.upload(`/consultations/${consultationId}/transcribe`,fd);
          if(res.transcription){txRef.current=res.transcription;setTranscription(res.transcription);api.post(`/consultations/${consultationId}/update-transcription`,{transcription:res.transcription});}
        };
        mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
        // Transcribe every 30s while recording
        const chunkTimer=setInterval(async()=>{if(recordingRef.current)await transcribeChunk();},30000);
        mr.onstop=async()=>{clearInterval(chunkTimer);setProcessing(true);await transcribeChunk();setProcessing(false);};
        mr.start(1000); // collect data every second
      }
      recordingRef.current=true;
      setRecording(true);
      const now=new Date().toISOString();setHeureDebut(now);
      api.post(`/consultations/${consultationId}/timing`,{heureDebut:now});
    }catch(err){alert('Microphone refusé : '+err.message);}
  };

  const stopRec=()=>{
    recordingRef.current=false;
    setInterim('');
    recRef.current?.stop();
    mrRef.current?.stop();
    streamRef.current?.getTracks().forEach(t=>t.stop());
    setRecording(false);
    const fin=new Date().toISOString();
    const duree=heureDebut?Math.round((new Date(fin)-new Date(heureDebut))/60000):null;
    api.post(`/consultations/${consultationId}/timing`,{heureDebut,heureFin:fin,dureeMinutes:duree});
    // Auto-generate note if there's transcription
    setTimeout(()=>{if(txRef.current?.trim().length>20)genNoteRef.current?.();},500);
  };
  const updTx=t=>{setTranscription(t);txRef.current=t;api.post(`/consultations/${consultationId}/update-transcription`,{transcription:t});};
  const genNoteRef=useRef();
  const genNote=async()=>{setProcessing(true);const r=await api.post(`/consultations/${consultationId}/generate-note`,{});if(r.note){setNote(r.note);setNoteEdit({...r.note});}setProcessing(false);};
  genNoteRef.current=genNote;
  const valNote=async()=>{await api.post(`/consultations/${consultationId}/validate-note`,{note:noteEdit});setNote(noteEdit);setValidated(true);};
  const speak=async txt=>{setTtsLoad(true);try{const r=await fetch(`${API}/tts`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getToken()}`},body:JSON.stringify({text:txt,voice:'nova'})});if(!r.ok){alert('TTS non disponible');return;}new Audio(URL.createObjectURL(await r.blob())).play();}catch{alert('Erreur synthèse vocale');}finally{setTtsLoad(false);}};
  const dlPdf=async()=>{setPdfLoad(true);const r=await fetch(`${API}/consultations/${consultationId}/pdf`,{headers:{Authorization:`Bearer ${getToken()}`}});const url=URL.createObjectURL(await r.blob());const a=document.createElement('a');a.href=url;a.download='consultation.pdf';a.click();setPdfLoad(false);};
  const deleteConsult=async()=>{if(!confirm('Supprimer cette consultation ?'))return;await api.delete(`/consultations/${consultationId}`);onBack();};
  const sendEmail=async()=>{setEmailSending(true);const r=await api.post(`/consultations/${consultationId}/send-email`,{to:emailTo});setEmailSending(false);if(r.ok){setEmailModal(false);}else alert(r.error||'Erreur envoi email');};
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const NF=({label,field,ta=true,alert=false})=>(
    <div>
      <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'6px',color:alert?'var(--accent)':'var(--muted)'}}>{label}</label>
      {ta?<textarea value={noteEdit?.[field]||''} onChange={e=>setNoteEdit(n=>({...n,[field]:e.target.value}))} rows={3} disabled={validated}
          style={{width:'100%',border:`1px solid ${alert?'rgba(180,60,40,0.3)':'var(--border)'}`,borderLeft:alert?'3px solid var(--accent)':'1px solid var(--border)',background:alert?'#fdf5f3':'var(--white)',padding:'10px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",resize:'none',outline:'none',opacity:validated?0.7:1}}/>
        :<input value={noteEdit?.[field]||''} onChange={e=>setNoteEdit(n=>({...n,[field]:e.target.value}))} disabled={validated}
          style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'10px 12px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",outline:'none',opacity:validated?0.7:1}}/>}
    </div>
  );

  return(
    <Page title="Consultation"
      breadcrumb={<><span className="cursor-pointer hover:text-slate-600" onClick={onBack}>Dossier patient</span> / Consultation en cours</>}>

      {docModal&&<DocModal consultationId={consultationId} patient={patient} onClose={()=>setDocModal(false)}/>}

      {/* Email modal */}
      {emailModal&&(
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm">
          <div style={{background:'var(--white)',width:'100%',maxWidth:'448px',margin:'0 16px',padding:'28px 32px',border:'1px solid var(--border)'}} className="fade-in">
            <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'20px',fontWeight:400,color:'var(--navy)',marginBottom:'20px'}}>Envoyer le compte rendu par email</h3>
            <Input label="Adresse email du destinataire" type="email" value={emailTo} onChange={e=>setEmailTo(e.target.value)} placeholder="patient@email.fr ou confrere@hopital.fr"/>
            <div className="flex gap-3 mt-4">
              <Btn variant="secondary" onClick={()=>setEmailModal(false)}>Annuler</Btn>
              <Btn variant="primary" icon={Ic.Mail} onClick={sendEmail} loading={emailSending} disabled={!emailTo}>Envoyer</Btn>
            </div>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
        {/* Left column */}
        <div className="lg:col-span-2 space-y-4">

          {/* Patient card */}
          {patient&&(
            <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'20px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
                <div style={{width:'44px',height:'44px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold-light)',fontFamily:"'Cormorant Garamond',serif",fontSize:'16px',fontWeight:400,flexShrink:0}}>
                  {initials(patient.prenom,patient.nom)}
                </div>
                <div>
                  <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'17px',fontWeight:400,color:'var(--navy)'}}>{patient.prenom} {patient.nom}</p>
                  <p style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{ageStr(patient.dateNaissance)}</p>
                </div>
              </div>
              {consultation?.motif&&<div style={{background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'8px 12px',marginBottom:'12px'}}><p style={{fontSize:'12px',color:'var(--navy)',fontWeight:500}}>Motif : {consultation.motif}</p>{consultation?.dureeMinutes&&<span style={{fontSize:'11px',color:'var(--muted)'}}>Durée : {consultation.dureeMinutes} min</span>}</div>}
              {patient.allergies&&<div style={{display:'flex',alignItems:'flex-start',gap:'8px',fontSize:'12px',color:'var(--accent)',background:'#fdf5f3',border:'1px solid rgba(180,60,40,0.2)',borderLeft:'3px solid var(--accent)',padding:'8px 12px'}}><Ic.Warn style={{width:'12px',height:'12px',flexShrink:0,marginTop:'1px'}}/><span><strong>Allergies : </strong>{patient.allergies}</span></div>}
              {patient.traitements&&<p style={{fontSize:'11px',color:'var(--muted)',marginTop:'8px'}}><strong>Traitements : </strong>{patient.traitements}</p>}
            </div>
          )}

          {/* Consent */}
          <label style={{display:'flex',alignItems:'flex-start',gap:'12px',padding:'16px',border:'1px solid var(--border)',borderLeft:consent?'3px solid #4a7c59':'3px solid var(--gold)',background:consent?'#f0f7f4':'var(--gold-pale)',cursor:'pointer'}}>
            <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} style={{marginTop:'2px',width:'14px',height:'14px',accentColor:'var(--navy)'}}/>
            <div>
              <p style={{fontSize:'13px',fontWeight:500,color:'var(--navy)'}}>{consent?'✓ Consentement enregistré':'Consentement d\'enregistrement'}</p>
              <p style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>Le patient a été informé et consent à l'enregistrement audio.</p>
            </div>
          </label>

          {/* Recorder */}
          <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'24px',textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:'16px'}}>
              <div style={{position:'relative'}}>
                {recording?(
                  <button onClick={stopRec} style={{width:'80px',height:'80px',background:'var(--accent)',color:'var(--white)',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer'}}>
                    <Ic.Stop style={{width:'28px',height:'28px'}}/>
                  </button>
                ):(
                  <button onClick={startRec} disabled={processing}
                    className={`w-24 h-24 text-white flex items-center justify-center ${processing?'bg-slate-300':''}`}
                    style={!processing?{background:'var(--navy)'}:{background:'var(--muted)'}}>
                    {processing?<Ic.Spin className="w-8 h-8 text-slate-600"/>:<Ic.Mic className="w-8 h-8"/>}
                  </button>
                )}
              </div>
            </div>
            {recording&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',color:'var(--accent)'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{width:'8px',height:'8px',background:'var(--accent)',display:'inline-block'}}/>
                  <span style={{fontFamily:'monospace',fontSize:'13px',fontWeight:700,color:'var(--navy)'}}>REC {fmt(audioTime)}</span>
                </div>
                {heureDebut&&<span style={{fontSize:'11px',color:'var(--muted)'}}>Début : {new Date(heureDebut).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>}
              </div>
            )}
            {processing&&<p style={{fontSize:'13px',color:'var(--muted)',marginTop:'8px'}}>Traitement en cours…</p>}
            {!recording&&!processing&&(
              <div>
                <p style={{fontSize:'13px',color:'var(--navy)',fontFamily:"'DM Sans',sans-serif"}}>{consent?'Prêt à enregistrer':'Activez le consentement'}</p>
                {realtimeOk&&consent&&<p style={{fontSize:'11px',color:'#4a7c59',marginTop:'4px'}}>● Transcription temps réel activée</p>}
                {!realtimeOk&&consent&&<p style={{fontSize:'11px',color:'var(--gold)',marginTop:'4px'}}>● Transcription via Whisper — mise à jour toutes les 30s</p>}
              </div>
            )}
          </div>
        </div>

        {/* Right column */}
        <div className="lg:col-span-3 space-y-4">

          {/* Transcription */}
          <div style={{background:'var(--white)',border:'1px solid var(--border)',padding:'20px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
              <p className="eyebrow">Transcription</p>
              {transcription&&!note&&(
                <Btn variant="success" icon={processing?null:Ic.Steth} onClick={genNote} loading={processing} size="sm">Générer la note</Btn>
              )}
            </div>
            <div style={{minHeight:'144px',background:'var(--cream)',border:'1px solid var(--border)',padding:'12px 16px',fontSize:'13px',fontFamily:'monospace',lineHeight:1.6}}>
              {transcription&&<span className="text-slate-800 whitespace-pre-wrap">{transcription}</span>}
              {interim&&<span className="interim"> {interim}</span>}
              {!transcription&&!interim&&<span className="text-slate-400 italic text-sm">{recording?(realtimeOk?'🎙 Parlez, la transcription s\'affiche ici en temps réel…':'🎙 Enregistrement en cours — la transcription sera générée toutes les 30s…'):'La transcription apparaîtra ici après l\'enregistrement.'}</span>}
            </div>
            {transcription&&(
              <div className="mt-2">
                <p className="text-xs text-slate-400 mb-1">Corriger si nécessaire :</p>
                <textarea value={transcription} onChange={e=>updTx(e.target.value)} rows={3}
                  style={{width:'100%',border:'1px solid var(--border)',background:'var(--white)',padding:'8px 12px',fontSize:'12px',color:'var(--text)',fontFamily:"'DM Sans',sans-serif",resize:'none',outline:'none'}}/>
              </div>
            )}
            {transcription&&note&&!validated&&<button onClick={genNote} disabled={processing} style={{fontSize:'11px',color:'var(--gold)',letterSpacing:'0.08em',textDecoration:'underline',background:'none',border:'none',cursor:'pointer',marginTop:'4px'}}>Regénérer la note</button>}
          </div>

          {/* Note + Prescription tabs */}
          {note&&(
            <div style={{background:'var(--white)',border:'1px solid var(--border)'}} className="fade-in">
              <div className="flex border-b border-slate-100">
                {[['note','📋 Note clinique'],['prescription','💊 Ordonnance']].map(([k,l])=>(
                  <button key={k} onClick={()=>setTab(k)}
                    style={tab===k?{borderBottom:'2px solid var(--gold)',color:'var(--navy)',background:'var(--cream)',fontFamily:"'DM Sans',sans-serif",fontWeight:500,fontSize:'13px',padding:'14px 0',flex:1}:{borderBottom:'2px solid transparent',color:'var(--muted)',background:'var(--white)',fontFamily:"'DM Sans',sans-serif",fontWeight:400,fontSize:'13px',padding:'14px 0',flex:1}}>
                    {l}
                  </button>
                ))}
              </div>

              {tab==='note'&&(
                <div className="p-5">
                  {/* Header actions */}
                  <div className="flex items-center justify-between mb-4">
                    <div>{validated?<Badge color="green">Note validée ✓</Badge>:<Badge color="amber">En attente de validation</Badge>}</div>
                    <div className="flex gap-2">
                      {!validated?(
                        <>
                          <Btn variant="secondary" icon={ttsLoad?null:Ic.Volume} onClick={()=>speak(noteEdit?.conseils_patient)} loading={ttsLoad} size="sm">Consignes</Btn>
                          <Btn variant="success" icon={Ic.Check} onClick={valNote} size="sm">Valider la note</Btn>
                        </>
                      ):(
                        <>
                          <Btn variant="secondary" icon={ttsLoad?null:Ic.Volume} onClick={()=>speak(noteEdit?.conseils_patient)} loading={ttsLoad} size="sm">Consignes</Btn>
                          <Btn variant="secondary" icon={Ic.FileText} onClick={()=>setDocModal(true)} size="sm">Documents</Btn>
                          <Btn variant="secondary" icon={Ic.Mail} onClick={()=>setEmailModal(true)} size="sm">Email</Btn>
                          <Btn variant="primary" icon={pdfLoad?null:Ic.Download} onClick={dlPdf} loading={pdfLoad} size="sm">PDF</Btn>
                          <Btn variant="danger" icon={Ic.Trash} onClick={deleteConsult} size="sm">Supprimer</Btn>
                        </>
                      )}
                    </div>
                  </div>

                  {!validated&&(
                    <div style={{marginBottom:'16px',background:'var(--gold-pale)',border:'1px solid rgba(184,147,90,0.3)',borderLeft:'3px solid var(--gold)',padding:'10px 16px',display:'flex',alignItems:'flex-start',gap:'10px'}}>
                      <Ic.Warn style={{width:'14px',height:'14px',color:'var(--gold)',flexShrink:0,marginTop:'1px'}}/>
                      <p style={{fontSize:'12px',color:'var(--navy)',fontFamily:"'DM Sans',sans-serif"}}>Proposition générée par IA — vérifiez et corrigez avant de valider.</p>
                    </div>
                  )}

                  {noteEdit?.cim10?.code&&(
                    <div className="flex items-center gap-2 mb-4">
                      <span style={{display:'inline-flex',alignItems:'center',gap:'8px',background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'8px 16px'}}>
                        <span style={{fontSize:'11px',fontWeight:700,color:'var(--navy)',background:'var(--gold-pale)',padding:'2px 8px',fontFamily:'monospace'}}>{noteEdit.cim10.code}</span>
                        <span style={{fontSize:'13px',color:'var(--navy)'}}>{noteEdit.cim10.libelle}</span>
                      </span>
                      <span className="text-xs text-slate-400">Code CIM-10</span>
                    </div>
                  )}

                  <div className="space-y-4">
                    <NF label="Motif" field="motif" ta={false}/>
                    <NF label="Histoire de la maladie" field="histoire"/>
                    <NF label="Examen clinique" field="examen"/>
                    <NF label="Hypothèses diagnostiques" field="hypotheses"/>
                    <NF label="Conduite à tenir" field="conduite"/>
                    <NF label="Prescriptions / Examens" field="prescriptions"/>
                    <NF label="Conseils au patient" field="conseils_patient"/>
                    <NF label="⚠ Signes d'alarme" field="drapeaux_rouges" alert/>
                    {noteEdit?.conseils_patient&&(
                      <div style={{marginTop:'16px',background:'var(--cream)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',padding:'16px 20px'}}>
                        <p className="eyebrow" style={{marginBottom:'8px'}}>Recommandations MedPilot</p>
                        <p style={{fontSize:'13px',color:'var(--text)',lineHeight:1.6}}>{noteEdit.conseils_patient}</p>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {tab==='prescription'&&<div className="p-5"><PrescriptionPanel consultationId={consultationId}/></div>}
            </div>
          )}
        </div>
      </div>
    </Page>
  );
}

function AgePyramideChart({groups}){
  const W=560,H=280,barH=24,gap=6,midX=W/2,labelW=70;
  const maxVal=Math.max(...groups.flatMap(g=>[g.h,g.f]),1);
  const scale=v=>(midX-labelW-16)*v/maxVal;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      <text x={midX/2} y={14} textAnchor="middle" fontSize={11} fill="#2a5a8a" fontWeight="400">Hommes</text>
      <text x={midX+(midX-labelW)/2+labelW} y={14} textAnchor="middle" fontSize={11} fill="#8a3a55" fontWeight="400">Femmes</text>
      {groups.map((g,i)=>{
        const y=20+i*(barH+gap);
        const hw=scale(g.h), fw=scale(g.f);
        return(
          <g key={g.label}>
            <rect x={midX-labelW-hw} y={y} width={hw} height={barH} rx={0} fill="#7aa8d0" opacity={0.85}/>
            <rect x={midX+labelW} y={y} width={fw} height={barH} rx={0} fill="#d48a9a" opacity={0.85}/>
            <text x={midX} y={y+barH/2+4} textAnchor="middle" fontSize={10} fill="#8A8A8A">{g.label}</text>
            <text x={midX-labelW-hw-4} y={y+barH/2+4} textAnchor="end" fontSize={9} fill="#2a5a8a">{g.h}</text>
            <text x={midX+labelW+fw+4} y={y+barH/2+4} textAnchor="start" fontSize={9} fill="#8a3a55">{g.f}</text>
          </g>
        );
      })}
      <line x1={midX} y1={16} x2={midX} y2={H-8} stroke="#E8E4DC" strokeWidth={1}/>
    </svg>
  );
}

function FamillesPieChart({familles}){
  const W=340,R=110,cx=W/2,cy=130;
  const total=familles.reduce((s,f)=>s+f.n,0)||1;
  const COLORS=['#3B82F6','#10B981','#6366F1','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#F59E0B','#84cc16','#a78bfa'];
  let angle=-Math.PI/2;
  const slices=familles.map((f,i)=>{
    const sweep=2*Math.PI*f.n/total;
    const a1=angle,a2=angle+sweep;
    angle=a2;
    return{...f,a1,a2,color:COLORS[i%COLORS.length]};
  });
  const arc=(r,a1,a2)=>{
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=a2-a1>Math.PI?1:0;
    return`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`;
  };
  return(
    <svg width="100%" viewBox={`0 0 ${W} 260`} style={{fontFamily:'inherit'}}>
      {slices.map((s,i)=><path key={i} d={arc(R,s.a1,s.a2)} fill={s.color} stroke="white" strokeWidth={1.5}/>)}
      <circle cx={cx} cy={cy} r={55} fill="white"/>
      <text x={cx} y={cy-6} textAnchor="middle" fontSize={11} fill="#64748b">Total</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize={18} fontWeight="bold" fill="#0f172a">{total}</text>
      {slices.map((s,i)=>{
        const midA=(s.a1+s.a2)/2;
        const lx=cx+(R+22)*Math.cos(midA), ly=cy+(R+22)*Math.sin(midA);
        if((s.a2-s.a1)*180/Math.PI<12) return null;
        return<text key={i} x={lx} y={ly} textAnchor="middle" fontSize={8.5} fill={s.color} fontWeight="bold">{Math.round(s.n/total*100)}%</text>;
      })}
    </svg>
  );
}

function SaisonnaliteChart({data}){
  const W=560,H=180,pad={t:20,r:20,b:30,l:30};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const months=data.map(d=>d.month);
  const maxV=Math.max(...data.flatMap(d=>[d.resp,d.card,d.inf]),1);
  const px=(i)=>pad.l+i*(iW/(data.length-1));
  const py=(v)=>pad.t+iH-(v/maxV*iH);
  const line=(key,color)=>{
    const pts=data.map((d,i)=>`${px(i)},${py(d[key])}`).join(' ');
    const area=`M${px(0)},${py(0)} `+data.map((d,i)=>`L${px(i)},${py(d[key])}`).join(' ')+` L${px(data.length-1)},${pad.t+iH} L${px(0)},${pad.t+iH} Z`;
    return(<g>
      <path d={area} fill={color} opacity={0.1}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round"/>
      {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d[key])} r={3} fill={color}/>)}
    </g>);
  };
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+iH*(1-f);
        return<g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#f1f5f9" strokeWidth={1}/><text x={pad.l-4} y={y+4} textAnchor="end" fontSize={8} fill="#94a3b8">{Math.round(maxV*f)}</text></g>;
      })}
      {months.map((m,i)=><text key={m} x={px(i)} y={H-6} textAnchor="middle" fontSize={8} fill="#94a3b8">{m}</text>)}
      {line('resp','#00725f')}
      {line('card','#B8935A')}
      {line('inf','#4A7C6B')}
      <g transform={`translate(${W-120},${pad.t})`}>
        {[['#00725f','Respiratoire'],['#B8935A','Cardiaque'],['#4A7C6B','Infectieux']].map(([c,l],i)=>(
          <g key={l} transform={`translate(0,${i*16})`}>
            <rect width={10} height={2} y={2} fill={c}/>
            <text x={14} y={7} fontSize={8} fill="#8A8A8A">{l}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

function ForecastChart({monthly,forecast,demoMonthly,demoForecast,useDemo}){
  const hist=useDemo?demoMonthly:monthly;
  const proj=useDemo?demoForecast:forecast;
  if(!hist||hist.length===0) return<div className="text-slate-400 text-sm text-center py-8">Aucune donnée disponible</div>;
  const all=[...hist,...(proj||[])];
  const W=560,H=180,pad={t:20,r:20,b:30,l:30};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const maxV=Math.max(...all.map(d=>d.n),1);
  const px=i=>pad.l+i*(iW/(all.length-1));
  const py=v=>pad.t+iH-(v/maxV*iH);
  const histPts=hist.map((d,i)=>`${px(i)},${py(d.n)}`).join(' ');
  const projOffset=hist.length-1;
  const projPts=proj?.map((d,i)=>`${px(projOffset+i)},${py(d.n)}`).join(' ')||'';
  const joinPt=`${px(projOffset)},${py(hist[hist.length-1].n)}`;
  const fullProjPts=proj?`${joinPt} ${projPts}`:'';
  const areaPath=`M${px(0)},${pad.t+iH} `+hist.map((d,i)=>`L${px(i)},${py(d.n)}`).join(' ')+` L${px(hist.length-1)},${pad.t+iH} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:'inherit'}}>
      <defs>
        <linearGradient id="fgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#B8935A" stopOpacity="0.15"/>
          <stop offset="100%" stopColor="#B8935A" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+iH*(1-f);
        return<g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E8E4DC" strokeWidth={1}/><text x={pad.l-4} y={y+4} textAnchor="end" fontSize={8} fill="#BEBEBE">{Math.round(maxV*f)}</text></g>;
      })}
      {all.map((d,i)=>{
        if(i%3!==0&&i!==all.length-1) return null;
        return<text key={d.month} x={px(i)} y={H-6} textAnchor="middle" fontSize={8} fill="#BEBEBE">{d.month.slice(2)}</text>;
      })}
      <path d={areaPath} fill="url(#fgrd)"/>
      <polyline points={histPts} fill="none" stroke="#B8935A" strokeWidth={1.5} strokeLinejoin="miter"/>
      {proj&&<polyline points={fullProjPts} fill="none" stroke="#8A8A8A" strokeWidth={1.5} strokeDasharray="6,3" strokeLinejoin="miter"/>}
      {hist.map((d,i)=><circle key={i} cx={px(i)} cy={py(d.n)} r={3} fill="#FAFAF8" stroke="#B8935A" strokeWidth={1.5}/>)}
      {proj?.map((d,i)=><circle key={i} cx={px(projOffset+i)} cy={py(d.n)} r={3} fill="#FAFAF8" stroke="#8A8A8A" strokeWidth={1.5}/>)}
      <g transform={`translate(${W-160},${pad.t})`}>
        <rect width={10} height={2} y={2} fill="#B8935A"/><text x={14} y={7} fontSize={8} fill="#8A8A8A">Historique</text>
        <rect width={10} height={2} y={18} fill="#8A8A8A"/><text x={14} y={23} fontSize={8} fill="#8A8A8A">Prévision (régression linéaire)</text>
      </g>
    </svg>
  );
}
